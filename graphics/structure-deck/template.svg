<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
  River Bankers — Structure Card template
  =======================================
  Poker portrait: 2.5" × 3.5" trim, 0.125" bleed → 2.75" × 3.75" full.
  Coordinate system: pt (1 pt = 1/72 inch), matching TGC poker-card.svg
  (used right-side-up here; the material-deck template rotates it).

    Full canvas (bleed): 0,0 -> 198,270   (2.75" x 3.75")
    Trim line:           9,9 -> 189,261   (2.5"  x 3.5")
    Safe area:          18,18 -> 180,252  (2.25" x 3.25")

  Zone layout (pt, inside safe area):
    Header band  y=18..46    (28pt)  — title (left) + "N ★" VP (right)
    Cost row     y=50..90    (40pt)  — "N 🐟" fish (left) + material discs
    Art panel    y=94..136   (42pt)  — decorative space (blank for now)
    Effect box   bottom=250, auto-sized — italic prose; box top floats up
                                          depending on wrap count

  The generator script (generate.py) substitutes {{TOKENS}}; tokens
  render as literal text if you open this file directly in Inkscape.
  Toggle the #guides layer to "inline" to see bleed/trim/safe outlines.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
     xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.0.dtd"
     width="2.75in" height="3.75in"
     viewBox="0 0 198 270"
     version="1.1">

  <defs>
    <style type="text/css"><![CDATA[
      /* card-name font-size is set per-card by generate.py so long titles
         like "Hollowed-out Log" shrink enough to clear the VP indicator. */
      .card-name      { font-family: 'DejaVu Serif', serif; font-weight: 700; fill: #2c1f15; }
      .vp-text        { font-family: 'DejaVu Serif', serif; font-weight: 700; font-size: 11pt; fill: #a07a30; }
      .fish-text      { font-family: 'DejaVu Serif', serif; font-weight: 700; font-size: 13pt; fill: #1a4565; }
      .cost-number    { font-family: 'DejaVu Sans', sans-serif; font-weight: 700; font-size: 8pt; fill: #2c1f15; text-anchor: middle; }
      .cost-label     { font-family: 'DejaVu Sans', sans-serif; font-weight: 700; font-size: 5.5pt; text-anchor: middle; }
      .effect-text    { font-family: 'DejaVu Sans', sans-serif; font-style: italic; font-size: 6.5pt; fill: #2a2a5c; }
    ]]></style>
  </defs>

  <!-- Full bleed: border color extends to canvas edge so TGC trim leaves a clean colored frame. -->
  <rect x="0" y="0" width="198" height="270" fill="#6b5436"/>

  <!-- Paper inset 5pt past trim → 5pt visible brown frame after die-cut. -->
  <rect x="14" y="14" width="170" height="242" rx="6" ry="6" fill="#faf3e3"/>

  <!-- Header band (light parchment, full-width). -->
  <rect x="18" y="18" width="162" height="28" rx="3" ry="3"
        fill="#e8dcc0" fill-opacity="0.55" stroke="#a0825a" stroke-opacity="0.5" stroke-width="0.6"/>

  <!-- Card title (left side of header). Font size is computed by
       generate.py so long titles auto-shrink to clear the VP indicator. -->
  {{TITLE_BLOCK}}

  <!-- VP indicator (right side of header). Format: "N ★" — text-only so
       the number stays sharp at print sizes; vp=0 prints just "★" since
       those cards score entirely from their effect text. -->
  {{VP_BLOCK}}

  <!-- ============ COST ROW ============
       Fish cost ("N 🐟") + material discs laid out as a single centered,
       evenly-spaced row (generator computes positions per card). -->
  {{COST_ROW}}

  <!-- ============ EFFECT BLOCK ============ -->
  {{EFFECT_BLOCK}}

  <!-- ============ GUIDES (hidden) ============
       Toggle display="inline" in Inkscape to inspect bleed/trim/safe areas. -->
  <g id="guides" display="none" inkscape:label="Guides" inkscape:groupmode="layer">
    <rect x="0" y="0" width="198" height="270" fill="none" stroke="#929497" stroke-width="0.5"/>
    <rect x="9" y="9" width="180" height="252" rx="9" ry="9"
          fill="none" stroke="#EC1E28" stroke-width="0.5"/>
    <rect x="18" y="18" width="162" height="234" rx="6" ry="6"
          fill="none" stroke="#2BA6DE" stroke-width="0.5" stroke-dasharray="2 2"/>
  </g>
</svg>
