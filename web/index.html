    const row = document.querySelector(`.species-picker[data-species="${sp.id}"]`);
    if (!row) return;
    row.classList.toggle('off', picks[i] === 'off');
    row.classList.toggle('you', picks[i] === 'you');
  });
  const hint = document.getElementById('setup-hint');
  const btn = document.querySelector('#setup-screen button.primary');
  let msg = '', ok = true;
  if (active < 2)          { msg = 'Pick at least 2 species to play.'; ok = false; }
  else if (active > 4)     { msg = 'At most 4 species can be in play.'; ok = false; }
  else if (humans > 1)     { msg = 'Only one species can be "You".'; ok = false; }
  else if (humans === 0)   { msg = `All-AI game with ${active} species.`; }
  else                     { msg = `You + ${active - 1} AI opponent${active === 2 ? '' : 's'}.`; }
  if (hint) hint.textContent = msg;
  if (btn) btn.disabled = !ok;
}

function startGame() {
  const picks = readSpeciesPicks();
  const useStarters = document.getElementById('use-starters').checked;
  // Optional Rules: Double Vision grants the combined two-card auction to ALL
  // players (any/max/max config). Read here, applied via DOUBLE_VISION_ACTIVE.
  DOUBLE_VISION_ACTIVE = document.getElementById('opt-double-vision').checked;
  const seats = SPECIES
    .map((sp, i) => ({ sp, role: picks[i] }))
    .filter(s => s.role !== 'off');
  const humanCount = seats.filter(s => s.role === 'you').length;
  if (seats.length < 2 || seats.length > 4) {
    alert('Pick 2–4 species to play.');
    return;
  }
  if (humanCount > 1) {
    alert('Only one species can be "You".');
    return;
  }
  const humanPlays = humanCount === 1;
  const humanIdx = seats.findIndex(s => s.role === 'you');
  const numPlayers = seats.length;

  const players = [];
  for (let i = 0; i < numPlayers; i++) {
    players.push({
      idx: i,
      species: seats[i].sp,
      isHuman: seats[i].role === 'you',
      supply: numPlayers >= 4 ? 7 : 8,
      timePos: 0,
      hand: [],
      built: [],
      exhausted: false,
      out: false,
      granaryUsed: false,
      floodgateUsed: false,
      spyMoundUsed: false,
      tributeStoneUsed: false,
      slipstreamUsed: false,
      rollingFloatUsed: false,
      snareSetUsed: false,
      stoneToolUsed: false,
    });
  }

  const matDeck = buildMaterialDeck(numPlayers);
  const structDeck = buildStructureDeck(numPlayers);

  // Initial hands: 3 each
  for (const p of players) {
    for (let i = 0; i < 3; i++) p.hand.push(structDeck.pop());
  }

  // Species starter draft (see SPECIES.md). AI picks by SPECIES_DRAFT_WEIGHT
  // with random tiebreaker; human's modal is opened after game state is
  // initialized (see openHumanSpeciesDraft below). For now, AI pre-builds
  // their pick immediately so the game state is consistent.
  // Skipped entirely when the user disables starter cards in setup.
  if (useStarters) {
    for (const p of players) {
      if (p.isHuman) continue; // human drafts via modal after initial render
      const speciesCards = STRUCTURE_TEMPLATES
        .filter(s => s.species === p.species.id)
        .map((s, i) => ({ ...s, id: 'ss' + p.idx + '_' + i, cost: { ...s.cost } }));
      const ranked = speciesCards
        .map(c => ({ c, w: (SPECIES_DRAFT_WEIGHT[c.name] || 1) + Math.random() }))
        .sort((a, b) => b.w - a.w);
      p.built.push(ranked[0].c);
    }
  }

  // No starting river cards — the river populates as cards are pulled out of the upstream queue.
  const riverCards = [];

  // 3 starting upstream cards: index 0 = farthest upstream (3t), index 2 = closest to river (1t).
  const prerivCards = [null, null, null];
  for (let i = 0; i < PRERIV_SLOTS; i++) {
    if (matDeck.length === 0) break;
    const c = matDeck.pop();
    c.slot = 'pre';
    prerivCards[i] = c;
  }

  const matDeckInitialSize = matDeck.length + PRERIV_SLOTS; // pre-pop already removed PRERIV_SLOTS
  state = {
    players,
    riverCards,
    prerivCards,
    shorelineCards: [],
    matDeck,
    matDeckInitialSize,
    structDeck,
    structDiscard: [],
    log: [],
    // turn-order stack: list of player indices, top of stack acts first when tied
    // We model "stacked at space 0 with first player on top": stackOrder = [0,1,2,..]
    stackOrder: players.map((_, i) => i),
    currentPlayer: 0,
    gameOver: false,
    phase: 'idle',
    shadowedBy: {},
    endgame: false,
    simGameTimeMs: 0,
    humanTimeMs: 0,
    humanTurnCount: 0,
    _humanTimerStart: null,
    _humanTimerDepth: 0,
  };

  // Pick first player: top of stack at lowest space
  state.currentPlayer = pickNextPlayer();

  document.getElementById('setup-screen').classList.add('hidden');
  document.getElementById('game-screen').classList.remove('hidden');
  document.body.classList.add('in-game');
  log(`Game starts. ${players.length} players. ${humanPlays ? 'You are ' + SPECIES[humanIdx].name + '.' : 'All AI.'}`);

  render();
  startSimTimeTicker();
  // Human species draft (if any) before the first turn fires.
  // Skipped when starter cards are disabled.
  if (humanPlays && useStarters) {
    runHumanSpeciesDraft().then(() => scheduleTurn());
  } else {
    scheduleTurn();
  }
}

// Show the human their 3 species starter options and let them pick. Resolves
// after the picked card is appended to their built[].
async function runHumanSpeciesDraft() {
  const human = state.players.find(p => p.isHuman);
  if (!human) return;
  const speciesCards = STRUCTURE_TEMPLATES
    .filter(s => s.species === human.species.id)
    .map((s, i) => ({ ...s, id: 'ss' + human.idx + '_' + i, cost: { ...s.cost } }));
  const picked = await pickFromList(
    `${human.species.emoji} ${human.species.name} — pick your starter`,
    `Pick one of three ${human.species.name}-themed starter structures to build for free. ` +
      `The other two are removed from the game.`,
    speciesCards,
    (c) => {
      const slug = c.name.replace(/[^A-Za-z0-9]/g, '');
      return `<img src="../starter-deck/${slug}.png" alt="${c.name}" style="width:195px;height:auto;display:block;">`;
    },
    { cancelable: false, horizontal: true }
  );
  if (picked) {
    human.built.push(picked);
    log(`${human.species.emoji} ${speciesLabel(human)} drafts <b>${picked.name}</b>.`);
    render();
  }
}

// =============================================================================
// TURN ORDER: pick the lowest-pos non-exhausted player; tie → top of stack
// =============================================================================
const LAP_LENGTH = 60;

// Slipstream: after any player's turn, an opponent with the Slipstream
// structure built+unused may take an out-of-order bonus turn (overriding the
// fish-track once per game). Human owners get a prompt; AI uses the first
// eligible chance where it would actually change who goes next.
async function maybeFireSlipstream(lastTurnPlayerIdx) {
  if (state.bonusTurnPlayer != null) return; // another bonus already pending
  const eligible = state.players.filter(p =>
    p.idx !== lastTurnPlayerIdx && !p.out && !p.exhausted &&
    !p.slipstreamUsed && p.built.some(b => b.name === 'Slipstream') && effectActive('Slipstream')
  );
  if (eligible.length === 0) return;
  const naturalNext = pickNextPlayer();
  const human = eligible.find(p => p.isHuman && p.idx !== naturalNext);
  if (human) {
    const useNow = await confirmModal(
      '⚡ Use Slipstream?',
      'You may take a turn immediately, even though it\'s not your turn on the fish track. Once per game.',
      'Use now', 'Save'
    );
    if (useNow) {
      human.slipstreamUsed = true;
      state.bonusTurnPlayer = human.idx;
      log(`⚡ ${speciesLabel(human)} uses Slipstream — takes an out-of-order turn.`);
    }
    return;
  }
  // AI: pick the eligible non-human owner who would otherwise wait the longest.
  const aiOwners = eligible
    .filter(p => !p.isHuman && p.idx !== naturalNext)
    .sort((a, b) => a.timePos - b.timePos);
  if (aiOwners.length === 0) return;
  const owner = aiOwners[0];
  owner.slipstreamUsed = true;
  state.bonusTurnPlayer = owner.idx;
  log(`⚡ ${speciesLabel(owner)} uses Slipstream — takes an out-of-order turn.`);
}

function pickNextPlayer() {
  // Royal Lodge: the player who just built it takes an immediate extra turn.
  if (state.bonusTurnPlayer != null) {
    const idx = state.bonusTurnPlayer;
    state.bonusTurnPlayer = null;
    if (!state.players[idx].out && !state.players[idx].exhausted) return idx;
  }
  let lowest = Infinity;
  for (const p of state.players) {
    if (p.exhausted || p.out) continue;
    lowest = Math.min(lowest, p.timePos);
  }
  if (lowest === Infinity) return -1; // no eligible player (likely game over)
  for (const idx of state.stackOrder) {
    const p = state.players[idx];
    if (p.exhausted || p.out) continue;
    if (p.timePos === lowest) return idx;
  }
  return state.stackOrder.find(i => !state.players[i].exhausted && !state.players[i].out) ?? state.stackOrder[0];
}

const ENDGAME_TRACK_END = 59;

// Gate for actions that cost fish: during the endgame the track has a finish
// line at ENDGAME_TRACK_END and an action that would push us past it is wasted,
// so we hide/skip it. During normal play `timePos` is cumulative across laps
// (no finish line), so the cap should never fire — callers used to compare raw
// `timePos` against ENDGAME_TRACK_END and lost their action-granting structures
// (e.g. Salmon Run, Beaver Tow) mid-game once cumulative pos crossed ~57.
function canAffordTimeCost(p, fishCost) {
  return !state.endgame || p.timePos + fishCost < ENDGAME_TRACK_END;
}

function triggerEndgame() {
  if (state.endgame) return;
  state.endgame = true;
  const ordered = state.players
    .map(p => ({ idx: p.idx, t: p.timePos, stackPos: state.stackOrder.indexOf(p.idx) }))
    .filter(o => !state.players[o.idx].out)
    .sort((a, b) => a.t - b.t || a.stackPos - b.stackPos);
  ordered.forEach((o, i) => { state.players[o.idx].timePos = i + 1; });
  state.shadowedBy = {};
  for (const p of state.players) p.exhausted = false;
  state.stackOrder = ordered.map(o => o.idx);
  log(`🏁 Material deck is empty — entering endgame. Pawns reset to spaces 1–${ordered.length}; reach space ${ENDGAME_TRACK_END} or pass to retire.`);
}

// Lapping a player exhausts the LAPPER (the heavy spender), not the lapped.
// shadowedBy[a -> b] = true means "a lapped b and is still waiting for b to
// catch up to a's stopping point on the track". The lapper a is exhausted
// while any of their outgoing shadows are set; each lapped b catching back
// up clears their shadow. Only the moving player's advance can transition.
function advancePlayer(playerIdx, byTime) {
  const p = state.players[playerIdx];
  const prev = p.timePos;
  p.timePos += byTime;
  // Detect pass-0 crossings (lap-loop boundary). Mill Wheel clamps to (boundary + 1).
  const prevLapBoundary = Math.floor(prev / LAP_LENGTH);
  const newLapBoundary  = Math.floor(p.timePos / LAP_LENGTH);
  const passZeroCount = Math.max(0, newLapBoundary - prevLapBoundary);
  if (passZeroCount > 0 && hasEffect(p, 'Mill Wheel')) {
    p.timePos = (prevLapBoundary + 1) * LAP_LENGTH + 1;
    log(`⚙ ${speciesLabel(p)} stops at space 1 (Mill Wheel).`);
  }
  // Pass-0 freebies (Wood Pile, Hollowed-out Log) consume the crossing event.
  if (passZeroCount > 0) firePassZeroEffects(playerIdx, passZeroCount);
  state.stackOrder = state.stackOrder.filter(i => i !== playerIdx);
  state.stackOrder.unshift(playerIdx);
  for (const other of state.players) {
    if (other === p) continue;
    // Catch-up event: p crossed other's non-modular position going up. If
    // `other` had lapped p (and is exhausted because of it), p catching back
    // up to their spot wakes other with respect to p.
    if (prev < other.timePos && p.timePos >= other.timePos) {
      const key = other.idx + '->' + playerIdx;
      if (state.shadowedBy[key]) state.shadowedBy[key] = false;
    }
    // Lap event: p gained a full LAP_LENGTH on other. p is the lapper.
    const prevLaps = Math.max(0, Math.floor((prev - other.timePos) / LAP_LENGTH));
    const newLaps  = Math.max(0, Math.floor((p.timePos - other.timePos) / LAP_LENGTH));
    if (newLaps > prevLaps) {
      state.shadowedBy[playerIdx + '->' + other.idx] = true;
    }
  }
  // Recompute exhausted flags: a player is exhausted iff they have any
  // outstanding outgoing shadow (lapped someone who hasn't caught back up).
  for (const a of state.players) {
    let was = a.exhausted;
    let now = false;
    for (const b of state.players) {
      if (a === b) continue;
      if (state.shadowedBy[a.idx + '->' + b.idx]) { now = true; break; }
    }
    a.exhausted = now;
    if (!was && now) log(`💤 ${speciesLabel(a)} lapped someone — exhausted until they catch up.`);
    if (was && !now) log(`☀ ${speciesLabel(a)} all opponents caught up — back in the action.`);
  }
}

// =============================================================================
// LOG
// =============================================================================
// Log entries store the original HTML in `msg` for renderLog (innerHTML), plus
// a tag-stripped `text` sibling so external readers (debug dumps, playtest
// transcripts, AI prompts) don't have to grovel through embedded SVG markup
// from the material/species icons.
function log(msg) {
  const text = String(msg).replace(/<[^>]*>/g, '').replace(/\s+/g, ' ').trim();
  state.log.push({ msg, text, t: Date.now() });
  if (state.log.length > 200) state.log.shift();
  renderLog();
}

function speciesLabel(p) {
  return `${p.species.emoji} ${p.species.name}${p.isHuman ? ' (you)' : ''}`;
}

// =============================================================================
// RENDERING
// =============================================================================
function render() {
  renderTimeTrack();
  renderRiver();
  renderPlayers();
  renderHand();
  renderActionPanel();
  renderSimTime();
}

function renderTimeTrack() {
  const wrap = document.getElementById('fish-track');
  // Capture each pawn's viewport rect BEFORE re-rendering for FLIP animation.
  const oldRects = {};
  for (const el of wrap.querySelectorAll('[data-pawn]')) {
    oldRects[el.dataset.pawn] = el.getBoundingClientRect();
  }
  // The track loops every LAP_LENGTH cells (0..LAP_LENGTH-1). Display position = timePos mod LAP_LENGTH.
  // Mobile: trim the track to a window that just contains every active pawn,
  // padded by 1 cell on each side, with a minimum width of 10 cells. Desktop
  // (and the species-draft / pre-game state with no pawns yet) shows the full track.
  let startCell = 0, endCell = LAP_LENGTH - 1;
  if (window.matchMedia('(max-width: 768px)').matches) {
    const positions = state.players.filter(p => !p.out).map(p => p.timePos % LAP_LENGTH);
    if (positions.length > 0) {
      const minPos = Math.min(...positions);
      const maxPos = Math.max(...positions);
      startCell = Math.max(0, minPos - 1);
      endCell = maxPos + 1;
      if (endCell - startCell + 1 < 10) endCell = startCell + 9;
      if (endCell > LAP_LENGTH - 1) {
        endCell = LAP_LENGTH - 1;
        startCell = Math.max(0, endCell - 9);
      }
    }
  }
  let html = '';
  for (let i = startCell; i <= endCell; i++) {
    const occupants = state.stackOrder.filter(idx => !state.players[idx].out && (state.players[idx].timePos % LAP_LENGTH) === i);
    // Exhausted pawns render first → they sit at the bottom of the visual stack (behind active pawns).
    occupants.sort((a, b) => Number(state.players[b].exhausted) - Number(state.players[a].exhausted));
    let pawns = '';
    for (const idx of occupants) {
      const p = state.players[idx];
      const isNext = idx === state.currentPlayer && !state.gameOver && !p.exhausted;
      const exh = p.exhausted ? ' exhausted' : '';
      pawns += `<div class="pawn${isNext ? ' next-up' : ''}${exh}" data-pawn="${idx}" style="background-color:${p.species.color}" title="${p.species.name}${p.exhausted ? ' (exhausted)' : ''}">${speciesIcon(p.species)}</div>`;
    }
    const isLapMark = (i === 0); // visual mark at the lap boundary
    html += `<div class="fish-cell${isLapMark ? ' lap-mark' : ''}"><div class="cell-num">${i}</div><div class="pawn-stack">${pawns}</div></div>`;
  }
  wrap.innerHTML = html;
  // FLIP animation. Skip for pawns whose timePos crossed a lap boundary (the visual jumps from
  // near LAP_LENGTH-1 back to a low position; sliding linearly would look like backwards motion).
  for (const el of wrap.querySelectorAll('[data-pawn]')) {
    const old = oldRects[el.dataset.pawn];
    if (!old) continue;
    const cur = el.getBoundingClientRect();
    const dx = old.left - cur.left;
    const dy = old.top - cur.top;
    if (dx === 0 && dy === 0) continue;
    // If the slide would be very long horizontally (e.g., crossed wrap), skip animation.
    if (Math.abs(dx) > 300) continue;
    el.style.transition = 'none';
    el.style.transform = `translate(${dx}px, ${dy}px)`;
    void el.offsetWidth;
    el.style.transition = 'transform 450ms cubic-bezier(0.34, 1.2, 0.64, 1)';
    el.style.transform = '';
  }
}

// Track now shows a fixed LAP_LENGTH cells; no scrolling needed.
function scrollTimeTrackToLeftmost() { /* no-op */ }

// Compute each icon's center position on the printed PNG, expressed as
// % of the trimmed card (252×180 pt cropped from the 270×198 pt bleed).
// Mirrors generate.py's layout: 4→[4], 5→[3,2], 7→[4,3], 8→[4,4]; icon
// area runs y=44→154 for effect cards and y=44→178 for vanilla, all in
// canvas coords. Returned positions are slot top-left in %, since the
// slot is a square of width/height = 18cqw (= 0.63"/3.5" ≈ 18% wide;
// equivalent vertical % depends on the card aspect).
function pngIconPositions(card) {
  const n = card.totalIcons;
  let rows;
  if      (n === 4) rows = [4];
  else if (n === 5) rows = [3, 2];
  else if (n === 7) rows = [4, 3];
  else if (n === 8) rows = [4, 4];
  else return [];
  const DIAM = 45.36, RADIUS = 22.68, GAP = 6;
  const CROP_W = 252, CROP_H = 180;
  const CROP_OFFSET = 9;
  const cardCenterX = 135 - CROP_OFFSET; // 126
  const areaTop    = 44 - CROP_OFFSET;   // 35
  const areaBot    = (card.effectSpec ? 154 : 178) - CROP_OFFSET; // 145 / 169
  // Slot is 18cqw square (= 18% of card width = 18 × CROP_W/CROP_H % of
  // card height ≈ 25.2%). We need both because the slot is square in
  // pixels, but the card isn't.
  const slotWPct = 100 * DIAM / CROP_W;             // 18
  const slotVertPct = slotWPct * CROP_W / CROP_H;   // 25.2
  const rowsH = rows.length === 1 ? DIAM : rows.length * DIAM + (rows.length - 1) * GAP;
  const cyTop = areaTop + (areaBot - areaTop - rowsH) / 2 + RADIUS;
  const positions = [];
  for (let r = 0; r < rows.length; r++) {
    const cy = cyTop + r * (DIAM + GAP);
    const count = rows[r];
    const rowW = count * DIAM + (count - 1) * GAP;
    const xFirst = cardCenterX - rowW / 2 + RADIUS;
    for (let i = 0; i < count; i++) {
      const cx = xFirst + i * (DIAM + GAP);
      // Slot top-left = center − half-slot. The slot is square in px,
      // so half-width and half-height in % differ (card isn't square).
      positions.push({
        left: 100 * cx / CROP_W - slotWPct / 2,
        top:  100 * cy / CROP_H - slotVertPct / 2,
      });
    }
  }
  return positions;
}

function renderMatCard(card, opts = {}) {
  const m = MATERIALS[card.material];
  const isShore = card.slot === 'shore';
  const iconSlots = [];
  let totalWorkers = 0;
  // Worker icons (always shown — workers can still be spent on builds, even from shoreline)
  for (const pIdx in card.workers) {
    const cnt = card.workers[pIdx];
    const sp = state.players[pIdx].species;
    totalWorkers += cnt;
    for (let i = 0; i < cnt; i++) {
      iconSlots.push(`<div class="icon-slot icon-worker" style="background-color:${sp.color}" title="${sp.name}'s worker">${speciesIcon(sp)}</div>`);
    }
  }
  // Blanks (river only — shoreline cards never carry blanks)
  for (let i = 0; i < card.blanks; i++) {
    // Background-image (blank-chit.svg) provides the visual; div stays empty.
    iconSlots.push(`<div class="icon-slot icon-blank" title="sold"></div>`);
  }
  // Open icons — drawn on the printed PNG, so the overlay slot is an
  // invisible placeholder (CSS: .icon-slot.icon-open { visibility:hidden }).
  // We keep one per open icon so worker[0] / blank[0] line up with PNG
  // icon #0, and so on. On shoreline cards there are no blanks but the
  // open count still reflects which PNG positions are unoccupied.
  const open = card.totalIcons - totalWorkers - card.blanks;
  for (let i = 0; i < open; i++) {
    iconSlots.push(`<div class="icon-slot icon-open" title="open"></div>`);
  }
  // Absolute-position each slot at its matching PNG icon — works for
  // river, headwaters, AND shoreline cards (they all share the same art).
  const positions = pngIconPositions(card);
  const icons = iconSlots.map((html, i) => {
    const p = positions[i];
    if (!p) return html;
    const inj = `position:absolute;left:${p.left.toFixed(2)}%;top:${p.top.toFixed(2)}%;`;
    return html.includes('style="')
      ? html.replace('style="', `style="${inj}`)
      : html.replace('<div ', `<div style="${inj}" `);
  }).join('');
  const cls = ['mat-card', 'has-art'];   // every material card uses the PNG art
  if (isShore)         cls.push('shore'); // shoreline cards inherit a narrower column
  if (card.wildAlt)    cls.push('wild');  // dual-yield marker (border tint)
  if (opts.selectable) cls.push('selectable');
  if (opts.selected)   cls.push('selected');
  if (opts.dimmed)     cls.push('dimmed');
  const onclick = opts.onClick ? `onclick="${opts.onClick}"` : '';
  // Header markup is kept as a fallback if the image fails to load;
  // CSS hides it whenever .has-art is on.
  const cardName = card.name || m.name;
  // Wild cards: show both material icons + names + a "WILD" pill so the
  // dual yield is obvious at a glance (matches the printed PNG art).
  const altMat = card.wildAlt ? MATERIALS[card.wildAlt] : null;
  const matIcons = altMat ? `${m.icon}/${altMat.icon}` : m.icon;
  const matNames = altMat ? `${m.name} / ${altMat.name}` : m.name;
  const wildPill = altMat ? ' <span class="wild-pill">WILD</span>' : '';
  const matLabel = isShore
    ? `<span class="mat-material" style="color:${m.color}">${matIcons} ${matNames}${wildPill}</span>`
    : `<span class="mat-material" style="color:${m.color}">${matIcons} ${matNames}${wildPill} <span class="mat-remaining">(${open}/${card.totalIcons})</span></span>`;
  // Effect rules text printed full-width across the bottom of the card.
  const effectBox = card.effectSpec
    ? `<div class="mat-effect-box"><b>${card.effectSpec.name}.</b> ${effectDescription(card)}</div>`
    : '';
  const foot = !isShore && opts.note ? opts.note : '';
  // Background image: material-deck/<Slug>.png (slug matches generate.py).
  const slug = cardName.replace(/[^A-Za-z0-9]/g, '');
  const imgUrl = `../material-deck/${slug}.png`;
  const bgStyle = `style="background-image:url('${imgUrl}')"`;
  return `<div class="${cls.join(' ')}" ${bgStyle} data-card-img="${imgUrl}" ${onclick}>
    <div class="mat-head">
      <span class="mat-name">${cardName}</span>
      ${matLabel}
    </div>
    <div class="icons-row">${icons}</div>
    ${effectBox}
    ${foot ? `<div class="mat-foot">${foot}</div>` : ''}
  </div>`;
}

// Rules text printed on the card under the effect-name pill.
function effectDescription(card) {
  switch (card.effect) {
    case 'wild':
      return `Wild: each claimed icon yields ${card.material} OR ${card.wildAlt} (chosen at build time).`;
    case 'solo-bonus':
      return `If exactly one player has workers on this card when it reaches shoreline, that player moves back 1 space on the fish track per worker.`;
    case 'most-workers':
      return `When this card reaches shoreline, the player with the most workers moves back ${card.effectSpec.flatBonus} spaces on the fish track. Ties: nobody.`;
    case 'peek-rearrange':
      return `When you build using workers from this card, peek at the top 2 material cards and rearrange them.`;
    case 'slipping-sandbar':
      return `Enters the river at River 4. After any auction with workers placed here, slides one slot upstream. At River 1 with leftover icons, retires to shoreline.`;
    case 'old-growth':
      return `If this card is at River 3 or 4, each worker you retrieve yields 2 ${card.material} instead of 1.`;
    default:
      return '';
  }
}

// Mirror the printed-card VP convention (graphics/structure-deck/generate.py
// render_vp_block). Cards whose end-game effect mints points should not be
// labelled "0★" — that's misleading. Pair with a literal '★' at the callsite.
//   vp=0, no end-game effect  → '0'
//   vp=0, end-game effect     → '?'
//   vp=N, no end-game effect  → 'N'
//   vp=N, end-game effect     → 'N+?'  (fixed base plus variable bonus)
function vpDisplay(s) {
  const eg = !!(s && s.effect && /End [Gg]ame/.test(s.effect));
  if (!s || s.vp === 0) return eg ? '?' : '0';
  return eg ? `${s.vp}+?` : `${s.vp}`;
}

// Stack-of-card-backs visual with a remaining/total count overlay.
// 0 cards → outlined empty rectangle; 1–2 cards → 1 back; 3–9 → 2 backs; 10+ → 3 backs.
function renderDeckStack(remaining, total, backImg, opts = {}) {
  const layers = remaining === 0 ? 0 : remaining < 3 ? 1 : remaining < 10 ? 2 : 3;
  let bgs = '';
  if (layers === 0) {
    bgs = `<div class="deck-stack-empty"></div>`;
  } else {
    // Render back-to-front so b3 (deepest) is first in DOM, b1 (top) is last.
    for (let n = layers; n >= 1; n--) bgs += `<div class="deck-stack-bg b${n}"></div>`;
  }
  const countHtml = total > 0
    ? `${remaining}<span class="deck-stack-total">/${total}</span>`
    : `${remaining}`;
  const classes = ['deck-stack'];
  if (remaining === 0) classes.push('empty');
  if (opts.landscape) classes.push('landscape');
  return `<div class="${classes.join(' ')}" style="--back-img: url('${backImg}')">
    ${bgs}
    <div class="deck-stack-count">${countHtml}</div>
  </div>`;
}

function renderRiver() {
  const wrap = document.getElementById('board');
  // ===================== Row 1: Material Deck + Headwaters 1/2/3 =====================
  const total = state.matDeckInitialSize || 0;
  const remaining = state.matDeck.length;
  // Flush button — enabled with the same conditions as the action-panel flush:
  // human's choose-action phase, has worker available, and there's something to flush.
  const human = state.players.find(p => p.isHuman);
  const isHumanChoosingAction = human && state.currentPlayer === human.idx
    && state.phase === 'choose-action' && !state.gameOver;
  const hasPreriv = state.prerivCards.some(c => c !== null);
  const humanTriggerPool = human
    ? human.supply + totalPlacedWorkers(state, human.idx)
    : 0;
  const flushEnabled = isHumanChoosingAction && humanTriggerPool > 0
    && state.matDeck.length > 0;
  const flushBtn = `<button class="deck-flush-btn" onclick="humanChooseAction('flush')" ${flushEnabled ? '' : 'disabled'}>
    🌀 Flush Headwaters (5🐟)
  </button>`;
  const deckTile = `<div class="slot-tile deck-tile">
    <div class="slot-tile-header">Material Deck</div>
    ${renderDeckStack(remaining, total, '../material-deck/_back.png', { landscape: true })}
    ${flushBtn}
  </div>`;
  let prerivTiles = '';
  for (let i = 0; i < state.prerivCards.length; i++) {
    const card = state.prerivCards[i];
    const cost = prerivTriggerCost(i);
    const cls = ['slot-tile', 'preriv-tile'];
    if (card && prerivSlotSelectable(i)) cls.push('selectable');
    const slotNum = PRERIV_SLOTS - i;  // existing label convention: nearest-river is 1
    const body = card
      ? renderMatCard(card, prerivCardClickOpts(i))
      : `<div class="slot-tile-empty">—</div>`;
    prerivTiles += `<div class="${cls.join(' ')}">
      <div class="slot-tile-header">Headwaters ${slotNum}</div>
      <div class="slot-tile-cost">${cost}🐟 to auction · ${UPSTREAM_AUCTION_COST}🐟/item</div>
      <div class="slot-tile-body">${body}</div>
    </div>`;
  }
  // ===================== Row 2: River 1/2/3/4 =====================
  let riverTiles = '';
  for (let slot = 0; slot < 4; slot++) {
    const cards = state.riverCards.filter(c => c.slot === slot);
    const perItem = riverSlotCost(slot);
    const body = cards.length === 0
      ? `<div class="slot-tile-empty">—</div>`
      : cards.map(c => renderMatCard(c, riverCardClickOpts(c))).join('');
    riverTiles += `<div class="slot-tile river-tile" data-cost="${perItem}">
      <div class="slot-tile-header">River ${slot + 1}</div>
      <div class="slot-tile-cost">1🐟 to auction · ${perItem}🐟/item</div>
      <div class="slot-tile-body">${body}</div>
    </div>`;
  }
  // ===================== Shoreline (right column, full height) =====================
  let shoreCards;
  if (state.shorelineCards.length === 0) {
    shoreCards = `<div class="slot-tile-empty" style="color:var(--bank);">(empty)</div>`;
  } else {
    shoreCards = state.shorelineCards.map(c => renderMatCard(c, { note: 'shoreline' })).join('');
  }
  const shoreline = `<div class="board-shoreline">
    <div class="shoreline-area">
      <div class="slot-tile-header">⛱ Shoreline</div>
      <div class="shoreline-cards">${shoreCards}</div>
    </div>
  </div>`;
  wrap.innerHTML = `<div class="board-main">
    <div class="board-row">${deckTile}${prerivTiles}</div>
    <div class="board-row">${riverTiles}</div>
  </div>${shoreline}`;
}

function prerivCardClickOpts(slotIdx) {
  // Combined-auction picking: Headwaters cards are valid pool members too.
  if (state.phase === 'combined-pick') {
    const card = state.prerivCards[slotIdx];
    if (!card || uncoveredIcons(card) === 0) return {};
    return {
      selectable: true,
      selected: !!(state.combinedPick && state.combinedPick.first === card.id),
      onClick: `humanSelectCombinedCard('${card.id}')`,
    };
  }
  if (state.phase === 'combined-place') {
    const card = state.prerivCards[slotIdx];
    return card ? combinedPlaceClickOpts(card.id) : {};
  }
  if (!prerivSlotSelectable(slotIdx)) return {};
  if (state.phase === 'flush-pick-card') {
    return { selectable: true, onClick: `humanSelectFlushTarget(${slotIdx})` };
  }
  return { selectable: true, onClick: `humanSelectPrerivCard(${slotIdx})` };
}

function prerivSlotSelectable(slotIdx) {
  const card = state.prerivCards[slotIdx];
  if (!card) return false;
  const human = state.players.find(p => p.isHuman);
  const isHumanTurn = human && state.currentPlayer === human.idx;
  if (state.phase === 'select-preriv-card') return true;
  if (state.phase === 'flush-pick-card') return true;
  // Trigger an auction iff at least one worker is available anywhere — supply
  // or placed (player will recall during pre-auction recall to fund the bid).
  if (state.phase === 'choose-action' && isHumanTurn
      && human.supply + totalPlacedWorkers(state, human.idx) > 0) return true;
  return false;
}

function riverCardClickOpts(card) {
  const opts = {};
  if (uncoveredIcons(card) === 0) return opts;
  // Combined-auction (Confluence / Double Vision): pick two cards on the board.
  if (state.phase === 'combined-pick') {
    opts.selectable = true;
    opts.selected = !!(state.combinedPick && state.combinedPick.first === card.id);
    opts.onClick = `humanSelectCombinedCard('${card.id}')`;
    return opts;
  }
  // Placing won workers: click either pooled card (that still has room).
  if (state.phase === 'combined-place') return combinedPlaceClickOpts(card.id);
  const human = state.players.find(p => p.isHuman);
  const isHumanTurn = human && state.currentPlayer === human.idx;
  // Click is a shortcut for "Auction river card" — works both during the explicit
  // select-auction-card phase and directly from choose-action (skipping the button).
  // Trigger gate: any worker available (supply OR placed for pre-auction recall).
  if (state.phase === 'select-auction-card'
      || (state.phase === 'choose-action' && isHumanTurn
          && human.supply + totalPlacedWorkers(state, human.idx) > 0)) {
    opts.selectable = true;
    opts.onClick = `humanSelectAuctionCard('${card.id}')`;
  }
  return opts;
}

function riverSlotSelectable(card) {
  return card && state.phase === 'select-auction-card' && uncoveredIcons(card) > 0;
}

// Click options for the two pooled cards while the human places won workers.
// Both are highlighted; only one with remaining room is clickable.
function combinedPlaceClickOpts(cardId) {
  const cp = state.combinedPlace;
  if (!cp) return {};
  const isA = cardId === cp.cardAId, isB = cardId === cp.cardBId;
  if (!isA && !isB) return {};
  const hasRoom = isA ? cp.remA > 0 : cp.remB > 0;
  if (!hasRoom) return { selected: true };
  return { selectable: true, selected: true, onClick: `humanPlaceCombinedWorker('${cardId}')` };
}

function renderPlayers() {
  const wrap = document.getElementById('players-row');
  let html = '';
  for (const p of state.players) {
    const cls = ['player-panel'];
    if (p.idx === state.currentPlayer && !state.gameOver) cls.push('active');
    if (p.isHuman) cls.push('human');
    const wbm = playerWorkersByMaterial(state, p.idx);
    const pureChips = MAT_KEYS
      .filter(m => wbm[m] > 0)
      .map(m => `<span title="${MATERIALS[m].name}">${MATERIALS[m].icon}${wbm[m]}</span>`);
    // Wild pools are workers on a Driftwood Tangle / Mud Slick; each
    // worker yields either material at build time, so render them as a
    // combined "[icon-a][icon-b]N" chip rather than hiding them.
    const wildChips = (wbm._wildPools || [])
      .filter(pool => pool.count > 0)
      .map(pool => {
        const [a, b] = pool.materials;
        const ma = MATERIALS[a], mb = MATERIALS[b];
        return `<span class="wild-chip" title="${ma.name} or ${mb.name} (wildcard)">`
          + `${ma.icon}/${mb.icon}${pool.count}</span>`;
      });
    const matSummary = [...pureChips, ...wildChips].join(' ')
      || '<span class="small-note">none</span>';
    const totalVPVal = totalVP(p, state);
    let supplyIcons = '';
    for (let i = 0; i < p.supply; i++) {
      supplyIcons += `<span class="worker-meeple" style="background-color:${p.species.color}" title="worker in supply">${speciesIcon(p.species)}</span>`;
    }
    if (p.supply === 0) supplyIcons = `<span class="small-note">all placed</span>`;
    let builtList = '';
    if (p.built.length > 0) {
      const thumbs = p.built.map(b => {
        const used = oncePerGameUsed(p, b.name);
        const slug = b.name.replace(/[^A-Za-z0-9]/g, '');
        // Species-starter cards live in their own deck folder (no cost row).
        const deckDir = b.species ? 'starter-deck' : 'structure-deck';
        const cls = used ? 'built-thumb used' : 'built-thumb';
        const imgUrl = `../${deckDir}/${slug}.png`;
        return `<div class="${cls}" style="background-image:url('${imgUrl}')" data-card-img="${imgUrl}"></div>`;
      }).join('');
      builtList = `<div class="built-thumbs">${thumbs}</div>`;
    }
    let lookoutPeek = '';
    if (p.isHuman && (hasEffect(p, 'Lookout Tree') || hasEffect(p, 'Marsh Lookout')) && state.matDeck.length > 0) {
      const top = state.matDeck[state.matDeck.length - 1];
      lookoutPeek = `<div class="lookout-peek">🔭 Top of deck: <span style="color:${MATERIALS[top.material].color}">${MATERIALS[top.material].icon} ${top.name}</span> · ${top.totalIcons} icons</div>`;
    }
    html += `<div class="${cls.join(' ')}">
      <div class="player-head">
        <div class="player-title">
          <span class="player-pawn-mini" style="background-color:${p.species.color}">${speciesIcon(p.species)}</span>
          ${p.species.name}${p.isHuman ? ' (you)' : ''}
        </div>
        <div class="player-mat-summary">${matSummary}</div>
        <div class="vp" style="color:var(--forest);font-weight:700;">${totalVPVal}★</div>
      </div>
      <div class="player-stats">
        <span class="worker-supply">${supplyIcons}</span>
      </div>
      ${builtList}
      ${lookoutPeek}
    </div>`;
  }
  wrap.innerHTML = html;
}

function renderHand() {
  const wrap = document.getElementById('hand-area');
  const piles = document.getElementById('struct-piles');
  const human = state.players.find(p => p.isHuman);
  if (!human) {
    wrap.classList.add('hidden');
    if (piles) piles.classList.add('hidden');
    return;
  }
  wrap.classList.remove('hidden');
  if (piles) {
    piles.classList.remove('hidden');
    const ds = document.getElementById('struct-deck-stack');
    const xc = document.getElementById('struct-discard-count');
    if (ds) {
      const structTotal = state.structDeck.length + state.structDiscard.length;
      ds.innerHTML = renderDeckStack(state.structDeck.length, structTotal, '../structure-deck/_back.png');
    }
    if (xc) xc.textContent = state.structDiscard.length;
  }
  // Invent button: enabled only on the human's choose-action phase with cards in the structure deck.
  const inventBtn = document.getElementById('hand-invent-btn');
  if (inventBtn) {
    const enabled = state.currentPlayer === human.idx
      && state.phase === 'choose-action'
      && !state.gameOver
      && structAvailable(state) > 0;
    inventBtn.disabled = !enabled;
  }
  const div = document.getElementById('hand-cards');
  if (human.hand.length === 0) {
    div.innerHTML = '<span class="small-note">(empty hand)</span>';
    return;
  }
  const wbm = playerWorkersByMaterial(state, human.idx);
  let html = '';
  human.hand.forEach((s, i) => {
    const buildable = canBuild(s, wbm, human);
    const reqs = affordabilityPills(s, wbm);
    const cls = ['struct-card', 'has-art'];
    if (buildable) cls.push('buildable');
    const isHumanTurn = state.currentPlayer === human.idx;
    // Click on a buildable structure builds it directly — works in both the explicit
    // select-build phase and as a shortcut from choose-action.
    const buildClickable = buildable && (
      state.phase === 'select-build'
      || (state.phase === 'choose-action' && isHumanTurn)
    );
    if (buildClickable) cls.push('selectable');
    if (state.phase === 'browse-keep') {
      cls.push('selectable');
      const isKeep = state.browseSelected && state.browseSelected.has('h' + i);
      cls.push(isKeep ? 'keep-selected' : 'will-discard');
    }
    let onClick = '';
    if (buildClickable) onClick = `onclick="humanSelectBuild(${i})"`;
    if (state.phase === 'browse-keep') onClick = `onclick="toggleBrowseSelect('h${i}')"`;
    const effectLine = s.effect ? `<div class="small-note" style="font-style:italic;font-size:11px;margin-top:2px;">${s.effect}</div>` : '';
    const slug = s.name.replace(/[^A-Za-z0-9]/g, '');
    const imgUrl = `../structure-deck/${slug}.png`;
    const bgStyle = `style="background-image:url('${imgUrl}')"`;
    html += `<div class="${cls.join(' ')}" ${bgStyle} data-card-img="${imgUrl}" ${onClick}>
      <div class="header">
        <span class="cost">${s.time}🐟</span>
        <span class="name">${s.name}</span>
        <span class="vp">${vpDisplay(s)}★</span>
      </div>
      <div class="reqs">${reqs}</div>
      ${effectLine}
    </div>`;
  });
  // Browse drawn cards (each with same keep/discard styling)
  if (state.phase === 'browse-keep' && state.browseDrawn) {
    state.browseDrawn.forEach((s, i) => {
      const reqs = affordabilityPills(s, wbm);
      const cls = ['struct-card', 'has-art', 'selectable'];
      const isKeep = state.browseSelected && state.browseSelected.has('d' + i);
      cls.push(isKeep ? 'keep-selected' : 'will-discard');
      const effectLine = s.effect ? `<div class="small-note" style="font-style:italic;font-size:11px;margin-top:2px;">${s.effect}</div>` : '';
      const slug = s.name.replace(/[^A-Za-z0-9]/g, '');
      const imgUrl = `../structure-deck/${slug}.png`;
      const bgStyle = `style="background-image:url('${imgUrl}')"`;
      html += `<div class="${cls.join(' ')}" ${bgStyle} data-card-img="${imgUrl}" onclick="toggleBrowseSelect('d${i}')">
        <div class="header">
          <span class="cost">${s.time}🐟</span>
          <span class="name">${s.name} <span class="small-note">(new)</span></span>
          <span class="vp">${vpDisplay(s)}★</span>
        </div>
        <div class="reqs">${reqs}</div>
        ${effectLine}
      </div>`;
    });
  }
  div.innerHTML = html;
}

function renderActionPanel() {
  const panel = document.getElementById('action-panel');
  const cur = state.players[state.currentPlayer];
  // The bid + auction-result UI must show even when state.currentPlayer
  // points at an AI — an AI-triggered auction still requires the human
  // to bid and to see the resolution. Treat both phases as panel-visible
  // regardless of whose turn it is. The panel stays in the layout (just
  // with blank content) for all other non-human phases too, so its
  // min-height keeps the surrounding row from collapsing and resizing
  // the structure cards.
  const inHumanBid = state.phase === 'human-bidding' && !!state.humanBidContext;
  const inAuctionResult = state.phase === 'human-auction-result' && !!state.humanAuctionResult;
  // Combined-auction worker placement can also fall to the human after an
  // AI-initiated auction, so force the panel visible there too.
  const inCombinedPlace = state.phase === 'combined-place' && !!state.combinedPlace;
  const forceShow = inHumanBid || inAuctionResult || inCombinedPlace;
  if (state.gameOver) {
    panel.classList.remove('bidding');
    panel.classList.add('hidden');
    panel.innerHTML = '';
    return;
  }
  panel.classList.remove('hidden');
  if (!forceShow && (!cur || !cur.isHuman || state.phase === 'idle')) {
    // Not the human's turn (and we're not blocking on a bid/result prompt).
    // Keep the panel in the row so hand-area's horizontal share stays
    // stable, but show a brief, large "waiting" status — who is acting
    // and how far behind in turn order the human is.
    panel.classList.remove('bidding');
    const human = state.players.find(p => p.isHuman);
    let body = '';
    // All-AI games have no human watching for "ahead in turn order" cues, so
    // the turn-indicator card just churns. Leave the action panel empty.
    if (cur && !cur.isHuman && human) {
      const turnLine = `${cur.species.emoji} ${cur.species.name} is taking their turn.`;
      let trackLine = '';
      if (human && !human.out) {
        // timePos counts forward (lapping bumps by LAP_LENGTH). The player
        // with the lowest timePos acts next, so when an AI is acting the
        // human's pos is >= the AI's; the diff is how many fish the human
        // is "behind in turn order".
        const ahead = Math.max(0, human.timePos - cur.timePos);
        trackLine = ahead === 0
          ? `You're tied with ${cur.species.name} in turn order.`
          : `You are ${ahead}🐟 ahead in turn order.`;
      }
      // No Undo button while it's an AI's turn — once the AI has started
      // acting we can't safely rewind without a race against its in-flight
      // promises. Undo is only offered during the human's own action phases.
      body = `<div class="ai-turn-status">
        <div class="ai-turn-title">${turnLine}</div>
        ${trackLine ? `<div class="ai-turn-sub">${trackLine}</div>` : ''}
      </div>`;
    }
    panel.innerHTML = body;
    // Collapse the wrapper when there's nothing to show (all-AI mode), so
    // the empty panel doesn't reserve vertical space below the player row.
    panel.classList.toggle('hidden', !body);
    return;
  }
  let html = '';
  if (state.phase === 'choose-action') {
    const placed = totalPlacedWorkers(state, cur.idx);
    const hasPreriv = state.prerivCards.some(c => c !== null);
    const abilityBtns = [];
    if (hasEffect(cur, 'Heron Roost') && state.matDeck.length > 0 && canAffordTimeCost(cur, 1) && hasPreriv) {
      abilityBtns.push(`<button class="ability-btn" onclick="humanUseHeronRoost()">🦩 Heron Roost (1🐟): replace Headwaters card</button>`);
    }
    if (hasEffect(cur, 'Driftwood Snag') && canAffordTimeCost(cur, 1)) {
      const anyOpen = [...state.riverCards, ...state.prerivCards.filter(c => c)].some(c => uncoveredIcons(c) > 0);
      if (anyOpen) abilityBtns.push(`<button class="ability-btn" onclick="humanUseDriftwoodSnag()">${MATERIALS.logs.icon} Driftwood Snag (1🐟): drop blank</button>`);
    }
    if (hasEffect(cur, 'Tribute Stone') && !cur.tributeStoneUsed) {
      const anyOpponentWorker = state.riverCards.some(c =>
        Object.keys(c.workers).some(k => parseInt(k) !== cur.idx && c.workers[k] > 0));
      if (anyOpponentWorker) abilityBtns.push(`<button class="ability-btn" onclick="humanUseTributeStone()">${MATERIALS.stones.icon} Tribute Stone (once per game): force opponent recall</button>`);
    }
    if (hasEffect(cur, 'Otter Trail')) {
      const haveMine = state.riverCards.some(c => typeof c.slot === 'number' && workersOnCard(c, cur.idx) > 0);
      const haveOther = state.riverCards.some(c =>
        typeof c.slot === 'number' && Object.keys(c.workers).some(k => c.workers[k] > 0 && (parseInt(k) !== cur.idx || workersOnCard(c, cur.idx) > 1)));
      if (haveMine && haveOther && canAffordTimeCost(cur, 2)) {
        abilityBtns.push(`<button class="ability-btn" onclick="humanUseOtterTrail()">🦦 Otter Trail (pay source 🐟): swap a river worker</button>`);
      }
    }
    // Trading Post: 3-for-2 material consolidation. Costs 1🐟. Needs workers on
    // ≥3 distinct-material cards, ≥1 river card with ≥2 uncovered icons, and
    // ≥2 in supply to place. We don't strictly enforce sources != target
    // material here (let the human pick freely) — the handler restricts in
    // the source-pick step.
    if (hasEffect(cur, 'Trading Post') && canAffordTimeCost(cur, 1) && cur.supply >= 2) {
      const myCardMats = new Set();
      for (const c of [...state.shorelineCards, ...state.riverCards]) {
        if (workersOnCard(c, cur.idx) > 0) myCardMats.add(c.material);
      }
      const anyTarget = state.riverCards.some(c => uncoveredIcons(c) >= 2);
      // Need 3 distinct materials and at least one is != target → we have ≥3
      // distinct, and at least one target candidate exists. (Source-vs-target
      // material disjointness is checked at pick time.)
      if (myCardMats.size >= 3 && anyTarget) {
        abilityBtns.push(`<button class="ability-btn" onclick="humanUseTradingPost()">🏪 Trading Post (1🐟): 3-for-2 material swap</button>`);
      }
    }
    // Snare Set (mink species starter, same shape as Tribute Stone w/ its own once-per-game flag).
    if (hasEffect(cur, 'Snare Set') && !cur.snareSetUsed) {
      const anyOpponentWorker = state.riverCards.some(c =>
        Object.keys(c.workers).some(k => parseInt(k) !== cur.idx && c.workers[k] > 0));
      if (anyOpponentWorker) abilityBtns.push(`<button class="ability-btn" onclick="humanUseSnareSet()">🪤 Snare Set (once per game): force opponent recall</button>`);
    }
    // Tail Slap (beaver species starter): pay 1🐟 to drop a blank on a R1 card.
    if (hasEffect(cur, 'Tail Slap') && canAffordTimeCost(cur, 1)) {
      const anyR1Open = state.riverCards.some(c => c.slot === 0 && uncoveredIcons(c) > 0);
      if (anyR1Open) abilityBtns.push(`<button class="ability-btn" onclick="humanUseTailSlap()">🦫 Tail Slap (1🐟): drop blank on a R1 card</button>`);
    }
    // Channel Clearer (muskrat species starter): free per-turn opponent Reed worker discard.
    if (hasEffect(cur, 'Channel Clearer')) {
      const anyOppReed = state.riverCards.some(c =>
        c.material === 'reeds' && Object.keys(c.workers).some(k => parseInt(k) !== cur.idx && c.workers[k] > 0));
      if (anyOppReed) abilityBtns.push(`<button class="ability-btn" onclick="humanUseChannelClearer()">🐭 Channel Clearer (free): discard an opponent Reed worker</button>`);
    }
    // Rolling Float (otter species starter): once-per-game free same-slot swap.
    if (hasEffect(cur, 'Rolling Float') && !cur.rollingFloatUsed) {
      // Need at least one of MY workers on a card sharing a slot with another card holding an opponent worker.
      let avail = false;
      for (const a of state.riverCards) {
        if (typeof a.slot !== 'number' || workersOnCard(a, cur.idx) <= 0) continue;
        for (const b of state.riverCards) {
          if (b.id === a.id || b.slot !== a.slot) continue;
          if (Object.keys(b.workers).some(k => parseInt(k) !== cur.idx && b.workers[k] > 0)) { avail = true; break; }
        }
        if (avail) break;
      }
      if (avail) abilityBtns.push(`<button class="ability-btn" onclick="humanUseRollingFloat()">🦦 Rolling Float (once per game): swap workers in the same slot</button>`);
    }
    const abilityRow = abilityBtns.length
      ? `<div class="ability-row"><span class="ability-label">Optional abilities:</span>${abilityBtns.join('')}</div>`
      : '';
    // Worker pool that can fund a triggered auction = supply + placed (you can recall before bidding).
    const triggerPool = cur.supply + placed;
    const beaverTowAvail = hasEffect(cur, 'Beaver Tow')
      && canAffordTimeCost(cur, 2)
      && state.riverCards.some(c => typeof c.slot === 'number' && c.slot > 0);
    const salmonRunAvail = hasEffect(cur, 'Salmon Run')
      && cur.supply > 0
      && canAffordTimeCost(cur, 2)
      && state.riverCards.some(c => typeof c.slot === 'number' && uncoveredIcons(c) > 0);
    const combinedAvail = hasCombinedAuctionAbility(cur)
      && triggerPool > 0
      && canAffordTimeCost(cur, 1)
      && combinedAvailable();
    const combinedLabel = DOUBLE_VISION_ACTIVE
      ? 'Double Vision: pool-auction any two cards'
      : 'Confluence: pool-auction two same-symbol cards';
    html = `<div class="action-panel-title">Your turn — choose an action</div>
      <div class="action-buttons">
        <button onclick="humanChooseAction('preriv')" ${(triggerPool > 0 && hasPreriv) ? '' : 'disabled'}>1. Auction Headwaters card (2–4🐟)</button>
        <button onclick="humanChooseAction('auction')" ${(triggerPool > 0 && state.riverCards.some(c => uncoveredIcons(c) > 0)) ? '' : 'disabled'}>2. Auction river card (1🐟)</button>
        <button onclick="humanChooseAction('flush')" ${(triggerPool > 0 && state.matDeck.length > 0) ? '' : 'disabled'}>3. Flush Headwaters (5🐟)</button>
        <button onclick="humanChooseAction('browse')" ${structAvailable(state) > 0 ? '' : 'disabled'}>4. Draw structure cards (N🐟)</button>
        <button class="primary" onclick="humanChooseAction('build')" ${cur.hand.some(s => canBuild(s, playerWorkersByMaterial(state, cur.idx), cur)) ? '' : 'disabled'}>5. Build a structure</button>
        ${beaverTowAvail ? `<button onclick="humanChooseAction('beaverTow')">6. Beaver Tow (2🐟): slide a river card upstream</button>` : ''}
        ${salmonRunAvail ? `<button onclick="humanChooseAction('salmonRun')">7. Salmon Run (1/2/3/5/8🐟): place workers on a single card</button>` : ''}
        ${combinedAvail ? `<button onclick="humanChooseAction('confluence')">8. ${combinedLabel}</button>` : ''}
        ${state.endgame ? `<button class="ghost" onclick="humanRetire()">Retire (endgame)</button>` : ''}
      </div>
      ${abilityRow}
      <div class="action-hint">Tip: click any river or Headwaters card to auction it, or any buildable structure in your hand to build it. Out of supply? You can recall placed workers from the bid dialog.</div>`;
  } else if (state.phase === 'combined-pick') {
    const first = state.combinedPick && state.combinedPick.first;
    const cfg = combinedConfig();
    const src = DOUBLE_VISION_ACTIVE ? '👀 Double Vision' : '🌊 Confluence';
    const same = cfg.pairing === 'same';
    const rate = cfg.item === 'max' ? 'pricier' : 'cheaper';
    const note = first
      ? (same ? 'Now click a second <b>same-symbol</b> card to pool with it.' : 'Now click a <b>second</b> card to pool with it.')
      : (same ? 'Click <b>two same-symbol</b> cards to pool into one auction.' : 'Click <b>any two</b> cards to pool into one auction.');
    html = `<div class="action-panel-title">${src} — pick cards on the board</div>
      <div class="action-buttons">
        <span class="action-hint">${note} Trigger costs the ${rate === 'pricier' ? 'pricier' : 'cheaper'} of the two; items billed at the ${rate} rate; both cards float downriver after.</span>
        <button class="ghost" onclick="humanCancelCombinedPick()">✕ Cancel</button>
      </div>`;
  } else if (state.phase === 'combined-place') {
    const cp = state.combinedPlace;
    const left = cp ? cp.remaining : 0;
    html = `<div class="action-panel-title">Place your workers</div>
      <div class="action-buttons">
        <span class="action-hint">Click either highlighted card to place a worker. <b>${left}</b> left.</span>
      </div>`;
  } else if (state.phase === 'select-auction-card') {
    html = `<div class="action-panel-title">Pick a river card to auction</div>
      <div class="action-buttons">
        <span class="action-hint">Click a card with open icons.</span>
        <button class="ghost" onclick="humanUndoLastMove()">↶ Undo</button>
      </div>`;
  } else if (state.phase === 'select-preriv-card') {
    html = `<div class="action-panel-title">Pick a Headwaters card to auction</div>
      <div class="action-buttons">
        <span class="action-hint">Click a Headwaters card. Move cost depends on the slot (4🐟 / 3🐟 / 2🐟).</span>
        <button class="ghost" onclick="humanUndoLastMove()">↶ Undo</button>
      </div>`;
  } else if (state.phase === 'flush-pick-card') {
    html = `<div class="action-panel-title">Pick which fresh Headwaters card to auction</div>
      <div class="action-buttons">
        <span class="action-hint">Headwaters just refilled. Click any of the new cards to auction it for free (1🐟/item).</span>
        ${state._undoSnapshot ? `<button class="undo-last-btn" onclick="humanUndoLastMove()">↶ Undo</button>` : ''}
      </div>`;
  } else if (state.phase === 'select-build') {
    html = `<div class="action-panel-title">Pick a structure to build</div>
      <div class="action-buttons">
        <span class="action-hint">Click a green-bordered card in your hand.</span>
        <button class="ghost" onclick="humanUndoLastMove()">↶ Undo</button>
      </div>`;
  } else if (state.phase === 'browse-N') {
    html = `<div class="action-panel-title">Draw structure cards — how many?</div>
      <div class="bid-slider-row">
        <span class="small-note">1</span>
        <input id="browse-n" class="bid-slider" type="range" min="1" max="5" value="1"
               oninput="document.getElementById('browse-n-current').textContent = this.value">
        <span class="small-note">5</span>
        <div id="browse-n-current" class="bid-current">1</div>
      </div>
      <div class="action-buttons" style="margin-top:8px;">
        <button class="primary" onclick="humanConfirmBrowseN()">Draw N, then discard N</button>
        <button class="ghost" onclick="humanUndoLastMove()">↶ Undo</button>
      </div>
      <div class="action-hint">Costs N🐟. You'll discard the same number you drew.</div>`;
  } else if (state.phase === 'browse-keep') {
    const keep = state.browseKeepCount;
    const have = state.browseSelected.size;
    const total = (state.browseDrawn ? state.browseDrawn.length : 0) + (state.players.find(p => p.isHuman).hand.length);
    const willDiscard = total - have;
    html = `<div class="action-panel-title">Pick ${keep} card${keep === 1 ? '' : 's'} to <u>keep</u> (selected: ${have}/${keep})</div>
      <div class="action-buttons">
        <span class="action-hint">Click cards (existing hand + new draws) to keep them. Unselected cards (${willDiscard} so far) will be discarded.</span>
        <button class="primary" onclick="humanConfirmBrowseKeep()" ${have === keep ? '' : 'disabled'}>Confirm</button>
        ${state._undoSnapshot ? `<button class="undo-last-btn" onclick="humanUndoLastMove()">↶ Undo</button>` : ''}
      </div>`;
  } else if (state.phase === 'human-bidding') {
    // Inline bid UI — replaces the "Your turn — choose an action" content.
    // humanBidForAuction() stashed all the derived data on state.humanBidContext
    // so we can rebuild the body whenever render() fires (e.g., after an
    // adjustBidRecall click chain that didn't go through innerHTML).
    const ctx = state.humanBidContext;
    if (!ctx) {
      html = `<div class="action-panel-title">Auction in progress…</div>`;
    } else {
      const initRecall = humanBidRecallTotal();
      const initBid = ctx.initBid;
      const initNeedRecall = Math.max(0, initBid - ctx.baseSupply);

      let revealHtml = '';
      if (ctx.opts && ctx.opts.revealedBids) {
        const rows = state.players
          .filter(p => p.idx !== ctx.human.idx && p.idx in ctx.opts.revealedBids)
          .map(p => {
            const b = ctx.opts.revealedBids[p.idx] | 0;
            return `<div class="bidder-row">
              <span class="bidder-name">${p.species.emoji} ${p.species.name}${p.exhausted ? ' 💤' : ''}</span>
              <span><b>${b}</b> worker${b === 1 ? '' : 's'}</span>
            </div>`;
          }).join('');
        revealHtml = `<p class="small-note" style="margin-top:0;">🕵 Spy Mound — you've seen everyone else's bids:</p>
          <div class="auction-bidders">${rows}</div>`;
      }

      let recallHtml = '';
      if (ctx.recallCards.length > 0 && humanBidRecallState) {
        const rows = ctx.recallCards.map(({ c, river }) => {
          const w = humanBidRecallState.maxByCard[c.id] || 0;
          const where = river ? `River ${c.slot + 1}` : 'Shoreline';
          const blankNote = river ? '(drops a blank)' : '(no blank)';
          const v = humanBidRecallState.plan[c.id] || 0;
          return `<div class="bidder-row">
            <span class="bidder-name">${MATERIALS[c.material].icon} ${MATERIALS[c.material].name} <span class="small-note">${where} ${blankNote}</span></span>
            <span style="display:inline-flex; align-items:center; gap:6px;">
              <button type="button" onclick="adjustBidRecall('${c.id}', -1)" style="width:24px;">−</button>
              <span id="bid-recall-${c.id}" style="min-width:22px; text-align:center;"><b>${v}</b></span>
              <button type="button" onclick="adjustBidRecall('${c.id}', 1)" style="width:24px;">+</button>
              <span class="small-note">/ ${w}</span>
            </span>
          </div>`;
        }).join('');
        recallHtml = `
          <div id="bid-recall-section" style="margin-top:10px; padding:8px; border:1px solid var(--bank); border-radius:4px; display:${initNeedRecall > 0 ? '' : 'none'};">
            <div id="bid-recall-header" class="small-note" style="margin-bottom:6px;"></div>
            <div class="auction-bidders">${rows}</div>
          </div>
        `;
      }

      html = `<div class="action-panel-title">🎲 Your bid — ${cardMatIcons(ctx.card)} ${ctx.card.name} <span style="opacity:0.85; font-weight:600;">(${cardMatLabel(ctx.card)})</span> at ${ctx.slotLbl}</div>
        ${revealHtml}
        <p>${ctx.open} icon${ctx.open === 1 ? '' : 's'} open · ${ctx.cost}🐟 per item · minimum bid <b>${ctx.minBid}</b>${ctx.minBid > 0 ? ' (you triggered)' : ''} · maximum <b>${ctx.sliderMax}</b> ${ctx.sliderMax === ctx.open ? '(open icons)' : `(${ctx.baseSupply} supply + up to ${ctx.totalRecallable} recall)`}.</p>
        <div class="bid-slider-row">
          <span class="small-note">${ctx.minBid}</span>
          <input id="human-bid" class="bid-slider" type="range" min="${ctx.minBid}" max="${ctx.sliderMax}" value="${initBid}" oninput="updateBidPreview()">
          <span class="small-note">${ctx.sliderMax}</span>
          <div id="bid-current" class="bid-current">${initBid}</div>
        </div>
        <div class="bid-stats">
          <div class="bid-stat">
            <div class="bid-stat-label">Supply</div>
            <div class="bid-stat-vals">
              <span class="bid-stat-before">${ctx.baseSupply}</span>
              <span class="bid-stat-arrow">→</span>
              <span class="bid-stat-after" id="bid-workers-after">${ctx.baseSupply + initRecall - initBid}</span>
            </div>
            <div class="bid-stat-delta" id="bid-workers-delta">${initRecall > 0 || initBid > 0 ? [initRecall > 0 ? `+${initRecall} recalled` : null, initBid > 0 ? `−${initBid} placed` : null].filter(x => x).join(', ') : 'no change'}</div>
          </div>
          <div class="bid-stat">
            <div class="bid-stat-label">Fish</div>
            <div class="bid-stat-vals">
              <span class="bid-stat-before">${ctx.baseTime}</span>
              <span class="bid-stat-arrow">→</span>
              <span class="bid-stat-after" id="bid-time-after">${ctx.baseTime + initBid * ctx.cost}</span>
            </div>
            <div class="bid-stat-delta" id="bid-time-delta">${initBid > 0 ? '+' + (initBid * ctx.cost) + '🐟 (max — less if jam)' : 'no fish spent'}</div>
          </div>
        </div>
        ${recallHtml}
        <div class="action-buttons" style="margin-top:10px;">
          <button id="bid-submit-btn" class="primary" onclick="state.humanBidContext && state.humanBidContext.submit()">Submit bid</button>
          ${state._undoSnapshot ? `<button class="undo-last-btn" onclick="humanUndoLastMove()">↶ Undo (back to your turn)</button>` : ''}
        </div>`;
    }
  } else if (state.phase === 'human-auction-result') {
    // Auction result UI — also inline (used to be a modal).
    const ctx = state.humanAuctionResult;
    if (!ctx) {
      html = `<div class="action-panel-title">Auction complete</div>`;
    } else {
      const { result, m } = ctx;
      let rows = '';
      for (const p of state.players) {
        if (!(p.idx in result.bids)) continue;
        const bid = result.bids[p.idx];
        const took = result.takings[p.idx] || 0;
        const time = result.timeAdvances[p.idx] || 0;
        const dim = bid === 0 ? ' style="opacity:0.5"' : '';
        let outcomeStr;
        if (bid === 0) outcomeStr = `<span class="small-note">passed</span>`;
        else if (took === 0) outcomeStr = `bid <b>${bid}</b> → <span style="color:#a33">won 0</span>`;
        else if (took === bid) outcomeStr = `bid <b>${bid}</b> → <span style="color:var(--forest)">won <b>${took}</b></span> (+${time}🐟)`;
        else outcomeStr = `bid <b>${bid}</b> → won <b>${took}</b> (+${time}🐟)`;
        rows += `<div class="bidder-row"${dim}>
          <span class="bidder-name">
            <span class="player-pawn-mini" style="background-color:${p.species.color}">${speciesIcon(p.species)}</span>
            ${p.species.name}${p.isHuman ? ' (you)' : ''}
          </span>
          <span>${outcomeStr}</span>
        </div>`;
      }
      let outcomeBox = '';
      if (result.outcome === 'no-bids') {
        outcomeBox = `<div class="result-box info">
          <p><b>No one bid.</b> The card stays where it was — nothing moves.</p>
        </div>`;
      } else if (result.outcome === 'plenty') {
        const leftover = result.leftover;
        let fateLine;
        if (result.combined) {
          fateLine = `<p>Both pooled cards <b>float downriver</b> — a filled card graduates to the shoreline, one with leftovers slides one slot downstream.</p>`;
        } else if (result.cardFate === 'plenty-slid') {
          fateLine = `<p>${leftover} icon${leftover === 1 ? '' : 's'} went unbid. The card <b>drifts into River ${result.cardNewSlot + 1}</b> with its leftover icons, where it can be auctioned again at <b>${result.cardNewCost}🐟</b> per item.</p>`;
        } else if (result.cardFate === 'shoreline-graduated') {
          fateLine = `<p>${leftover} icon${leftover === 1 ? '' : 's'} went unbid. The card was already on the last river space, so it <b>graduates to the shoreline</b> with its workers.</p>`;
        } else {
          fateLine = `<p>Every open icon was claimed — the card has nothing left to auction and <b>drifts to the shoreline</b>.</p>`;
        }
        outcomeBox = `<div class="result-box plenty">
          <p><b>🌟 Plenty to go around.</b> Total bid ${result.totalBid} ≤ ${result.openBefore} open icons, so every bidder took exactly what they bid.</p>
          ${fateLine}
        </div>`;
      } else { // jam
        let fateLine;
        if (result.combined) {
          fateLine = `<p>Both pooled cards <b>float downriver</b> — a filled card graduates to the shoreline, one with leftovers slides one slot downstream.</p>`;
        } else if (result.cardFate === 'shoreline-graduated') {
          fateLine = `<p>The card was already on the last river space, so it <b>graduates to the shoreline</b> with its workers. ${result.leftover} unclaimed icon${result.leftover === 1 ? '' : 's'} no longer matter — shoreline cards can't be auctioned.</p>`;
        } else {
          fateLine = `<p>${result.leftover} icon${result.leftover === 1 ? '' : 's'} stay${result.leftover === 1 ? 's' : ''} uncovered. The card <b>slides to River ${result.cardNewSlot + 1}</b>, where its per-item cost is <b>${result.cardNewCost}🐟</b>.</p>`;
        }
        outcomeBox = `<div class="result-box jam">
          <p><b>🌊 River jams.</b> Total bid (${result.totalBid}) exceeded ${result.openBefore} open icons. Each bidder took <code>max(0, ${result.openBefore} − others' bids)</code>, capped at their own bid. <b>Every worker you bid still costs you fish</b> even if it didn't clinch an icon — workers that didn't win return to your supply.</p>
          ${fateLine}
        </div>`;
      }
      const resultCardShape = { material: result.cardMaterial, wildAlt: result.cardWildAlt };
      html = `<div class="action-panel-title">🎲 ${cardMatIcons(resultCardShape)} ${result.cardName || m.name} <span style="opacity:0.85; font-weight:600;">(${cardMatLabel(resultCardShape)})</span> — auction result</div>
        <p class="small-note">${result.openBefore} open icon${result.openBefore === 1 ? '' : 's'} going in · ${result.costAtAuction}🐟 per item</p>
        <div class="auction-bidders">${rows}</div>
        ${outcomeBox}
        <div class="action-buttons" style="margin-top:10px;">
          <button class="primary" onclick="state.humanAuctionResult && state.humanAuctionResult.dismiss()">Dismiss</button>
        </div>`;
    }
  }
  // Toggle the pulsing-glow "bidding" treatment on the panel itself.
  panel.classList.toggle('bidding', state.phase === 'human-bidding');
  panel.innerHTML = html;
}

function renderLog() {
  const wrap = document.getElementById('log-area');
  if (!wrap) return;
  const last = state.log.slice(-50).reverse();
  wrap.innerHTML = last.map((l, i) => `<div class="log-line ${i === 0 ? 'recent' : ''}">${l.msg}</div>`).join('');
}

// =============================================================================
// RIVER MANAGEMENT
// =============================================================================
function moveCardToShoreline(card) {
  // Fire end-of-river effects (solo / most-workers bonuses) before clearing slot.
  fireOnShoreline(card);
  card.blanks = 0;
  if (card.slot === 'pre') {
    const idx = prerivIndexOf(card);
    if (idx !== -1) refillPreriv(idx);
  } else {
    state.riverCards = state.riverCards.filter(c => c !== card);
  }
  card.slot = 'shore';
  state.shorelineCards.push(card);
  log(`📍 ${MATERIALS[card.material].icon} ${card.name} drifts to the shoreline.`);
}

// End-of-life effect dispatcher: fires when a card moves from river → shoreline.
//   solo-bonus    → if exactly one player has workers here, that player moves
//                   backward on the fish track by N spaces per worker (Hidden Inlet).
//   most-workers  → player with strictly most workers moves backward N spaces;
//                   ties grant no bonus (Mud Wallow, Cattail Cluster).
function fireOnShoreline(card) {
  if (!card.effect) return;
  const entries = Object.entries(card.workers).filter(([, n]) => n > 0);
  if (entries.length === 0) return;
  const spec = card.effectSpec;
  if (card.effect === 'solo-bonus') {
    if (entries.length !== 1) return;
    const idx = parseInt(entries[0][0]);
    const count = entries[0][1];
    const spaces = count * (spec.bonusPerWorker || 1);
    moveBackward(state, idx, spaces);
    log(`🐟 ${spec.name}: P${idx + 1} solo bonus — back ${spaces} on fish track (${count} worker${count === 1 ? '' : 's'}).`);
    return;
  }
  if (card.effect === 'most-workers') {
    entries.sort((a, b) => b[1] - a[1]);
    if (entries.length > 1 && entries[0][1] === entries[1][1]) {
      log(`🐟 ${spec.name}: most-workers tie — no bonus.`);
      return;
    }
    const idx = parseInt(entries[0][0]);
    const spaces = spec.flatBonus || 0;
    moveBackward(state, idx, spaces);
    log(`🐟 ${spec.name}: P${idx + 1} most-workers bonus — back ${spaces} on fish track.`);
    return;
  }
}

// Slipping Sandbar: after an auction with placement, slide upstream (toward R1)
// instead of downstream. At R1 with uncovered icons remaining, retire to shoreline.
function slidesSandbarUpstream(card) {
  if (card.slot === 0) {
    log(`🌊 ${card.effectSpec.name} slips past River 1 — retires to shoreline.`);
    moveCardToShoreline(card);
    return;
  }
  card.slot -= 1;
  log(`🌊 ${card.effectSpec.name} slips upstream to River ${card.slot + 1} (${riverSlotCost(card.slot)}🐟/item).`);
}

function jamCardDownriver(card) {
  if (card.slot === 'pre') {
    // Upstream card drifts down: it normally enters River 1 (slot 0). Refill upstream queue.
    // Slipping Sandbar enters at River 4 instead (see MATERIALS.md).
    const idx = prerivIndexOf(card);
    card.slot = (card.effect === 'slipping-sandbar') ? 3 : 0;
    state.riverCards.push(card);
    if (idx !== -1) refillPreriv(idx);
    log(`💨 ${MATERIALS[card.material].icon} ${card.name} drifts from the Headwaters into River ${card.slot + 1} (${riverSlotCost(card.slot)}🐟/item).`);
    return;
  }
  // Cost is slot-based: drifting to a higher slot raises the per-item cost automatically.
  const newSlot = card.slot + 1;
  if (newSlot > 3) {
    moveCardToShoreline(card);
    return;
  }
  card.slot = newSlot;
  log(`💨 ${MATERIALS[card.material].icon} ${card.name} drifts to River ${newSlot + 1} (${riverSlotCost(newSlot)}🐟/item).`);
}

// =============================================================================
// PRE-RIVER MANAGEMENT
// =============================================================================
// Cards behind the emptied slot drift one step toward the river; slot 0
// (farthest upstream) refills from the deck.
function refillPreriv(emptiedIdx) {
  for (let i = emptiedIdx; i > 0; i--) {
    state.prerivCards[i] = state.prerivCards[i - 1];
  }
  state.prerivCards[0] = null;
  if (state.matDeck.length > 0) {
    const c = state.matDeck.pop();
    c.slot = 'pre';
    state.prerivCards[0] = c;
    log(`⬇ ${MATERIALS[c.material].icon} ${c.name} (${MATERIALS[c.material].name}) refills Headwaters 3.`);
  }
}

function prerivIndexOf(card) {
  return state.prerivCards.indexOf(card);
}

// Cleanup shoreline cards that have no workers
function cleanupShoreline() {
  state.shorelineCards = state.shorelineCards.filter(c => {
    const totalWorkers = Object.values(c.workers).reduce((s, n) => s + n, 0);
    if (totalWorkers === 0) {
      log(`🌊 empty ${MATERIALS[c.material].name} card removed from shoreline.`);
      return false;
    }
    return true;
  });
}

// =============================================================================
// CALL WORKERS HOME
// =============================================================================
function callWorkersHome(playerIdx, recallSpec) {
  // recallSpec: array of {cardId, count}
  const p = state.players[playerIdx];
  let total = 0;
  for (const r of recallSpec) {
    const card = state.riverCards.find(c => c.id === r.cardId) || state.shorelineCards.find(c => c.id === r.cardId);
    if (!card) continue;
    const have = workersOnCard(card, playerIdx);
    const take = Math.min(have, r.count);
    if (take === 0) continue;
    card.workers[playerIdx] = have - take;
    if (card.workers[playerIdx] === 0) delete card.workers[playerIdx];
    // For river cards: drop a blank on each uncovered icon; for shoreline: no blank.
    if (typeof card.slot === 'number') card.blanks += take;
    p.supply += take;
    total += take;
  }
  if (total > 0) {
    log(`🏠 ${speciesLabel(p)} calls ${total} worker${total === 1 ? '' : 's'} home.`);
    // Otter Den: slide back 1 fish per worker recalled.
    if (hasEffect(p, 'Otter Den')) {
      const before = p.timePos;
      p.timePos = Math.max(0, p.timePos - total);
      log(`🦦 Otter Den: ${speciesLabel(p)} slides back ${before - p.timePos} on the fish track.`);
    }
  }
  cleanupShoreline();
}

// =============================================================================
// AUCTION
// =============================================================================
async function runAuction(card, triggerPlayerIdx, minBidTrigger) {
  // Floodgate: AI auto-uses; human is prompted (it's once-per-game, so you may want to save it).
  const trig = state.players[triggerPlayerIdx];
  if (!card.combinedPair && hasEffect(trig, 'Floodgate') && !trig.floodgateUsed && typeof card.slot === 'number' && card.slot > 0) {
    let useIt = true;
    if (trig.isHuman) {
      const newSlotCost = riverSlotCost(card.slot - 1);
      const oldSlotCost = riverSlotCost(card.slot);
      useIt = await confirmModal(
        '🚪 Floodgate?',
        `Slide this card from River ${card.slot + 1} (${oldSlotCost}🐟/item) up to River ${card.slot} (${newSlotCost}🐟/item) before the auction? Once-per-game.`
      );
    }
    if (useIt) {
      card.slot -= 1;
      trig.floodgateUsed = true;
      log(`🚪 Floodgate: ${speciesLabel(trig)} slides the card 1 space toward the Headwaters.`);
    }
  }
  // Collect bids: AIs decide privately; human inputs via modal.
  state.phase = 'auction-bidding';
  const m = MATERIALS[card.material];
  const slotLbl = card.slot === 'pre' ? 'Headwaters' : `River ${card.slot + 1}`;
  log(`🎲 Auction begins on ${cardMatIcons(card)} ${card.name} (${cardMatLabel(card)}) at ${slotLbl} (${cardCost(card)}🐟/item, ${uncoveredIcons(card)} icons open).`);

  // Spy Mound / Quick Strike: holders can defer their bid until after others
  // reveal. AIs auto-defer if eligible AND the card's material matches at
  // least one hand structure (so the once-per-game Spy Mound isn't wasted).
  //   - Spy Mound: once per game.
  //   - Quick Strike (mink species starter): unlimited.
  const wantsMaterial = (p) => {
    const mats = card.wildAlt ? [card.material, card.wildAlt] : [card.material];
    return p.hand.some(s => mats.some(m => (s.cost[m] || 0) > 0));
  };
  // Spy Mound is once-per-game; save it for auctions where perfect info
  // actually matters. Gate: card has ≥4 uncovered icons AND the player has
  // ≥2 unmet deficit in this material across some hand card.
  const spyMoundWorthIt = (p) => {
    if (uncoveredIcons(card) < 4) return false;
    const mats = card.wildAlt ? [card.material, card.wildAlt] : [card.material];
    const wbm = playerWorkersByMaterial(state, p.idx);
    let maxDeficit = 0;
    for (const s of p.hand) {
      for (const m of mats) {
        const need = s.cost[m] || 0;
        if (need === 0) continue;
        const deficit = Math.max(0, need - (wbm[m] || 0));
        if (deficit > maxDeficit) maxDeficit = deficit;
      }
    }
    return maxDeficit >= 2;
  };
  let deferredAi = -1;
  let deferredAiViaQuickStrike = false;
  for (const p of state.players) {
    if (p.isHuman) continue;
    if (hasEffect(p, 'Spy Mound') && !p.spyMoundUsed && !p.exhausted && !p.out && spyMoundWorthIt(p)) {
      deferredAi = p.idx;
      break;
    }
  }
  if (deferredAi === -1) {
    for (const p of state.players) {
      if (p.isHuman) continue;
      if (hasEffect(p, 'Quick Strike') && !p.exhausted && !p.out && wantsMaterial(p)) {
        deferredAi = p.idx;
        deferredAiViaQuickStrike = true;
        break;
      }
    }
  }
  const human = state.players.find(p => p.isHuman);
  let deferredHuman = -1;
  let deferredHumanViaQuickStrike = false;
  if (human && !human.out && !human.exhausted && deferredAi === -1) {
    // Prefer Spy Mound (one-shot resource) if available; fall back to Quick
    // Strike (unlimited mink species starter) otherwise. Only one prompt either way.
    if (hasEffect(human, 'Spy Mound') && !human.spyMoundUsed) {
      startHumanTimer();
      let useIt;
      try {
        useIt = await confirmModal(
          '🕵 Spy Mound — defer your bid?',
          `Wait for ${state.players.length - 1} other player${state.players.length - 1 === 1 ? '' : 's'} to reveal their bids before you decide yours? Once-per-game.`
        );
      } finally {
        stopHumanTimer();
      }
      if (useIt) {
        deferredHuman = human.idx;
        human.spyMoundUsed = true;
      }
    } else if (hasEffect(human, 'Quick Strike')) {
      startHumanTimer();
      let useIt;
      try {
        useIt = await confirmModal(
          '⚡ Quick Strike — defer your bid?',
          `Wait for ${state.players.length - 1} other player${state.players.length - 1 === 1 ? '' : 's'} to reveal their bids before you decide yours? No use limit.`
        );
      } finally {
        stopHumanTimer();
      }
      if (useIt) {
        deferredHuman = human.idx;
        deferredHumanViaQuickStrike = true;
      }
    }
  }
  const bids = {};
  for (const p of state.players) {
    if (p.isHuman) continue;
    if (p.exhausted || p.out) { bids[p.idx] = 0; continue; }
    if (p.idx === deferredAi) continue;
    const minBid = (p.idx === triggerPlayerIdx) ? minBidTrigger : 0;
    bids[p.idx] = aiDecideBid(p.idx, card, minBid);
  }
  // Re-render so any AI pre-auction recalls (blanks dropped, supplies grown) are
  // visible behind the human's bid dialog.
  if (human && !human.out && !human.exhausted) render();
  if (human) {
    if (human.out) {
      bids[human.idx] = 0;
    } else if (human.exhausted) {
      bids[human.idx] = 0;
      log(`💤 ${speciesLabel(human)} is exhausted — auto-passes (bid 0).`);
    } else if (human.idx === deferredHuman) {
      // Resolved below after all other bids are visible.
    } else {
      const minBid = (human.idx === triggerPlayerIdx) ? minBidTrigger : 0;
      startHumanTimer();
      try {
        bids[human.idx] = await humanBidForAuction(card, human, minBid);
      } finally {
        stopHumanTimer();
      }
    }
  }
  // Spy Mound / Quick Strike deferred bid resolves now (after reveals). Uses
  // aiDecideBid (which considers material need) capped at remaining room so
  // we never jam — old "fill to capacity" logic over-bid on materials the
  // player didn't want, which compounded badly for Quick Strike's unlimited use.
  if (deferredAi !== -1) {
    const sp = state.players[deferredAi];
    if (!deferredAiViaQuickStrike) sp.spyMoundUsed = true;
    const open = uncoveredIcons(card);
    const others = Object.values(bids).reduce((s, b) => s + b, 0);
    const room = open - others;
    const minBid = (deferredAi === triggerPlayerIdx) ? minBidTrigger : 0;
    let bid = aiDecideBid(sp.idx, card, minBid);
    if (room <= 0) {
      bid = deferredAi === triggerPlayerIdx ? Math.max(minBidTrigger, 1) : 0;
    } else {
      bid = Math.min(bid, room);
      if (deferredAi === triggerPlayerIdx) bid = Math.max(bid, minBidTrigger);
    }
    bids[sp.idx] = bid;
    const label = deferredAiViaQuickStrike ? 'Quick Strike' : 'Spy Mound';
    log(`🕵 ${label}: ${speciesLabel(sp)} bids ${bid} after seeing reveals.`);
  }
  if (deferredHuman !== -1) {
    const sp = state.players[deferredHuman];
    const minBid = (deferredHuman === triggerPlayerIdx) ? minBidTrigger : 0;
    startHumanTimer();
    try {
      bids[sp.idx] = await humanBidForAuction(card, sp, minBid, { revealedBids: { ...bids } });
    } finally {
      stopHumanTimer();
    }
    const label = deferredHumanViaQuickStrike ? '⚡ Quick Strike' : '🕵 Spy Mound';
