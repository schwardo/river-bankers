    log(`${label}: ${speciesLabel(sp)} bids ${bids[sp.idx]} after seeing reveals.`);
  }

  // Compact bid summary for the log
  const summary = state.players.filter(p => p.idx in bids)
    .map(p => `${p.species.emoji}${bids[p.idx]}`).join(' ');
  log(`🤐 Bids: ${summary}`);

  if (card.combinedPair) {
    // The combined resolver shows the result, then runs board/in-turn placement.
    await resolveCombinedAuction(card, bids, triggerPlayerIdx);
  } else {
    const result = resolveAuction(card, bids);
    // Re-render so the modal can sit on top of an updated board state
    render();
    if (state.players.some(p => p.isHuman)) {
      startHumanTimer();
      try {
        await showAuctionResult(result);
      } finally {
        stopHumanTimer();
      }
    } else {
      await showAuctionResult(result);
    }
  }
  state.phase = 'idle';
  render();
}

function resolveAuction(card, bids) {
  const m = MATERIALS[card.material];
  const open = uncoveredIcons(card);
  const totalBid = Object.values(bids).reduce((s, n) => s + n, 0);

  const result = {
    cardMaterial: card.material,
    cardWildAlt: card.wildAlt || null,
    cardName: card.name,
    costAtAuction: cardCost(card),
    openBefore: open,
    totalBid,
    bids: { ...bids },         // playerIdx -> bid
    takings: {},               // playerIdx -> won
    timeAdvances: {},          // playerIdx -> +time
    outcome: 'no-bids',        // 'no-bids' | 'plenty' | 'jam'
    leftover: 0,
    cardFate: 'stays',         // 'stays' | 'shoreline-from-plenty' | 'shoreline-graduated' | 'jammed' | 'plenty-slid'
    cardNewSlot: null,
    cardNewCost: null,
  };
  for (const idxStr in bids) result.takings[parseInt(idxStr)] = 0;

  if (totalBid === 0) {
    log(`💤 No bids — ${m.name} card stays put.`);
    return result;
  }

  const playerBidPairs = Object.entries(bids)
    .filter(([_, b]) => b > 0)
    .map(([idx, b]) => ({ idx: parseInt(idx), bid: b }));

  if (totalBid <= open) {
    result.outcome = 'plenty';
    for (const { idx, bid } of playerBidPairs) {
      const p = state.players[idx];
      p.supply -= bid;
      card.workers[idx] = (card.workers[idx] || 0) + bid;
      const timeAdvance = bid * playerCardCost(card, idx);
      advancePlayer(idx, timeAdvance);
      result.takings[idx] = bid;
      result.timeAdvances[idx] = timeAdvance;
      log(`✅ ${speciesLabel(p)} wins ${bid} icon${bid === 1 ? '' : 's'} (advance ${timeAdvance}🐟).`);
    }
    result.leftover = open - totalBid;
    if (result.leftover > 0) {
      // Any plenty-with-leftovers slides one slot downriver (uniform rule).
      // Pre→R1, R1→R2, R2→R3, R3→R4, R4→shoreline.
      // Slipping Sandbar overrides: with workers placed, slide upstream instead.
      const m = MATERIALS[card.material];
      const wasOnLastSlot = card.slot === 3;
      const sandbarDrift = card.effect === 'slipping-sandbar' && totalBid > 0 && typeof card.slot === 'number';
      if (sandbarDrift) {
        slidesSandbarUpstream(card);
      } else {
        jamCardDownriver(card);
      }
      if (card.slot === 'shore' || (!sandbarDrift && wasOnLastSlot)) {
        log(`🌊 ${result.leftover} icon${result.leftover === 1 ? '' : 's'} unbid — ${m.icon} ${m.name} card graduates to the shoreline.`);
        result.cardFate = 'shoreline-graduated';
      } else {
        result.cardFate = 'plenty-slid';
        result.cardNewSlot = card.slot;
        result.cardNewCost = cardCost(card);
      }
    } else {
      // Every icon claimed — card has nothing left to auction.
      moveCardToShoreline(card);
      result.cardFate = 'shoreline-from-plenty';
    }
  } else {
    result.outcome = 'jam';
    let totalTaken = 0;
    for (const { idx, bid } of playerBidPairs) {
      const p = state.players[idx];
      const others = totalBid - bid;
      const got = Math.max(0, Math.min(bid, open - others));
      if (got > 0) {
        p.supply -= got;
        card.workers[idx] = (card.workers[idx] || 0) + got;
      }
      // Pay-for-bid: every worker you bid costs time, even those that won nothing.
      // Workers that didn't clinch an icon return to your supply for free.
      // Otter Raft: when jammed (got < bid), pay fish for one fewer worker.
      let billable = bid;
      if (got < bid && hasEffect(p, 'Otter Raft')) billable = Math.max(0, bid - 1);
      const timeAdvance = billable * playerCardCost(card, idx);
      advancePlayer(idx, timeAdvance);
      result.takings[idx] = got;
      result.timeAdvances[idx] = timeAdvance;
      if (got > 0) {
        log(`✅ ${speciesLabel(p)} bid ${bid}, took ${got} (advance ${timeAdvance}🐟).`);
      } else {
        log(`✗ ${speciesLabel(p)} bid ${bid}, took 0 (advance ${timeAdvance}🐟 for the bid).`);
      }
      totalTaken += got;
    }
    result.leftover = open - totalTaken;
    const wasOnLastSlot = card.slot === 3;
    // Slipping Sandbar: if any workers landed this auction, drift upstream
    // instead of the normal downstream jam.
    const sandbarDrift = card.effect === 'slipping-sandbar' && totalTaken > 0 && typeof card.slot === 'number';
    if (sandbarDrift) {
      slidesSandbarUpstream(card);
    } else {
      jamCardDownriver(card);
    }
    if (card.slot === 'shore' || (!sandbarDrift && wasOnLastSlot)) {
      result.cardFate = 'shoreline-graduated';
    } else {
      result.cardFate = 'jammed';
      result.cardNewSlot = card.slot;
      result.cardNewCost = cardCost(card);
    }
  }
  return result;
}

// =============================================================================
// COMBINED two-card auction — reaches the table two ways:
//   • Confluence structure card (per builder): same-symbol pair, min trigger,
//     billed at the cheaper card's rate, cards filled A→B.
//   • Double Vision (an "Optional Rules" card, all players): ANY two cards,
//     max trigger, billed at the pricier rate; winners place each clinched
//     worker on whichever card they need more, in player order.
// Both float both cards downriver afterward.
// =============================================================================
const COMBINED_AUCTION_PROFILES = { Confluence: { pairing: 'same', trigger: 'min', item: 'min' } };
const DOUBLE_VISION = { name: 'Double Vision', type: 'Optional Rules', config: { pairing: 'any', trigger: 'max', item: 'max' } };
let DOUBLE_VISION_ACTIVE = false; // set at setup from the Optional Rules checkbox
function combinedConfig() {
  return DOUBLE_VISION_ACTIVE ? DOUBLE_VISION.config : COMBINED_AUCTION_PROFILES.Confluence;
}
// The combined auction is available to a player who built Confluence, or to ALL
// players when the Double Vision Optional Rule is in play.
function hasCombinedAuctionAbility(p) { return DOUBLE_VISION_ACTIVE || hasEffect(p, 'Confluence'); }
// 🐟 cost to initiate a single-card auction on `card` (river = 1, Headwaters =
// slot-based). The combined trigger is the min/max of its two cards' triggers.
function singleAuctionTriggerCost(card) {
  return card.slot === 'pre' ? prerivTriggerCost(prerivIndexOf(card)) : 1;
}
function combinedTriggerCost(cardA, cardB) {
  const a = singleAuctionTriggerCost(cardA), b = singleAuctionTriggerCost(cardB);
  return combinedConfig().trigger === 'max' ? Math.max(a, b) : Math.min(a, b);
}
// Virtual pooled card: combined uncovered icons, billed at the cheaper ('min')
// or pricier ('max') card's per-item rate per the active config. wildAlt lets
// the bid AI value either material when the two cards differ. combinedPair
// routes resolveAuction to the combined path and lets the shared bid pipeline
// (runAuction) drive the pooled auction.
function makeVirtualCombinedCard(cardA, cardB) {
  const ref = combinedConfig().item === 'max'
    ? (cardCost(cardA) >= cardCost(cardB) ? cardA : cardB)
    : (cardCost(cardA) <= cardCost(cardB) ? cardA : cardB);
  return {
    id: 'combined', material: cardA.material,
    wildAlt: cardA.material !== cardB.material ? cardB.material : null,
    name: 'Combined pool', totalIcons: uncoveredIcons(cardA) + uncoveredIcons(cardB),
    slot: ref.slot, workers: {}, blanks: 0, effect: null, effectSpec: null,
    combinedPair: [cardA, cardB],
  };
}
function runCombinedAuction(cardA, cardB, triggerPlayerIdx, minBidTrigger) {
  return runAuction(makeVirtualCombinedCard(cardA, cardB), triggerPlayerIdx, minBidTrigger);

async function resolveCombinedAuction(virtual, bids, triggerPlayerIdx) {
  const [cardA, cardB] = virtual.combinedPair;
  const m = MATERIALS[virtual.material];
  let remA = uncoveredIcons(cardA), remB = uncoveredIcons(cardB);
  const open = remA + remB;
  const totalBid = Object.values(bids).reduce((s, n) => s + n, 0);
  const result = {
    cardMaterial: virtual.material, cardWildAlt: null,
    cardName: `${cardA.name} + ${cardB.name}`, costAtAuction: cardCost(virtual),
    openBefore: open, totalBid, bids: { ...bids }, takings: {}, timeAdvances: {},
    outcome: 'no-bids', leftover: 0, cardFate: 'combined-floated',
    cardNewSlot: null, cardNewCost: null, combined: true,
  };
  for (const idxStr in bids) result.takings[parseInt(idxStr)] = 0;
  if (totalBid === 0) {
    log(`💤 No bids — both ${m.name} cards still float downriver.`);
    finalizeCombinedCard(cardA);
    finalizeCombinedCard(cardB);
    return result;
  }
  const pairing = combinedConfig().pairing;
  const isJam = totalBid > open;
  result.outcome = isJam ? 'jam' : 'plenty';
  // Processing/placement walks CLOCKWISE from the player who initiated.
  const nP = state.players.length;
  const order = [];
  for (let k = 0; k < nP; k++) {
    const idx = (triggerPlayerIdx + k) % nP;
    if ((bids[idx] || 0) > 0) order.push(idx);
  }
  // Pass 1 — the RESULT: clinch (zero-sum on the combined pool), fish billing,
  // supply spent. Shown to everyone BEFORE any worker is placed.
  const got = {};
  let totalTaken = 0;
  for (const idx of order) {
    const p = state.players[idx];
    const bid = bids[idx];
    let g = bid, billable = bid;
    if (isJam) {
      g = Math.max(0, Math.min(bid, open - (totalBid - bid)));
      if (g < bid && hasEffect(p, 'Otter Raft')) billable = Math.max(0, bid - 1);
    }
    got[idx] = g;
    p.supply -= g;
    const timeAdvance = billable * playerCardCost(virtual, idx);
    advancePlayer(idx, timeAdvance);
    result.takings[idx] = g; result.timeAdvances[idx] = timeAdvance;
    if (!isJam) log(`✅ ${speciesLabel(p)} wins ${g} icon${g === 1 ? '' : 's'} (advance ${timeAdvance}🐟).`);
    else if (g > 0) log(`✅ ${speciesLabel(p)} bid ${bid}, took ${g} (advance ${timeAdvance}🐟).`);
    else log(`✗ ${speciesLabel(p)} bid ${bid}, took 0 (advance ${timeAdvance}🐟 for the bid).`);
    totalTaken += g;
  }
  result.leftover = open - totalTaken;
  // Show the result FIRST — then players place their won workers.
  render();
  if (state.players.some(p => p.isHuman)) {
    startHumanTimer();
    try { await showAuctionResult(result); } finally { stopHumanTimer(); }
  } else {
    await showAuctionResult(result);
  }
  // Pass 2 — PLACEMENT, ONE worker at a time going CLOCKWISE from the initiator,
  // like a real game: you place a worker (click a card), then each AI places one
  // (its pick is logged + shown on the board) before it comes back to you.
  // ('same' pairing has no choice — both cards share a symbol — so it just fills
  //  cardA then cardB.)
  const placeOne = (idx, card) => { card.workers[idx] = (card.workers[idx] || 0) + 1; if (card === cardA) remA--; else remB--; };
  const hasHuman = state.players.some(p => p.isHuman);
  const remaining = {};
  for (const idx of order) remaining[idx] = got[idx];
  while (order.some(idx => remaining[idx] > 0) && (remA > 0 || remB > 0)) {
    for (const idx of order) {
      if (remaining[idx] <= 0 || (remA <= 0 && remB <= 0)) continue;
      const p = state.players[idx];
      if (pairing === 'any' && p.isHuman) {
        const split = await humanPlaceWorkersOnBoard(idx, cardA, cardB, 1, remA, remB);
        remA -= split.toA; remB -= split.toB;
      } else {
        const card = (pairing === 'any')
          ? choosePlacementCard(idx, cardA, cardB, remA, remB)
          : (remA > 0 ? cardA : (remB > 0 ? cardB : null));
        if (!card) { remaining[idx] = 0; continue; }
        placeOne(idx, card);
        if (!p.isHuman) {
          log(`📍 ${speciesLabel(p)} places a worker on ${cardMatIcons(card)} ${MATERIALS[card.material].name} (${card.slot === 'pre' ? 'Headwaters' : 'River ' + (card.slot + 1)}).`);
          if (hasHuman) { render(); await sleep(550); }
        }
      }
      remaining[idx]--;
    }
  }
  finalizeCombinedCard(cardA);
  finalizeCombinedCard(cardB);
  return result;
}
// Confluence finder (AI): the same-material pair of available cards (river +
// Headwaters, ≥1 open icon) that best serves the player's hand needs. Scored
// like single-card auction targets so the two compare directly.
function findCombinedAuctionTarget(playerIdx, needs, triggerPool) {
  if (triggerPool <= 0) return null;
  let best = null;
  for (const mat of MAT_KEYS) {
    const need = needs[mat];
    if (need === 0) continue;
    const cards = [...state.riverCards, ...state.prerivCards.filter(c => c)]
      .filter(c => c.material === mat && uncoveredIcons(c) > 0);
    if (cards.length < 2) continue;
    cards.sort((a, b) => uncoveredIcons(b) - uncoveredIcons(a));
    const A = cards[0], B = cards[1];
    const got = Math.min(uncoveredIcons(A) + uncoveredIcons(B), triggerPool, need);
    const perItem = Math.min(playerCardCost(A, playerIdx), playerCardCost(B, playerIdx));
    const score = need * got - perItem * got * 0.4 - combinedTriggerCost(A, B) * 0.6;
    if (!best || score > best.score) best = { A, B, score };
  }
  return best;
}
// 'any'-pairing finder (Double Vision): the two highest-scoring distinct cards
// the player needs, regardless of material — so one action can serve two needs.
function findCombinedAuctionTargetAny(playerIdx, needs, triggerPool) {
  if (triggerPool <= 0) return null;
  const avail = [...state.riverCards, ...state.prerivCards.filter(c => c)]
    .filter(c => uncoveredIcons(c) > 0 && needs[c.material] > 0);
  if (avail.length < 2) return null;
  const scored = avail.map(c => {
    const g = Math.min(uncoveredIcons(c), needs[c.material]);
    return { c, score: needs[c.material] * g - playerCardCost(c, playerIdx) * g * 0.4 };
  }).sort((a, b) => b.score - a.score);
  const A = scored[0].c, B = scored[1].c;
  const remNeed = { ...needs };
  let pool = triggerPool, combined = 0;
  for (const c of [A, B]) {
    const g = Math.max(0, Math.min(uncoveredIcons(c), remNeed[c.material], pool));
    combined += needs[c.material] * g - playerCardCost(c, playerIdx) * g * 0.4;
    remNeed[c.material] -= g; pool -= g;
  }
  return { A, B, score: combined - combinedTriggerCost(A, B) * 0.6 };
}
// Pick the finder matching the active pairing rule.
function findCombinedTarget(playerIdx, needs, triggerPool) {
  return combinedConfig().pairing === 'any'
    ? findCombinedAuctionTargetAny(playerIdx, needs, triggerPool)
    : findCombinedAuctionTarget(playerIdx, needs, triggerPool);
}
// True when the human could currently trigger a combined auction: ≥2 open cards
// (any pairing), or ≥2 same-symbol open cards (Confluence's 'same' pairing).
function combinedAvailable() {
  const open = [...state.riverCards, ...state.prerivCards.filter(c => c)].filter(c => uncoveredIcons(c) > 0);
  if (combinedConfig().pairing === 'any') return open.length >= 2;
  const byMat = {};
  for (const c of open) byMat[c.material] = (byMat[c.material] || 0) + 1;
  return Object.values(byMat).some(n => n >= 2);
}

// Auction outcome — also rendered inline in the action panel rather than a
// modal. renderActionPanel('human-auction-result') reads
// state.humanAuctionResult to build the body; Dismiss clears the slot and
// the panel falls through to empty content (action-panel.min-height keeps
// surrounding layout from jumping).
async function showAuctionResult(result) {
  if (!state.players.some(p => p.isHuman)) return;
  return new Promise(resolve => {
    state.humanAuctionResult = {
      result,
      m: MATERIALS[result.cardMaterial],
      dismiss: () => {
        state.humanAuctionResult = null;
        // Park in 'auction-bidding' so the action panel goes blank rather
        // than reverting to "Your turn" (the outer auction loop sets the
        // real next phase after we resolve).
        state.phase = 'auction-bidding';
        resolve();
        render();
      },
    };
    state.phase = 'human-auction-result';

// =============================================================================
// AI: BIDDING
// =============================================================================
function aiDecideBid(playerIdx, card, minBid) {
  const p = state.players[playerIdx];
  const open = uncoveredIcons(card);
  const { safe, fallback } = aiRecallBudget(playerIdx);
  const safeCount = safe.reduce((s, x) => s + x.count, 0);
  const fallbackCount = fallback.reduce((s, x) => s + x.count, 0);
  // For non-trigger bids: only consider supply + safe-recallable. For trigger
  // bids: also dip into fallback (at-cap workers) to satisfy the min-bid.
  const safePool = p.supply + safeCount;
  const totalPool = safePool + fallbackCount;
  if (totalPool === 0) return Math.min(0, minBid);
  if (open === 0) return Math.min(totalPool, minBid);

  // How many of this material does the AI need overall (across hand structures)?
  // Wildcards (Driftwood Tangle, Mud Slick): include the alt material's deficit
  // since a wild worker can fulfill either.
  const wbm = playerWorkersByMaterial(state, playerIdx);
  const matsForNeed = card.wildAlt ? [card.material, card.wildAlt] : [card.material];
  let need = 0;
  let maxNeed = 0;
  for (const s of p.hand) {
    let cardNeed = 0;
    for (const m of matsForNeed) {
      const want = s.cost[m] || 0;
      const have = wbm[m] || 0;
      if (want > have) cardNeed += (want - have);
    }
    need += cardNeed;
    if (cardNeed > maxNeed) maxNeed = cardNeed;
  }
  // Blend of total-need and best-single-need
  let target = Math.round((need + maxNeed) / 2);

  // Cap by safe pool, open, and 4 — never auto-disrupt builds for marginal contention.
  target = Math.min(target, safePool, open, 4);

  // Effect-aware per-item cost:
  //  - Old Growth at R3/R4 doubles per-worker yield → effective cost halved.
  //  - Hidden Inlet solo bonus: if no opponent here, expect +1 fish-track refund
  //    per worker placed → effective cost -1.
  let effCost = cardCost(card);
  if (card.effect === 'old-growth' && typeof card.slot === 'number' && card.slot >= 2) {
    effCost = Math.max(1, Math.ceil(effCost / 2));
  }
  if (card.effect === 'solo-bonus') {
    const opponentPresent = Object.entries(card.workers).some(
      ([idx, n]) => parseInt(idx) !== playerIdx && n > 0
    );
    if (!opponentPresent) effCost = Math.max(1, effCost - 1);
  }
  if (effCost >= 3 && target > 1) target = Math.max(1, target - 1);
  if (effCost >= 4 && target > 1) target = Math.max(1, target - 1);

  // Most-workers race (Mud Wallow, Cattail Cluster): chase opponent's max+1
  // when the bonus roughly covers the extra fish.
  if (card.effect === 'most-workers') {
    const myHere = workersOnCard(card, playerIdx);
    const oppMax = Math.max(0, ...Object.entries(card.workers)
      .filter(([idx]) => parseInt(idx) !== playerIdx)
      .map(([, n]) => n));
    const toWin = Math.max(0, oppMax + 1 - myHere);
    const bonusFish = (card.effectSpec && card.effectSpec.flatBonus) || 0;
    const extra = Math.max(0, toWin - target);
    if (extra > 0 && extra * effCost <= bonusFish + 1
        && toWin <= safePool && toWin <= open) {
      target = toWin;
    }
  }

  // Random tweak for unpredictability
  const r = Math.random();
  if (r < 0.15 && target > 0) target -= 1;
  else if (r > 0.85 && target < safePool && target < open) target += 1;

  // Respect minBid
  target = Math.max(target, minBid);
  // Allow fallback only when needed to meet a min-bid trigger requirement.
  target = Math.min(target, target > safePool && minBid > 0 ? totalPool : safePool);

  if (target < 0) target = 0;
  // Pre-auction recall: pull workers off the river/shoreline to fund the bid.
  let needRecall = target - p.supply;
  if (needRecall > 0) {
    const tookSafe = aiRecallFromList(playerIdx, safe, needRecall);
    needRecall -= tookSafe;
    if (needRecall > 0) aiRecallFromList(playerIdx, fallback, needRecall);
  }
  return Math.min(target, p.supply);
}

// =============================================================================
// AI: EFFECT VALUATION
// =============================================================================
// Approximate VP value of a card's effect from the builder's perspective. Used
// by AI scoring so high-effect cards rank above plain VP cards. Calibrated by
// hand from ablation Δs (sim.js's sweepAblation) — keep these in sync.
const EFFECT_VP_FIXED = {
  'Granary': 3,
  'Charcoal Pit': 2,
  'Treaty Stone': 2,
  'Cattail Marsh': 1,
  'Otter Raft': 1,
  'Cache Burrow': 1,
  'Reed Bed': 0.5,
  'Otter Slide': 2,
  'Mill Wheel': 0.5,
  'Pack Rat Burrow': 1.5,
  'Royal Lodge': 1,
  'Burrow Run': 1,
  'Sap Drip': 1,
  'Snag Pile': 1,
  'Vine Lattice': 0.5,
  'Beaver Dam': 0.5,
  'Mud Levee': 0.5,
  'Wood Pile': 0,
  'Hollowed-out Log': 0,
  'Otter Den': 0,
  'Heron Roost': 0,
  'Driftwood Snag': 0,
  'Floodgate': 0,
  'Spy Mound': 0,
  'Tribute Stone': 0.5,
  'Beaver Tow': 1,
  'Otter Trail': 1.5,
  'Salmon Run': 2,
  'Stone Pool': 0,
  'Flush Channel': 0,
  'Salt Lick': 0,
  'Lookout Tree': 0,
};
function aiEffectValue(struct, p, state) {
  if (!effectActive(struct.name)) return 0;
  if (struct.name === 'Granary' && p.granaryUsed) return 0;
  if (struct.name === 'Floodgate' && p.floodgateUsed) return 0;
  if (struct.name === 'Spy Mound' && p.spyMoundUsed) return 0;
  if (struct.name === 'Tribute Stone' && p.tributeStoneUsed) return 0;
  // Otter Trail's value depends on having opponent workers on useful materials;
  // first-pass uses the flat EFFECT_VP_FIXED entry.
  if (struct.name === 'Pier') {
    const placed = state.shorelineCards.filter(c => workersOnCard(c, p.idx) > 0).length;
    const remaining = state.matDeck.length + state.riverCards.length;
    return Math.min(6, 2 * (placed + Math.min(3, Math.floor(remaining * 0.25))));
  }
  if (struct.name === 'Cattail Patch') {
    const mats = new Set();
    for (const b of p.built) for (const m in b.cost) mats.add(m);
    for (const m in struct.cost) mats.add(m);
    const handMats = new Set();
    for (const s of p.hand) for (const m in s.cost) handMats.add(m);
    let projected = mats.size;
    for (const m of handMats) {
      if (!mats.has(m) && projected < 6) projected += 1;
      if (projected - mats.size >= 2) break;
    }
    return CATTAIL_PATCH_VP[Math.min(projected, CATTAIL_PATCH_VP.length - 1)];
  }
  // The 6 "vp=0 + end-game-bonus" cards. Multipliers/caps match the live
  // scoring shape; tempo bonuses (+1, +1.5, +2, +1, +1) represent the
  // non-VP perk (slide-back, draw/filter, free worker, hand-sculpt,
  // worker-move).
  if (struct.name === 'Vine Ladder') {
    const builtVine = p.built.filter(b => (b.cost.vines || 0) > 0).length;
    const handVine = p.hand.filter(s => (s.cost.vines || 0) > 0).length;
    return Math.min(12, 4 * (builtVine + Math.min(handVine, 2)));
  }
  if (struct.name === 'Vine Trellis') {
    const builtVine = p.built.filter(b => (b.cost.vines || 0) > 0).length;
    const handVine = p.hand.filter(s => (s.cost.vines || 0) > 0).length;
    return 2 * (builtVine + 1 + Math.min(handVine, 2)) + 1;
  }
  if (struct.name === 'Stone Causeway') {
    const builtStone = p.built.filter(b => (b.cost.stones || 0) > 0).length;
    const handStone = p.hand.filter(s => (s.cost.stones || 0) > 0).length;
    return Math.min(8, 2 * (builtStone + 1 + Math.min(handStone, 2))) + 1.5;
  }
  if (struct.name === 'Reed Walkway') {
    const builtReed = p.built.filter(b => (b.cost.reeds || 0) > 0).length;
    const handReed = p.hand.filter(s => (s.cost.reeds || 0) > 0).length;
    return 2 * (builtReed + 1 + Math.min(handReed, 2)) + 2;
  }
  if (struct.name === 'Clay Vault') {
    const builtClay = p.built.filter(b => (b.cost.clay || 0) > 0).length;
    const handClay = p.hand.filter(s => (s.cost.clay || 0) > 0).length;
    return Math.min(12, 3 * (builtClay + 1 + Math.min(handClay, 2))) + 1;
  }
  if (struct.name === 'Burrow Network') {
    const builtMud = p.built.filter(b => (b.cost.mud || 0) > 0).length;
    const handMud = p.hand.filter(s => (s.cost.mud || 0) > 0).length;
    return Math.min(9, 3 * (builtMud + 1 + Math.min(handMud, 2))) + 1;
  }
  if (struct.name === 'Hidden Cache') {
    const mats = new Set();
    for (const b of p.built) for (const m in b.cost) mats.add(m);
    const handMats = new Set();
    for (const s of p.hand) for (const m in s.cost) handMats.add(m);
    let projected = mats.size;
    for (const m of handMats) {
      if (!mats.has(m) && projected < 6) projected += 1;
      if (projected - mats.size >= 2) break;
    }
    return Math.min(9, Math.floor(projected / 2) * 3);
  }
  if (struct.name === 'Heron Watch') {
    const remaining = state.matDeck.length + state.riverCards.length;
    return Math.min(6, state.shorelineCards.length + Math.floor(remaining * 0.5));
  }
  return EFFECT_VP_FIXED[struct.name] || 0;
}

// =============================================================================
// AI: TURN DECISIONS
// =============================================================================
function aiChooseAction(playerIdx) {
  const p = state.players[playerIdx];
  const wbm = playerWorkersByMaterial(state, playerIdx);

  // 1) Buildable structure: pick highest VP per time, including effect value.
  const buildables = p.hand
    .map((s, i) => {
      const totalVp = s.vp + aiEffectValue(s, p, state);
      return { s, i, score: totalVp / Math.max(1, s.time), vp: totalVp };
    })
    .filter(o => canBuild(o.s, wbm, p))
    .sort((a, b) => b.vp - a.vp);
  if (buildables.length > 0) {
    return { type: 'build', handIdx: buildables[0].i };
  }

  // Compute material needs across hand
  const needs = {};
  for (const m of MAT_KEYS) needs[m] = 0;
  for (const s of p.hand) {
    for (const m in s.cost) {
      const deficit = Math.max(0, s.cost[m] - (wbm[m] || 0));
      needs[m] = Math.max(needs[m], deficit);
    }
  }
  const totalNeed = MAT_KEYS.reduce((sum, m) => sum + needs[m], 0);

  // 2) Score river + pre-river auction candidates jointly. Pick whatever
  //    yields the best (need × clinch_potential) net of trigger + per-item time.
  // Effective worker pool for triggering an auction = supply + workers we could
  // recall before bidding (pre-auction recall makes them just as good as supply).
  const triggerPool = p.supply + aiTotalRecallable(playerIdx);
  let bestCard = null, bestScore = -Infinity, bestKind = null, bestPrerivIdx = -1;
  // River cards: action cost 0t, per-item cost = riverSlotCost(slot).
  for (const c of state.riverCards) {
    if (uncoveredIcons(c) === 0) continue;
    const need = needs[c.material];
    if (need === 0) continue;
    const got = Math.min(uncoveredIcons(c), triggerPool, need);
    // playerCardCost picks up Reed Bed's per-item discount.
    const score = need * got - playerCardCost(c, playerIdx) * got * 0.4;
    if (score > bestScore) { bestScore = score; bestCard = c; bestKind = 'river'; }
  }
  // Pre-river cards: trigger cost varies by slot; once moved to river slot 0, per-item cost = 1t.
  for (let i = 0; i < state.prerivCards.length; i++) {
    const c = state.prerivCards[i];
    if (!c) continue;
    const need = needs[c.material];
    if (need === 0) continue;
    const got = Math.min(uncoveredIcons(c), triggerPool, need);
    if (got === 0) continue;
    const trigger = prerivTriggerCost(i);
    const score = need * got - 1 * got * 0.4 - trigger * 0.6;
    if (score > bestScore) { bestScore = score; bestCard = c; bestKind = 'preriv'; bestPrerivIdx = i; }
  }
  // 2.2) Pick the best material-gaining action across single auctions, the
  // combined (Confluence) auction, Salmon Run, and Beaver Tow — all scored on
  // the same need-weighted scale. Folding them into one comparison keeps Salmon
  // Run / Beaver Tow reachable: a single auction used to return first, so they
  // fired ~never even when cheaper.
  const candidates = [];
  if (bestCard) {
    candidates.push({ score: bestScore, needsTrigger: true,
      make: () => bestKind === 'river' ? { type: 'auction', cardId: bestCard.id } : { type: 'preriv', slotIdx: bestPrerivIdx } });
  }
  if (hasCombinedAuctionAbility(p)) {
    const ct = findCombinedTarget(playerIdx, needs, triggerPool);
    if (ct && canAffordTimeCost(p, combinedTriggerCost(ct.A, ct.B))) {
      candidates.push({ score: ct.score, needsTrigger: true, make: () => ({ type: 'confluenceAuction', aId: ct.A.id, bId: ct.B.id }) });
    }
  }
  if (hasEffect(p, 'Salmon Run') && p.supply > 0 && canAffordTimeCost(p, 2)) {
    const t = findSalmonRunTarget(playerIdx, needs);
    if (t && canAffordTimeCost(p, salmonRunCumulativeCost(t.n))) {
      candidates.push({ score: t.score, needsTrigger: false, make: () => ({ type: 'salmonRun', cardId: t.card.id, workerCount: t.n }) });
    }
  }
  if (hasEffect(p, 'Beaver Tow') && canAffordTimeCost(p, 2)) {
    const t = findBeaverTowTarget(playerIdx, needs);
    if (t) candidates.push({ score: t.score, needsTrigger: false, make: () => ({ type: 'beaverTow', cardId: t.card.id }) });
  }
  candidates.sort((a, b) => b.score - a.score);
  for (const cand of candidates) {
    if (cand.needsTrigger && triggerPool <= 0) continue;
    return cand.make();
  }

  // Endgame pair-VP cash-out: if we're in endgame and our leftover workers
  // already pair up to ≥1 VP, prefer passing over Invent / no-op continuation.
  // The cash-out is guaranteed; Inventing in endgame is usually a sunk-cost
  // trap (long Invent streaks burn fish toward forced retirement without
  // adding net VP). Build/auction branches above already ran — if either was
  // productive we'd have returned. Flush still fires before this since it
  // also runs an auction.
  const cashOut = state.endgame && endgamePairVP(state, playerIdx) >= 1;

  // 3) If hand has no needs at all (can't make progress) → browse
  if (totalNeed === 0 || p.hand.length === 0) {
    if (cashOut) return { type: 'pass' };
    if (structAvailable(state) > 0) {
      const N = Math.min(2, structAvailable(state));
      return { type: 'browse', n: N };
    }
  }

  // 4) Flush upstream when nothing in it matches our needs.
  // Flush triggers an auction on a fresh upstream card, so it requires at least one worker
  // (supply or recallable, since pre-auction recall covers triggers too).
  // Illegal once the material deck is empty — no fresh cards to draw.
  const upstreamHasNeeded = state.prerivCards.some(c => c && needs[c.material] > 0);
  const upstreamHasAny = state.prerivCards.some(c => c !== null);
  if (upstreamHasAny && !upstreamHasNeeded && triggerPool > 0 && state.matDeck.length > 0) {
    return { type: 'flush' };
  }

  // 5) Last resort: browse if possible (unless pair-VP cash-out beats it)
  if (cashOut) return { type: 'pass' };
  if (structAvailable(state) > 0) {
    const N = Math.min(1, structAvailable(state));
    return { type: 'browse', n: N };
  }

  // 6) Pass
  return { type: 'pass' };
}

// Tribute Stone: once-per-game force-recall of an opponent's worker.
// Drops a blank like a normal recall; the victim slides back 3🐟 in compensation.
// Returns true if it fired.
function doTributeStone(playerIdx, victimIdx, card) {
  const p = state.players[playerIdx];
  const victim = state.players[victimIdx];
  if (p.tributeStoneUsed) return false;
  if (workersOnCard(card, victimIdx) <= 0) return false;
  card.workers[victimIdx] -= 1;
  if (card.workers[victimIdx] === 0) delete card.workers[victimIdx];
  if (typeof card.slot === 'number') card.blanks += 1;
  victim.supply += 1;
  const before = victim.timePos;
  victim.timePos = Math.max(0, victim.timePos - 3);
  p.tributeStoneUsed = true;
  log(`${MATERIALS.stones.icon} Tribute Stone: ${speciesLabel(p)} forces ${speciesLabel(victim)} to recall a worker from ${MATERIALS[card.material].name}; ${speciesLabel(victim)} slides back ${before - victim.timePos}🐟.`);
  return true;
}

// Otter Trail: swap a worker of yours on river card A with a worker (any player's)
// on a different river card B. You pay A's per-item cost in fish. No blanks drop.
function doOtterTrail(playerIdx, cardAId, cardBId, otherPlayerIdx) {
  const p = state.players[playerIdx];
  const cardA = state.riverCards.find(c => c.id === cardAId);
  const cardB = state.riverCards.find(c => c.id === cardBId);
  if (!cardA || !cardB || cardA.id === cardB.id) return false;
  if (typeof cardA.slot !== 'number' || typeof cardB.slot !== 'number') return false;
  if (workersOnCard(cardA, playerIdx) <= 0) return false;
  if (workersOnCard(cardB, otherPlayerIdx) <= 0) return false;
  cardA.workers[playerIdx] -= 1;
  if (cardA.workers[playerIdx] === 0) delete cardA.workers[playerIdx];
  cardB.workers[otherPlayerIdx] -= 1;
  if (cardB.workers[otherPlayerIdx] === 0) delete cardB.workers[otherPlayerIdx];
  cardA.workers[otherPlayerIdx] = (cardA.workers[otherPlayerIdx] || 0) + 1;
  cardB.workers[playerIdx] = (cardB.workers[playerIdx] || 0) + 1;
  advancePlayer(playerIdx, cardCost(cardA));
  const other = state.players[otherPlayerIdx];
  log(`🦦 Otter Trail: ${speciesLabel(p)} pays ${cardCost(cardA)}🐟 and swaps a worker on ${MATERIALS[cardA.material].name} with ${speciesLabel(other)}'s worker on ${MATERIALS[cardB.material].name}.`);
  return true;
}

// AI heuristic: find a useful material on the river where an opponent has a worker.
// Plant your worker there (pry their worker off). Pick your own worker from the
// cheapest-cost river card where its material is least useful to you.
// Returns {cardA, cardB, otherIdx} or null.
function findOtterTrailTarget(playerIdx) {
  const p = state.players[playerIdx];
  const wbm = playerWorkersByMaterial(state, playerIdx);
  const needs = {};
  for (const m of MAT_KEYS) needs[m] = 0;
  for (const s of p.hand) {
    for (const m in s.cost) {
      needs[m] = Math.max(needs[m], Math.max(0, s.cost[m] - (wbm[m] || 0)));
    }
  }
  let bestB = null, bestBOther = -1, bestBNeed = 0;
  for (const c of state.riverCards) {
    if (typeof c.slot !== 'number') continue;
    if ((needs[c.material] || 0) === 0) continue;
    for (const k in c.workers) {
      const opIdx = parseInt(k);
      if (opIdx === playerIdx) continue;
      if (c.workers[k] <= 0) continue;
      if (needs[c.material] > bestBNeed) {
        bestBNeed = needs[c.material];
        bestB = c;
        bestBOther = opIdx;
      }
    }
  }
  if (!bestB) return null;
  // Pick our cheapest A: lowest cardCost where our material is irrelevant.
  let bestA = null, bestACost = Infinity;
  for (const c of state.riverCards) {
    if (c.id === bestB.id) continue;
    if (typeof c.slot !== 'number') continue;
    if (workersOnCard(c, playerIdx) <= 0) continue;
    const cost = cardCost(c);
    const uselessBonus = (needs[c.material] || 0) === 0 ? -1 : 0; // prefer useless-material cards
    if (cost + uselessBonus < bestACost) { bestACost = cost + uselessBonus; bestA = c; }
  }
  if (!bestA) return null;
  // Only fire if cost is justified by the need we're addressing.
  if (cardCost(bestA) > bestBNeed * 2) return null;
  return { cardA: bestA, cardB: bestB, otherIdx: bestBOther };
}

// Salmon Run: marginal fish cost for the 1st/2nd/3rd/4th/5th worker placed.
const SALMON_RUN_COSTS = [1, 2, 3, 5, 8];
// Turn-delay penalty for Beaver Tow: towing spends a whole action now to set up
// a cheaper auction later, so the future grab must be sizable to beat just
// auctioning the card outright this turn.
const BEAVER_TOW_DELAY = 1.5;
function salmonRunCumulativeCost(n) {
  let total = 0;
  for (let i = 0; i < n && i < SALMON_RUN_COSTS.length; i++) total += SALMON_RUN_COSTS[i];
  return total;
}

// Salmon Run: as your main action, place N workers from supply on a single river card.
// Pays cumulative cost from SALMON_RUN_COSTS. No auction, no blanks.
function doSalmonRun(playerIdx, cardId, workerCount) {
  const p = state.players[playerIdx];
  const card = state.riverCards.find(c => c.id === cardId);
  if (!card || typeof card.slot !== 'number') return false;
  const maxPlaceable = Math.min(workerCount, p.supply, uncoveredIcons(card), SALMON_RUN_COSTS.length);
  if (maxPlaceable <= 0) return false;
  const cost = salmonRunCumulativeCost(maxPlaceable);
  card.workers[playerIdx] = (card.workers[playerIdx] || 0) + maxPlaceable;
  p.supply -= maxPlaceable;
  advancePlayer(playerIdx, cost);
  log(`🐟 Salmon Run: ${speciesLabel(p)} places ${maxPlaceable} worker${maxPlaceable === 1 ? '' : 's'} on ${MATERIALS[card.material].name} for ${cost}🐟.`);
  return true;
}

// AI heuristic: pick the highest-need river card; place the optimal worker count.
// Each placed worker yields 1 material, worth roughly cardCost(c) in fish-equivalent.
// Net value for N workers = sum of (per-worker yield - per-worker cost).
function findSalmonRunTarget(playerIdx, needs) {
  const p = state.players[playerIdx];
  let best = null;
  for (const c of state.riverCards) {
    if (typeof c.slot !== 'number') continue;
    const need = needs[c.material] || 0;
    if (need === 0) continue;
    let bestN = 0, bestScore = 0;
    const maxN = Math.min(p.supply, uncoveredIcons(c), need, SALMON_RUN_COSTS.length);
    for (let n = 1; n <= maxN; n++) {
      // Scored on the SAME need-weighted scale as a single-card auction
      // (need × workers − fish×0.4); Salmon Run's escalating cost is
      // slot-independent, so it beats an auction on deep/expensive cards.
      const score = need * n - salmonRunCumulativeCost(n) * 0.4;
      if (score > bestScore) { bestScore = score; bestN = n; }
    }
    if (bestN > 0 && (best === null || bestScore > best.score)) {
      best = { card: c, n: bestN, score: bestScore };
    }
  }
  return best;
}

// Beaver Tow: pay 2🐟, slide a river card 1 slot upstream (toward Headwaters).
// Returns true on success.
function doBeaverTow(playerIdx, cardId) {
  const p = state.players[playerIdx];
  const card = state.riverCards.find(c => c.id === cardId);
  if (!card || typeof card.slot !== 'number' || card.slot === 0) return false;
  card.slot -= 1;
  advancePlayer(playerIdx, 2);
  log(`🦫 Beaver Tow: ${speciesLabel(p)} pays 2🐟 to slide ${MATERIALS[card.material].name} to River ${card.slot + 1} (${riverSlotCost(card.slot)}🐟/item).`);
  return true;
}

// Pick the best river card for Beaver Tow to slide: highest-slot useful-material card
// with ≥4 uncovered icons. Returns the card or null.
function findBeaverTowTarget(playerIdx, needs) {
  const p = state.players[playerIdx];
  // Beaver Tow's slide makes the card cheaper for *everyone* who auctions
  // it next, so only tow when the builder is the dominant beneficiary:
  //   (1) No opponent has any hand structure that needs this material.
  //   (2) Builder has trigger pool to auction the slid card themselves.
  // Without these the tow is a public-good action that helps opponents.
  const triggerPool = p.supply + aiTotalRecallable(playerIdx);
  if (triggerPool === 0) return null;
  const opponentNeedsMaterial = (mat) => {
    for (const op of state.players) {
      if (op.idx === playerIdx || op.exhausted || op.out) continue;
      for (const s of op.hand) {
        if ((s.cost[mat] || 0) > 0) return true;
      }
    }
    return false;
  };
  let best = null;
  for (const c of state.riverCards) {
    if (typeof c.slot !== 'number' || c.slot === 0) continue;
    const need = needs[c.material] || 0;
    if (need < 2) continue;
    if (uncoveredIcons(c) < 4) continue;
    if (opponentNeedsMaterial(c.material)) continue;
    // Tow sets up a cheaper future auction (one slot upstream = −1🐟/item).
    // Scored as that discounted future grab minus the 2🐟 tow cost and a
    // turn-delay penalty, so it only wins over auctioning the card outright
    // when the future grab is large.
    const futureGot = Math.min(need, uncoveredIcons(c), triggerPool);
    const reducedCost = Math.max(1, playerCardCost(c, playerIdx) - 1);
    const score = need * futureGot - reducedCost * futureGot * 0.4 - 2 * 0.4 - BEAVER_TOW_DELAY;
    if (!best || score > best.score) best = { card: c, score };
  }
  return best;
}

// Heuristic: find the highest-per-item-cost river card with an opponent worker on it.
// Returns {victimIdx, card} or null.
// Trading Post: pay 1 fish to recall 1 worker from each of 3 different-material
// cards (drops 3 blanks) and place 2 free workers on one card. AI heuristic:
// target = river card whose material is most needed by hand builds AND has
// ≥2 uncovered icons; sources = 3 distinct-material cards with our workers,
// preferring (a) lowest hand need for that material, then (b) fewest of our
// workers parked there. Mirrors sim.js findTradingPostAction.
function findTradingPostAction(playerIdx) {
  const p = state.players[playerIdx];
  const need = {};
  for (const s of p.hand) for (const m in s.cost) need[m] = (need[m] || 0) + s.cost[m];
  const targets = state.riverCards
    .filter(c => uncoveredIcons(c) >= 2)
    .map(c => ({ card: c, score: (need[c.material] || 0) * 10 + uncoveredIcons(c) }))
    .sort((a, b) => b.score - a.score);
  if (targets.length === 0 || (need[targets[0].card.material] || 0) === 0) return null;
  const target = targets[0].card;
  const sources = [];
  const seenMats = new Set();
  const candPool = []
    .concat(state.shorelineCards.filter(c => workersOnCard(c, playerIdx) > 0))
    .concat(state.riverCards.filter(c => workersOnCard(c, playerIdx) > 0))
    .filter(c => c.material !== target.material)
    .sort((a, b) => (need[a.material] || 0) - (need[b.material] || 0)
                  || workersOnCard(a, playerIdx) - workersOnCard(b, playerIdx));
  for (const c of candPool) {
    if (seenMats.has(c.material)) continue;
    sources.push(c);
    seenMats.add(c.material);
    if (sources.length === 3) break;
  }
  if (sources.length < 3) return null;
  return { sources, target };
}

function doTradingPost(playerIdx, action) {
  const p = state.players[playerIdx];
  for (const c of action.sources) {
    c.workers[playerIdx] -= 1;
    if (c.workers[playerIdx] === 0) delete c.workers[playerIdx];
    if (typeof c.slot === 'number') c.blanks += 1;
    p.supply += 1;
  }
  p.timePos += 1;
  const place = Math.min(2, p.supply, uncoveredIcons(action.target));
  action.target.workers[playerIdx] = (action.target.workers[playerIdx] || 0) + place;
  p.supply -= place;
  log(`🏪 Trading Post: ${speciesLabel(p)} recalls from ${action.sources.map(c => MATERIALS[c.material].name).join('/')} and places ${place} on ${MATERIALS[action.target.material].name} (+1🐟).`);
  return true;
}

function findTributeStoneTarget(playerIdx) {
  let best = null;
  for (const c of state.riverCards) {
    for (const k in c.workers) {
      const opIdx = parseInt(k);
      if (opIdx === playerIdx) continue;
      if (c.workers[k] <= 0) continue;
      const value = cardCost(c);
      if (!best || value > best.value) best = { victimIdx: opIdx, card: c, value };
    }
  }
  return best;
}

// Heron Roost / Driftwood Snag / Tribute Stone: optional start-of-turn abilities.
// Auto-fire for AI; each Heron Roost / Driftwood Snag costs 1🐟 (Tribute Stone is free).
//
// TODO(human-ui): a human owner of Heron Roost or Driftwood Snag currently has NO way to
// trigger these — this helper only runs in the AI branch. Add start-of-turn prompt buttons
// (e.g., "Use Heron Roost to replace Upstream X for 1🐟?") so the human can choose target
// + whether to fire.
function aiStartOfTurnAbilities(playerIdx) {
  const p = state.players[playerIdx];
  if (hasEffect(p, 'Heron Roost') && state.matDeck.length > 0 && canAffordTimeCost(p, 1)) {
    const myMats = new Set();
    for (const s of p.hand) for (const m in s.cost) myMats.add(m);
    const target = state.prerivCards.findIndex(c => c && !myMats.has(c.material));
    if (target !== -1) {
      const newCard = state.matDeck.pop();
      newCard.slot = 'pre';
      state.prerivCards[target] = newCard;
      p.timePos += 1;
      log(`🦩 Heron Roost: ${speciesLabel(p)} replaces a Headwaters card (+1🐟).`);
    }
  }
  if (hasEffect(p, 'Driftwood Snag') && canAffordTimeCost(p, 1)) {
    const myMats = new Set();
    for (const s of p.hand) for (const m in s.cost) myMats.add(m);
    const cands = [...state.riverCards, ...state.prerivCards.filter(c => c)]
      .filter(c => uncoveredIcons(c) >= 4 && !myMats.has(c.material));
    if (cands.length > 0) {
      const target = cands.reduce((a, b) => uncoveredIcons(a) >= uncoveredIcons(b) ? a : b);
      target.blanks += 1;
      p.timePos += 1;
      log(`${MATERIALS.logs.icon} Driftwood Snag: ${speciesLabel(p)} drops a blank on ${MATERIALS[target.material].name} (+1🐟).`);
    }
  }
  // Tribute Stone: fire when there's a high-value opponent worker (per-item cost ≥ 3)
  // and we're not too deep into endgame (slide-back is useless if the victim is already past us).
  if (hasEffect(p, 'Tribute Stone') && !p.tributeStoneUsed && canAffordTimeCost(p, 10)) {
    const target = findTributeStoneTarget(playerIdx);
    if (target && target.value >= 3) {
      doTributeStone(playerIdx, target.victimIdx, target.card);
    }
  }
  // Otter Trail: swap to pry an opponent off a useful material card.
  if (hasEffect(p, 'Otter Trail') && canAffordTimeCost(p, 5)) {
    const target = findOtterTrailTarget(playerIdx);
    if (target && canAffordTimeCost(p, cardCost(target.cardA))) {
      doOtterTrail(playerIdx, target.cardA.id, target.cardB.id, target.otherIdx);
    }
  }
  // Snare Set (mink species starter): Tribute Stone variant w/ its own flag.
  if (hasEffect(p, 'Snare Set') && !p.snareSetUsed && canAffordTimeCost(p, 10)) {
    const target = findTributeStoneTarget(playerIdx);
    if (target && target.value >= 3) {
      // Mirror Tribute Stone logic but mark the snareSetUsed flag.
      const victim = state.players[target.victimIdx];
      target.card.workers[target.victimIdx] -= 1;
      if (target.card.workers[target.victimIdx] === 0) delete target.card.workers[target.victimIdx];
      if (typeof target.card.slot === 'number') target.card.blanks += 1;
      victim.supply += 1;
      victim.timePos = Math.max(0, victim.timePos - 3);
      p.snareSetUsed = true;
      log(`🪤 Snare Set: ${speciesLabel(p)} forces ${speciesLabel(victim)} to recall 1 worker; ${speciesLabel(victim)} slides back 3🐟.`);
    }
  }
  // Trading Post: pay 1🐟 to recall 1 worker each from 3 different-material
  // cards (drops 3 blanks) and place 2 free workers on one card. Bot AI
  // only — human players will get a click-based prompt (TODO: hook UI).
  if (hasEffect(p, 'Trading Post') && !p.isHuman && canAffordTimeCost(p, 1) && p.supply >= 2) {
    const action = findTradingPostAction(playerIdx);
    if (action) doTradingPost(playerIdx, action);
  }
  // Tail Slap (beaver species starter): pay 1🐟 to drop a blank on a R1 card
  // whose material we don't need (denies opponents).
  if (hasEffect(p, 'Tail Slap') && canAffordTimeCost(p, 1)) {
    const myMats = new Set();
    for (const s of p.hand) for (const m in s.cost) myMats.add(m);
    const cands = state.riverCards
      .filter(c => c.slot === 0 && uncoveredIcons(c) >= 3 && !myMats.has(c.material));
    if (cands.length > 0) {
      const target = cands.reduce((a, b) => uncoveredIcons(a) >= uncoveredIcons(b) ? a : b);
      target.blanks += 1;
      p.timePos += 1;
      log(`🦫 Tail Slap: ${speciesLabel(p)} drops a blank on R1 ${MATERIALS[target.material].name} (+1🐟).`);
    }
  }
  // Channel Clearer (muskrat species starter): discard 1 opponent Reed worker
  // from any river card. No fish cost, no blank.
  if (hasEffect(p, 'Channel Clearer')) {
    let pick = null;
    for (const c of state.riverCards) {
      if (c.material !== 'reeds') continue;
      for (const k in c.workers) {
        const opIdx = parseInt(k);
        if (opIdx === playerIdx || c.workers[k] <= 0) continue;
        pick = { card: c, victimIdx: opIdx };
        break;
      }
      if (pick) break;
    }
    if (pick) {
      pick.card.workers[pick.victimIdx] -= 1;
      if (pick.card.workers[pick.victimIdx] === 0) delete pick.card.workers[pick.victimIdx];
      state.players[pick.victimIdx].supply += 1;
      log(`🐭 Channel Clearer: ${speciesLabel(p)} clears 1 Reed worker from ${speciesLabel(state.players[pick.victimIdx])}.`);
    }
  }
  // Rolling Float (otter species starter): once-per-game free same-slot swap.
  if (hasEffect(p, 'Rolling Float') && !p.rollingFloatUsed) {
    const wbm = playerWorkersByMaterial(state, playerIdx);
    const needs = {};
    for (const m of MAT_KEYS) needs[m] = 0;
    for (const s of p.hand) for (const m in s.cost) {
      needs[m] = Math.max(needs[m], Math.max(0, s.cost[m] - (wbm[m] || 0)));
    }
    let best = null, bestScore = 0;
    for (const cardA of state.riverCards) {
      if (typeof cardA.slot !== 'number') continue;
      if (workersOnCard(cardA, playerIdx) <= 0) continue;
      for (const cardB of state.riverCards) {
        if (cardB.id === cardA.id || cardB.slot !== cardA.slot) continue;
        for (const k in cardB.workers) {
          const opIdx = parseInt(k);
          if (opIdx === playerIdx || cardB.workers[k] <= 0) continue;
          const score = (needs[cardB.material] || 0) - (needs[cardA.material] || 0);
          if (score > bestScore) { best = { cardA, cardB, opIdx }; bestScore = score; }
        }
      }
    }
    if (best) {
      best.cardA.workers[playerIdx] -= 1;
      if (best.cardA.workers[playerIdx] === 0) delete best.cardA.workers[playerIdx];
      best.cardB.workers[best.opIdx] -= 1;
      if (best.cardB.workers[best.opIdx] === 0) delete best.cardB.workers[best.opIdx];
      best.cardA.workers[best.opIdx] = (best.cardA.workers[best.opIdx] || 0) + 1;
      best.cardB.workers[playerIdx] = (best.cardB.workers[playerIdx] || 0) + 1;
      p.rollingFloatUsed = true;
      log(`🦦 Rolling Float: ${speciesLabel(p)} swaps a worker on ${MATERIALS[best.cardA.material].name} for ${MATERIALS[best.cardB.material].name} (same slot).`);
    }
  }
}

// Returns {safe, fallback}: ordered lists of {cardId, count} for pre-auction recall.
//   safe     — no-regret recalls: shoreline (no blank), then irrelevant-material
//              river workers, then surplus useful workers (placed > hand-build cap).
//   fallback — at-cap useful workers, river-side, highest per-item cost first.
//              Dipped into only when supply is 0 / a min-bid forces it.
function aiRecallBudget(playerIdx) {
  const p = state.players[playerIdx];
  const useful = new Set();
  for (const s of p.hand) for (const m in s.cost) useful.add(m);
  const cap = {};
  for (const m of MAT_KEYS) cap[m] = 0;
  for (const s of p.hand) for (const m in s.cost) cap[m] = Math.max(cap[m], s.cost[m]);
  const placed = playerWorkersByMaterial(state, playerIdx);
  const safe = [], fallback = [];
  const cards = [
    ...state.shorelineCards.map(c => ({ c, river: false })),
    ...state.riverCards.slice().sort((a, b) => cardCost(b) - cardCost(a)).map(c => ({ c, river: true })),
  ];
  for (const { c, river } of cards) {
    const w = workersOnCard(c, playerIdx);
    if (w === 0) continue;
    let safeRecall;
    if (!useful.has(c.material)) safeRecall = w;
    else safeRecall = Math.min(w, Math.max(0, placed[c.material] - cap[c.material]));
    if (safeRecall > 0) {
      safe.push({ cardId: c.id, count: safeRecall });
      placed[c.material] -= safeRecall;
    }
    const remaining = w - safeRecall;
    if (remaining > 0 && river) fallback.push({ cardId: c.id, count: remaining });
  }
  return { safe, fallback };
}

function aiTotalRecallable(playerIdx) {
  const { safe, fallback } = aiRecallBudget(playerIdx);
  return safe.reduce((s, x) => s + x.count, 0) + fallback.reduce((s, x) => s + x.count, 0);
}

// Recall up to `count` workers from the given ordered list. Returns # actually recalled.
function aiRecallFromList(playerIdx, list, count) {
  if (count <= 0) return 0;
  const spec = [];
  let need = count;
  for (const item of list) {
    if (need <= 0) break;
    const take = Math.min(item.count, need);
    spec.push({ cardId: item.cardId, count: take });
    need -= take;
  }
  if (spec.length === 0) return 0;
  callWorkersHome(playerIdx, spec);
  return count - need;
}

function aiBrowseDiscardChoice(playerIdx, drawn) {
  const p = state.players[playerIdx];
  const wbm = playerWorkersByMaterial(state, playerIdx);
  const all = [
    ...p.hand.map((s, i) => ({ s, key: 'h' + i })),
    ...drawn.map((s, i) => ({ s, key: 'd' + i })),
  ];
  // Score each by buildability + VP
  function score(s) {
    let deficit = 0;
    for (const m in s.cost) deficit += Math.max(0, s.cost[m] - (wbm[m] || 0));
    return s.vp - deficit * 1.5;
  }
  all.sort((a, b) => score(a.s) - score(b.s));   // ascending so worst first
  // Discard the worst N
  const N = drawn.length;
  return new Set(all.slice(0, N).map(o => o.key));
}

// Trading Post: walk the human through pick-target, then 3 distinct-material
// source picks, then perform the recall + free-place. Cost is 1🐟. If the
// human cancels any pick (returns null from pickFromList), the whole action
// aborts with no state mutation.
async function humanUseTradingPost() {
  const human = state.players.find(p => p.isHuman);
  if (!human || !hasEffect(human, 'Trading Post')) return;
  if (!canAffordTimeCost(human, 1) || human.supply < 2) return;

  const targets = state.riverCards.filter(c => uncoveredIcons(c) >= 2);
  if (targets.length === 0) return;
  const target = await pickFromList(
    '🏪 Trading Post — pick target card',
    `Place 2 free workers from your supply onto uncovered icons of this river card. (You'll then pick 3 different-material cards to recall workers from, each dropping a blank. Costs 1🐟.)`,
    targets,
    c => `River ${c.slot + 1} (${cardCost(c)}🐟/item): ${MATERIALS[c.material].icon} ${MATERIALS[c.material].name} (${uncoveredIcons(c)} open)`
  );
  if (!target) return;

  const sources = [];
  const seenMats = new Set([target.material]);
  for (let i = 1; i <= 3; i++) {
    const candPool = []
      .concat(state.shorelineCards.filter(c => workersOnCard(c, human.idx) > 0))
      .concat(state.riverCards.filter(c => workersOnCard(c, human.idx) > 0))
      .filter(c => !seenMats.has(c.material));
    if (candPool.length === 0) {
      log(`🏪 Trading Post: not enough distinct-material sources remaining — action cancelled.`);
      return;
    }
    const src = await pickFromList(
      `🏪 Trading Post — pick source ${i}/3`,
      `Recall 1 of your workers from this card (drops a blank). Source materials must be distinct from the target and each other.`,
      candPool,
      c => `${c.slot === 'shore' ? 'Shoreline' : 'River ' + (c.slot + 1)}: ${MATERIALS[c.material].icon} ${MATERIALS[c.material].name} (${workersOnCard(c, human.idx)} of your workers)`
    );
    if (!src) return;
    sources.push(src);
    seenMats.add(src.material);
  }

  doTradingPost(human.idx, { sources, target });
  render();
}

  const human = state.players.find(p => p.isHuman);

  const cands = [];
  for (const c of state.riverCards) {

      const opIdx = parseInt(k);
      if (opIdx === human.idx || c.workers[k] <= 0) continue;
      cands.push({ card: c, victimIdx: opIdx });
    }
  }
  if (cands.length === 0) return;
  const pick = await pickFromList(
    '🪤 Snare Set — force an opponent recall',
    `Pick an opponent's worker on a river card. That worker returns to their supply (blank dropped). The opponent slides back 3🐟 in compensation. Once per game.`,

    x => `River ${x.card.slot + 1} (${cardCost(x.card)}🐟/item): ${speciesLabel(state.players[x.victimIdx])} on ${MATERIALS[x.card.material].icon} ${MATERIALS[x.card.material].name}`

function humanChooseAction(type) {
  const human = state.players.find(p => p.isHuman);
  if (type === 'auction') {
    state.phase = 'select-auction-card';
    render();
  } else if (type === 'preriv') {
    state.phase = 'select-preriv-card';
    render();
  } else if (type === 'browse') {
    state.phase = 'browse-N';
    render();
  } else if (type === 'build') {
    state.phase = 'select-build';
    render();
  } else if (type === 'flush') {
    humanFlushUpstream().then(() => humanResolver && humanResolver());
  } else if (type === 'beaverTow') {
    humanBeaverTow().then(() => humanResolver && humanResolver());
  } else if (type === 'salmonRun') {
    humanSalmonRun().then(() => humanResolver && humanResolver());
  } else if (type === 'confluence') {
    // Board-based selection: enter a pick phase; cards on the board become clickable.
    state.combinedPick = { first: null };
    state.phase = 'combined-pick';
    render();
  }
}

async function humanSalmonRun() {
  const human = state.players.find(p => p.isHuman);

  // Step 1: pick the card.

  const cumulativeSeries = SALMON_RUN_COSTS.map((_, i) => salmonRunCumulativeCost(i + 1)).join('/');
  const nPick = await pickFromList(

    `Cumulative fish cost grows as ${cumulativeSeries} for 1/2/3/4/5 workers. You have ${human.supply} in supply.`,
    nCands,
    x => `${x.n} worker${x.n === 1 ? '' : 's'} — pay ${x.cost}🐟 total`,

  );

  doSalmonRun(human.idx, cardPick.id, nPick.n);

}
