// =============================================================================
// RIVER MANAGEMENT
// =============================================================================
function moveCardToShoreline(card) {
  // Fire end-of-river effects (solo / most-workers bonuses) before clearing slot.
  fireOnShoreline(card);
  card.blanks = 0;
  if (card.slot === 'pre') {
    const idx = prerivIndexOf(card);
    if (idx !== -1) refillPreriv(idx);
  } else {
    state.riverCards = state.riverCards.filter(c => c !== card);
  }
  card.slot = 'shore';
  state.shorelineCards.push(card);
  log(`📍 ${MATERIALS[card.material].emoji} ${card.name} drifts to the shoreline.`);
}

// End-of-life effect dispatcher: fires when a card moves from river → shoreline.
//   solo-bonus    → if exactly one player has workers here, that player moves
//                   backward on the fish track by N spaces per worker (Hidden Inlet).
//   most-workers  → player with strictly most workers moves backward N spaces;
//                   ties grant no bonus (Mud Wallow, Cattail Cluster).
function fireOnShoreline(card) {
  if (!card.effect) return;
  const entries = Object.entries(card.workers).filter(([, n]) => n > 0);
  if (entries.length === 0) return;
  const spec = card.effectSpec;
  if (card.effect === 'solo-bonus') {
    if (entries.length !== 1) return;
    const idx = parseInt(entries[0][0]);
    const count = entries[0][1];
    const spaces = count * (spec.bonusPerWorker || 1);
    moveBackward(state, idx, spaces);
    log(`🐟 ${spec.name}: P${idx + 1} solo bonus — back ${spaces} on fish track (${count} worker${count === 1 ? '' : 's'}).`);
    return;
  }
  if (card.effect === 'most-workers') {
    entries.sort((a, b) => b[1] - a[1]);
    if (entries.length > 1 && entries[0][1] === entries[1][1]) {
      log(`🐟 ${spec.name}: most-workers tie — no bonus.`);
      return;
    }
    const idx = parseInt(entries[0][0]);
    const spaces = spec.flatBonus || 0;
    moveBackward(state, idx, spaces);
    log(`🐟 ${spec.name}: P${idx + 1} most-workers bonus — back ${spaces} on fish track.`);
    return;
  }
}

// Slipping Sandbar: after an auction with placement, slide upstream (toward R1)
// instead of downstream. At R1 with uncovered icons remaining, retire to shoreline.
function slidesSandbarUpstream(card) {
  if (card.slot === 0) {
    log(`🌊 ${card.effectSpec.name} slips past River 1 — retires to shoreline.`);
    moveCardToShoreline(card);
    return;
  }
  card.slot -= 1;
  log(`🌊 ${card.effectSpec.name} slips upstream to River ${card.slot + 1} (${riverSlotCost(card.slot)}🐟/item).`);
}

function jamCardDownriver(card) {
  if (card.slot === 'pre') {
    // Upstream card jams: it normally enters River 1 (slot 0). Refill upstream queue.
    // Slipping Sandbar enters at River 4 instead (see MATERIALS.md).
    const idx = prerivIndexOf(card);
    card.slot = (card.effect === 'slipping-sandbar') ? 3 : 0;
    state.riverCards.push(card);
    if (idx !== -1) refillPreriv(idx);
    log(`💨 ${MATERIALS[card.material].emoji} ${card.name} jams from the Headwaters into River ${card.slot + 1} (${riverSlotCost(card.slot)}🐟/item).`);
    return;
  }
  // Cost is slot-based: jamming to a higher slot raises the per-item cost automatically.
  const newSlot = card.slot + 1;
  if (newSlot > 3) {
    moveCardToShoreline(card);
    return;
  }
  card.slot = newSlot;
  log(`💨 ${MATERIALS[card.material].emoji} ${card.name} jams to River ${newSlot + 1} (${riverSlotCost(newSlot)}🐟/item).`);
}

// =============================================================================
// PRE-RIVER MANAGEMENT
// =============================================================================
// Cards behind the emptied slot drift one step toward the river; slot 0
// (farthest upstream) refills from the deck.
function refillPreriv(emptiedIdx) {
  for (let i = emptiedIdx; i > 0; i--) {
    state.prerivCards[i] = state.prerivCards[i - 1];
  }
  state.prerivCards[0] = null;
  if (state.matDeck.length > 0) {
    const c = state.matDeck.pop();
    c.slot = 'pre';
    state.prerivCards[0] = c;
    log(`⬇ ${MATERIALS[c.material].emoji} new ${MATERIALS[c.material].name} card enters Headwaters 3 (move: ${prerivTriggerCost(0)}🐟).`);
  }
}

function prerivIndexOf(card) {
  return state.prerivCards.indexOf(card);
}

// Cleanup shoreline cards that have no workers
function cleanupShoreline() {
  state.shorelineCards = state.shorelineCards.filter(c => {
    const totalWorkers = Object.values(c.workers).reduce((s, n) => s + n, 0);
    if (totalWorkers === 0) {
      log(`🌊 empty ${MATERIALS[c.material].name} card removed from shoreline.`);
      return false;
    }
    return true;
  });
}

// =============================================================================
// CALL WORKERS HOME
// =============================================================================
function callWorkersHome(playerIdx, recallSpec) {
  // recallSpec: array of {cardId, count}
  const p = state.players[playerIdx];
  let total = 0;
  for (const r of recallSpec) {
    const card = state.riverCards.find(c => c.id === r.cardId) || state.shorelineCards.find(c => c.id === r.cardId);
    if (!card) continue;
    const have = workersOnCard(card, playerIdx);
    const take = Math.min(have, r.count);
    if (take === 0) continue;
    card.workers[playerIdx] = have - take;
    if (card.workers[playerIdx] === 0) delete card.workers[playerIdx];
    // For river cards: drop a blank on each uncovered icon; for shoreline: no blank.
    if (typeof card.slot === 'number') card.blanks += take;
    p.supply += take;
    total += take;
  }
  if (total > 0) {
    log(`🏠 ${speciesLabel(p)} calls ${total} worker${total === 1 ? '' : 's'} home.`);
    // Otter Den: slide back 1 fish per worker recalled.
    if (hasEffect(p, 'Otter Den')) {
      const before = p.timePos;
      p.timePos = Math.max(0, p.timePos - total);
      log(`🦦 Otter Den: ${speciesLabel(p)} slides back ${before - p.timePos} on the fish track.`);
    }
  }
  cleanupShoreline();
}

// =============================================================================
// AUCTION
// =============================================================================
async function runAuction(card, triggerPlayerIdx, minBidTrigger) {
  // Floodgate: AI auto-uses; human is prompted (it's once-per-game, so you may want to save it).
  const trig = state.players[triggerPlayerIdx];
  if (hasEffect(trig, 'Floodgate') && !trig.floodgateUsed && typeof card.slot === 'number' && card.slot > 0) {
    let useIt = true;
    if (trig.isHuman) {
      const newSlotCost = riverSlotCost(card.slot - 1);
      const oldSlotCost = riverSlotCost(card.slot);
      useIt = await confirmModal(
        '🚪 Floodgate?',
        `Slide this card from River ${card.slot + 1} (${oldSlotCost}🐟/item) up to River ${card.slot} (${newSlotCost}🐟/item) before the auction? Once-per-game.`
      );
    }
    if (useIt) {
      card.slot -= 1;
      trig.floodgateUsed = true;
      log(`🚪 Floodgate: ${speciesLabel(trig)} slides the card 1 space toward the Headwaters.`);
    }
  }
  // Collect bids: AIs decide privately; human inputs via modal.
  state.phase = 'auction-bidding';
  const m = MATERIALS[card.material];
  const slotLbl = card.slot === 'pre' ? 'Headwaters' : `River ${card.slot + 1}`;
  log(`🎲 Auction begins on ${m.emoji} ${m.name} at ${slotLbl} (${cardCost(card)}🐟/item, ${uncoveredIcons(card)} icons open).`);

  // Spy Mound / Quick Strike: holders can defer their bid until after others
  // reveal. AIs auto-defer if eligible AND the card's material matches at
  // least one hand structure (so the once-per-game Spy Mound isn't wasted).
  //   - Spy Mound: once per game.
  //   - Quick Strike (mink species starter): unlimited.
  const wantsMaterial = (p) => {
    const mats = card.wildAlt ? [card.material, card.wildAlt] : [card.material];
    return p.hand.some(s => mats.some(m => (s.cost[m] || 0) > 0));
  };
  // Spy Mound is once-per-game; save it for auctions where perfect info
  // actually matters. Gate: card has ≥4 uncovered icons AND the player has
  // ≥2 unmet deficit in this material across some hand card.
  const spyMoundWorthIt = (p) => {
    if (uncoveredIcons(card) < 4) return false;
    const mats = card.wildAlt ? [card.material, card.wildAlt] : [card.material];
    const wbm = playerWorkersByMaterial(state, p.idx);
    let maxDeficit = 0;
    for (const s of p.hand) {
      for (const m of mats) {
        const need = s.cost[m] || 0;
        if (need === 0) continue;
        const deficit = Math.max(0, need - (wbm[m] || 0));
        if (deficit > maxDeficit) maxDeficit = deficit;
      }
    }
    return maxDeficit >= 2;
  };
  let deferredAi = -1;
  let deferredAiViaQuickStrike = false;
  for (const p of state.players) {
    if (p.isHuman) continue;
    if (hasEffect(p, 'Spy Mound') && !p.spyMoundUsed && !p.exhausted && !p.out && spyMoundWorthIt(p)) {
      deferredAi = p.idx;
      break;
    }
  }
  if (deferredAi === -1) {
    for (const p of state.players) {
      if (p.isHuman) continue;
      if (hasEffect(p, 'Quick Strike') && !p.exhausted && !p.out && wantsMaterial(p)) {
        deferredAi = p.idx;
        deferredAiViaQuickStrike = true;
        break;
      }
    }
  }
  const human = state.players.find(p => p.isHuman);
  let deferredHuman = -1;
  let deferredHumanViaQuickStrike = false;
  if (human && !human.out && !human.exhausted && deferredAi === -1) {
    // Prefer Spy Mound (one-shot resource) if available; fall back to Quick
    // Strike (unlimited mink species starter) otherwise. Only one prompt either way.
    if (hasEffect(human, 'Spy Mound') && !human.spyMoundUsed) {
      startHumanTimer();
      let useIt;
      try {
        useIt = await confirmModal(
          '🕵 Spy Mound — defer your bid?',
          `Wait for ${state.players.length - 1} other player${state.players.length - 1 === 1 ? '' : 's'} to reveal their bids before you decide yours? Once-per-game.`
        );
      } finally {
        stopHumanTimer();
      }
      if (useIt) {
        deferredHuman = human.idx;
        human.spyMoundUsed = true;
      }
    } else if (hasEffect(human, 'Quick Strike')) {
      startHumanTimer();
      let useIt;
      try {
        useIt = await confirmModal(
          '⚡ Quick Strike — defer your bid?',
          `Wait for ${state.players.length - 1} other player${state.players.length - 1 === 1 ? '' : 's'} to reveal their bids before you decide yours? No use limit.`
        );
      } finally {
        stopHumanTimer();
      }
      if (useIt) {
        deferredHuman = human.idx;
        deferredHumanViaQuickStrike = true;
      }
    }
  }
  const bids = {};
  for (const p of state.players) {
    if (p.isHuman) continue;
    if (p.exhausted || p.out) { bids[p.idx] = 0; continue; }
    if (p.idx === deferredAi) continue;
    const minBid = (p.idx === triggerPlayerIdx) ? minBidTrigger : 0;
    bids[p.idx] = aiDecideBid(p.idx, card, minBid);
  }
  // Re-render so any AI pre-auction recalls (blanks dropped, supplies grown) are
  // visible behind the human's bid dialog.
  if (human && !human.out && !human.exhausted) render();
  if (human) {
    if (human.out) {
      bids[human.idx] = 0;
    } else if (human.exhausted) {
      bids[human.idx] = 0;
      log(`💤 ${speciesLabel(human)} is exhausted — auto-passes (bid 0).`);
    } else if (human.idx === deferredHuman) {
      // Resolved below after all other bids are visible.
    } else {
      const minBid = (human.idx === triggerPlayerIdx) ? minBidTrigger : 0;
      startHumanTimer();
      try {
        bids[human.idx] = await humanBidForAuction(card, human, minBid);
      } finally {
        stopHumanTimer();
      }
    }
  }
  // Spy Mound / Quick Strike deferred bid resolves now (after reveals). Uses
  // aiDecideBid (which considers material need) capped at remaining room so
  // we never jam — old "fill to capacity" logic over-bid on materials the
  // player didn't want, which compounded badly for Quick Strike's unlimited use.
  if (deferredAi !== -1) {
    const sp = state.players[deferredAi];
    if (!deferredAiViaQuickStrike) sp.spyMoundUsed = true;
    const open = uncoveredIcons(card);
    const others = Object.values(bids).reduce((s, b) => s + b, 0);
    const room = open - others;
    const minBid = (deferredAi === triggerPlayerIdx) ? minBidTrigger : 0;
    let bid = aiDecideBid(sp.idx, card, minBid);
    if (room <= 0) {
      bid = deferredAi === triggerPlayerIdx ? Math.max(minBidTrigger, 1) : 0;
    } else {
      bid = Math.min(bid, room);
      if (deferredAi === triggerPlayerIdx) bid = Math.max(bid, minBidTrigger);
    }
    bids[sp.idx] = bid;
    const label = deferredAiViaQuickStrike ? 'Quick Strike' : 'Spy Mound';
    log(`🕵 ${label}: ${speciesLabel(sp)} bids ${bid} after seeing reveals.`);
  }
  if (deferredHuman !== -1) {
    const sp = state.players[deferredHuman];
    const minBid = (deferredHuman === triggerPlayerIdx) ? minBidTrigger : 0;
    startHumanTimer();
    try {
      bids[sp.idx] = await humanBidForAuction(card, sp, minBid, { revealedBids: { ...bids } });
    } finally {
      stopHumanTimer();
    }
    const label = deferredHumanViaQuickStrike ? '⚡ Quick Strike' : '🕵 Spy Mound';
    log(`${label}: ${speciesLabel(sp)} bids ${bids[sp.idx]} after seeing reveals.`);
  }

  // Compact bid summary for the log
  const summary = state.players.filter(p => p.idx in bids)
    .map(p => `${p.species.emoji}${bids[p.idx]}`).join(' ');
  log(`🤐 Bids: ${summary}`);

  const result = resolveAuction(card, bids);
  // Re-render so the modal can sit on top of an updated board state
  render();
  if (state.players.some(p => p.isHuman)) {
    startHumanTimer();
    try {
      await showAuctionResult(result);
    } finally {
      stopHumanTimer();
    }
  } else {
    await showAuctionResult(result);
  }
  state.phase = 'idle';
  render();
}

function resolveAuction(card, bids) {
  const m = MATERIALS[card.material];
  const open = uncoveredIcons(card);
  const totalBid = Object.values(bids).reduce((s, n) => s + n, 0);

  const result = {
    cardMaterial: card.material,
    costAtAuction: cardCost(card),
    openBefore: open,
    totalBid,
    bids: { ...bids },         // playerIdx -> bid
    takings: {},               // playerIdx -> won
    timeAdvances: {},          // playerIdx -> +time
    outcome: 'no-bids',        // 'no-bids' | 'plenty' | 'jam'
    leftover: 0,
    cardFate: 'stays',         // 'stays' | 'shoreline-from-plenty' | 'shoreline-graduated' | 'jammed' | 'plenty-slid'
    cardNewSlot: null,
    cardNewCost: null,
  };
  for (const idxStr in bids) result.takings[parseInt(idxStr)] = 0;

  if (totalBid === 0) {
    log(`💤 No bids — ${m.name} card stays put.`);
    return result;
  }

  const playerBidPairs = Object.entries(bids)
    .filter(([_, b]) => b > 0)
    .map(([idx, b]) => ({ idx: parseInt(idx), bid: b }));

  if (totalBid <= open) {
    result.outcome = 'plenty';
    for (const { idx, bid } of playerBidPairs) {
      const p = state.players[idx];
      p.supply -= bid;
      card.workers[idx] = (card.workers[idx] || 0) + bid;
      const timeAdvance = bid * playerCardCost(card, idx);
      advancePlayer(idx, timeAdvance);
      result.takings[idx] = bid;
      result.timeAdvances[idx] = timeAdvance;
      log(`✅ ${speciesLabel(p)} wins ${bid} icon${bid === 1 ? '' : 's'} (advance ${timeAdvance}🐟).`);
    }
    result.leftover = open - totalBid;
    if (result.leftover > 0) {
      // Any plenty-with-leftovers slides one slot downriver (uniform rule).
      // Pre→R1, R1→R2, R2→R3, R3→R4, R4→shoreline.
      // Slipping Sandbar overrides: with workers placed, slide upstream instead.
      const m = MATERIALS[card.material];
      const wasOnLastSlot = card.slot === 3;
      const sandbarDrift = card.effect === 'slipping-sandbar' && totalBid > 0 && typeof card.slot === 'number';
      if (sandbarDrift) {
        slidesSandbarUpstream(card);
      } else {
        jamCardDownriver(card);
      }
      if (card.slot === 'shore' || (!sandbarDrift && wasOnLastSlot)) {
        log(`🌊 ${result.leftover} icon${result.leftover === 1 ? '' : 's'} unbid — ${m.emoji} ${m.name} card graduates to the shoreline.`);
        result.cardFate = 'shoreline-graduated';
      } else {
        result.cardFate = 'plenty-slid';
        result.cardNewSlot = card.slot;
        result.cardNewCost = cardCost(card);
      }
    } else {
      // Every icon claimed — card has nothing left to auction.
      moveCardToShoreline(card);
      result.cardFate = 'shoreline-from-plenty';
    }
  } else {
    result.outcome = 'jam';
    let totalTaken = 0;
    for (const { idx, bid } of playerBidPairs) {
      const p = state.players[idx];
      const others = totalBid - bid;
      const got = Math.max(0, Math.min(bid, open - others));
      if (got > 0) {
        p.supply -= got;
        card.workers[idx] = (card.workers[idx] || 0) + got;
      }
      // Pay-for-bid: every worker you bid costs time, even those that won nothing.
      // Workers that didn't clinch an icon return to your supply for free.
      // Otter Raft: when jammed (got < bid), pay fish for one fewer worker.
      let billable = bid;
      if (got < bid && hasEffect(p, 'Otter Raft')) billable = Math.max(0, bid - 1);
      const timeAdvance = billable * playerCardCost(card, idx);
      advancePlayer(idx, timeAdvance);
      result.takings[idx] = got;
      result.timeAdvances[idx] = timeAdvance;
      if (got > 0) {
        log(`✅ ${speciesLabel(p)} bid ${bid}, took ${got} (advance ${timeAdvance}🐟).`);
      } else {
        log(`✗ ${speciesLabel(p)} bid ${bid}, took 0 (advance ${timeAdvance}🐟 for the bid).`);
      }
      totalTaken += got;
    }
    result.leftover = open - totalTaken;
    const wasOnLastSlot = card.slot === 3;
    // Slipping Sandbar: if any workers landed this auction, drift upstream
    // instead of the normal downstream jam.
    const sandbarDrift = card.effect === 'slipping-sandbar' && totalTaken > 0 && typeof card.slot === 'number';
    if (sandbarDrift) {
      slidesSandbarUpstream(card);
    } else {
      jamCardDownriver(card);
    }
    if (card.slot === 'shore' || (!sandbarDrift && wasOnLastSlot)) {
      result.cardFate = 'shoreline-graduated';
    } else {
      result.cardFate = 'jammed';
      result.cardNewSlot = card.slot;
      result.cardNewCost = cardCost(card);
    }
  }
  return result;
}

async function showAuctionResult(result) {
  // No human present → skip the modal.
  if (!state.players.some(p => p.isHuman)) return;
  const m = MATERIALS[result.cardMaterial];

  // Bid/take rows for every player who participated
  let rows = '';
  for (const p of state.players) {
    if (!(p.idx in result.bids)) continue;
    const bid = result.bids[p.idx];
    const took = result.takings[p.idx] || 0;
    const time = result.timeAdvances[p.idx] || 0;
    const dim = bid === 0 ? ' style="opacity:0.5"' : '';
    let outcomeStr;
    if (bid === 0) outcomeStr = `<span class="small-note">passed</span>`;
    else if (took === 0) outcomeStr = `bid <b>${bid}</b> → <span style="color:#a33">won 0</span>`;
    else if (took === bid) outcomeStr = `bid <b>${bid}</b> → <span style="color:var(--forest)">won <b>${took}</b></span> (+${time}🐟)`;
    else outcomeStr = `bid <b>${bid}</b> → won <b>${took}</b> (+${time}🐟)`;
    rows += `<div class="bidder-row"${dim}>
      <span class="bidder-name">
        <span class="player-pawn-mini" style="background:${p.species.color}">${p.species.emoji}</span>
        ${p.species.name}${p.isHuman ? ' (you)' : ''}
      </span>
      <span>${outcomeStr}</span>
    </div>`;
  }

  // Outcome explanation
  let outcomeBox = '';
  if (result.outcome === 'no-bids') {
    outcomeBox = `<div class="result-box info">
      <p><b>No one bid.</b> The card stays where it was — nothing moves.</p>
    </div>`;
  } else if (result.outcome === 'plenty') {
    const leftover = result.leftover;
    let fateLine;
    if (result.cardFate === 'plenty-slid') {
      fateLine = `<p>${leftover} icon${leftover === 1 ? '' : 's'} went unbid. The card <b>drifts into River ${result.cardNewSlot + 1}</b> with its leftover icons, where it can be auctioned again at <b>${result.cardNewCost}🐟</b> per item.</p>`;
    } else if (result.cardFate === 'shoreline-graduated') {
      fateLine = `<p>${leftover} icon${leftover === 1 ? '' : 's'} went unbid. The card was already on the last river space, so it <b>graduates to the shoreline</b> with its workers.</p>`;
    } else {
      fateLine = `<p>Every open icon was claimed — the card has nothing left to auction and <b>drifts to the shoreline</b>.</p>`;
    }
    outcomeBox = `<div class="result-box plenty">
      <p><b>🌟 Plenty to go around.</b> Total bid ${result.totalBid} ≤ ${result.openBefore} open icons, so every bidder took exactly what they bid.</p>
      ${fateLine}
    </div>`;
  } else { // jam
    let fateLine;
    if (result.cardFate === 'shoreline-graduated') {
      fateLine = `<p>The card was already on the last river space, so it <b>graduates to the shoreline</b> with its workers. ${result.leftover} unclaimed icon${result.leftover === 1 ? '' : 's'} no longer matter — shoreline cards can't be auctioned.</p>`;
    } else {
      fateLine = `<p>${result.leftover} icon${result.leftover === 1 ? '' : 's'} stay${result.leftover === 1 ? 's' : ''} uncovered. The card <b>slides to River ${result.cardNewSlot + 1}</b>, where its per-item cost is <b>${result.cardNewCost}🐟</b>.</p>`;
    }
    outcomeBox = `<div class="result-box jam">
      <p><b>🌊 River jams.</b> Total bid (${result.totalBid}) exceeded ${result.openBefore} open icons. Each bidder took <code>max(0, ${result.openBefore} − others' bids)</code>, capped at their own bid. <b>Every worker you bid still costs you fish</b> even if it didn't clinch an icon — workers that didn't win return to your supply.</p>
      ${fateLine}
    </div>`;
  }

  return new Promise(resolve => {
    showModal({
      title: `🎲 ${m.emoji} ${m.name} — auction result`,
      body: () => `
        <p class="small-note">${result.openBefore} open icon${result.openBefore === 1 ? '' : 's'} going in · ${result.costAtAuction}🐟 per item</p>
        <div class="auction-bidders">${rows}</div>
        ${outcomeBox}
      `,
      actions: [
        { label: 'Continue', primary: true, onClick: () => { closeModal(); resolve(); } },
      ],
    });
  });
}

// =============================================================================
// AI: BIDDING
// =============================================================================
function aiDecideBid(playerIdx, card, minBid) {
  const p = state.players[playerIdx];
  const open = uncoveredIcons(card);
  const { safe, fallback } = aiRecallBudget(playerIdx);
  const safeCount = safe.reduce((s, x) => s + x.count, 0);
  const fallbackCount = fallback.reduce((s, x) => s + x.count, 0);
  // For non-trigger bids: only consider supply + safe-recallable. For trigger
  // bids: also dip into fallback (at-cap workers) to satisfy the min-bid.
  const safePool = p.supply + safeCount;
  const totalPool = safePool + fallbackCount;
  if (totalPool === 0) return Math.min(0, minBid);
  if (open === 0) return Math.min(totalPool, minBid);

  // How many of this material does the AI need overall (across hand structures)?
  // Wildcards (Driftwood Tangle, Mud Slick): include the alt material's deficit
  // since a wild worker can fulfill either.
  const wbm = playerWorkersByMaterial(state, playerIdx);
  const matsForNeed = card.wildAlt ? [card.material, card.wildAlt] : [card.material];
  let need = 0;
  let maxNeed = 0;
  for (const s of p.hand) {
    let cardNeed = 0;
    for (const m of matsForNeed) {
      const want = s.cost[m] || 0;
      const have = wbm[m] || 0;
      if (want > have) cardNeed += (want - have);
    }
    need += cardNeed;
    if (cardNeed > maxNeed) maxNeed = cardNeed;
  }
  // Blend of total-need and best-single-need
  let target = Math.round((need + maxNeed) / 2);

  // Cap by safe pool, open, and 4 — never auto-disrupt builds for marginal contention.
  target = Math.min(target, safePool, open, 4);

  // Effect-aware per-item cost:
  //  - Old Growth at R3/R4 doubles per-worker yield → effective cost halved.
  //  - Hidden Inlet solo bonus: if no opponent here, expect +1 fish-track refund
  //    per worker placed → effective cost -1.
  let effCost = cardCost(card);
  if (card.effect === 'old-growth' && typeof card.slot === 'number' && card.slot >= 2) {
    effCost = Math.max(1, Math.ceil(effCost / 2));
  }
  if (card.effect === 'solo-bonus') {
    const opponentPresent = Object.entries(card.workers).some(
      ([idx, n]) => parseInt(idx) !== playerIdx && n > 0
    );
    if (!opponentPresent) effCost = Math.max(1, effCost - 1);
  }
  if (effCost >= 3 && target > 1) target = Math.max(1, target - 1);
  if (effCost >= 4 && target > 1) target = Math.max(1, target - 1);

  // Most-workers race (Mud Wallow, Cattail Cluster): chase opponent's max+1
  // when the bonus roughly covers the extra fish.
  if (card.effect === 'most-workers') {
    const myHere = workersOnCard(card, playerIdx);
    const oppMax = Math.max(0, ...Object.entries(card.workers)
      .filter(([idx]) => parseInt(idx) !== playerIdx)
      .map(([, n]) => n));
    const toWin = Math.max(0, oppMax + 1 - myHere);
    const bonusFish = (card.effectSpec && card.effectSpec.flatBonus) || 0;
    const extra = Math.max(0, toWin - target);
    if (extra > 0 && extra * effCost <= bonusFish + 1
        && toWin <= safePool && toWin <= open) {
      target = toWin;
    }
  }

  // Random tweak for unpredictability
  const r = Math.random();
  if (r < 0.15 && target > 0) target -= 1;
  else if (r > 0.85 && target < safePool && target < open) target += 1;

  // Respect minBid
  target = Math.max(target, minBid);
  // Allow fallback only when needed to meet a min-bid trigger requirement.
  target = Math.min(target, target > safePool && minBid > 0 ? totalPool : safePool);

  if (target < 0) target = 0;
  // Pre-auction recall: pull workers off the river/shoreline to fund the bid.
  let needRecall = target - p.supply;
  if (needRecall > 0) {
    const tookSafe = aiRecallFromList(playerIdx, safe, needRecall);
    needRecall -= tookSafe;
    if (needRecall > 0) aiRecallFromList(playerIdx, fallback, needRecall);
  }
  return Math.min(target, p.supply);
}

// =============================================================================
// AI: EFFECT VALUATION
// =============================================================================
// Approximate VP value of a card's effect from the builder's perspective. Used
// by AI scoring so high-effect cards rank above plain VP cards. Calibrated by
// hand from ablation Δs (sim.js's sweepAblation) — keep these in sync.
const EFFECT_VP_FIXED = {
  'Granary': 3,
  'Charcoal Pit': 2,
  'Treaty Stone': 2,
  'Cattail Marsh': 1,
  'Otter Raft': 1,
  'Cache Burrow': 1,
  'Reed Bed': 0.5,
  'Otter Slide': 2,
  'Mill Wheel': 0.5,
  'Pack Rat Burrow': 1.5,
  'Royal Lodge': 1,
  'Burrow Run': 1,
  'Sap Drip': 1,
  'Snag Pile': 1,
  'Vine Lattice': 0.5,
  'Beaver Dam': 0.5,
  'Mud Levee': 0.5,
  'Wood Pile': 0,
  'Hollowed-out Log': 0,
  'Otter Den': 0,
  'Heron Roost': 0,
  'Driftwood Snag': 0,
  'Floodgate': 0,
  'Spy Mound': 0,
  'Tribute Stone': 0.5,
  'Beaver Tow': 1,
  'Otter Trail': 1.5,
  'Salmon Run': 2,
  'Stone Pool': 0,
  'Flush Channel': 0,
  'Salt Lick': 0,
  'Lookout Tree': 0,
};
function aiEffectValue(struct, p, state) {
  if (!effectActive(struct.name)) return 0;
  if (struct.name === 'Granary' && p.granaryUsed) return 0;
  if (struct.name === 'Floodgate' && p.floodgateUsed) return 0;
  if (struct.name === 'Spy Mound' && p.spyMoundUsed) return 0;
  if (struct.name === 'Tribute Stone' && p.tributeStoneUsed) return 0;
  // Otter Trail's value depends on having opponent workers on useful materials;
  // first-pass uses the flat EFFECT_VP_FIXED entry.
  if (struct.name === 'Pier') {
    const placed = state.shorelineCards.filter(c => workersOnCard(c, p.idx) > 0).length;
    const remaining = state.matDeck.length + state.riverCards.length;
    return Math.min(6, 2 * (placed + Math.min(3, Math.floor(remaining * 0.25))));
  }
  if (struct.name === 'Cattail Patch') {
    const mats = new Set();
    for (const b of p.built) for (const m in b.cost) mats.add(m);
    for (const m in struct.cost) mats.add(m);
    const handMats = new Set();
    for (const s of p.hand) for (const m in s.cost) handMats.add(m);
    let projected = mats.size;
    for (const m of handMats) {
      if (!mats.has(m) && projected < 6) projected += 1;
      if (projected - mats.size >= 2) break;
    }
    return CATTAIL_PATCH_VP[Math.min(projected, CATTAIL_PATCH_VP.length - 1)];
  }
  if (struct.name === 'Vine Ladder') {
    const builtVine = p.built.filter(b => (b.cost.vines || 0) > 0).length;
    const handVine = p.hand.filter(s => (s.cost.vines || 0) > 0).length;
    return 3 * (builtVine + Math.min(handVine, 2));
  }
  if (struct.name === 'Vine Trellis') {
    const builtVine = p.built.filter(b => (b.cost.vines || 0) > 0).length;
    const handVine = p.hand.filter(s => (s.cost.vines || 0) > 0).length;
    // End-game: +1 per Vine-cost build (incl. self), cap 6. Tempo: ~1 VP-eq for
    // the per-build slide-back (comparable to Otter Slide's fixed 2 across all builds).
    return Math.min(6, builtVine + 1 + Math.min(handVine, 2)) + 1;
  }
  if (struct.name === 'Stone Causeway') {
    const builtStone = p.built.filter(b => (b.cost.stones || 0) > 0).length;
    const handStone = p.hand.filter(s => (s.cost.stones || 0) > 0).length;
    return Math.min(6, builtStone + 1 + Math.min(handStone, 2)) + 1.5;
  }
  if (struct.name === 'Reed Walkway') {
    const builtReed = p.built.filter(b => (b.cost.reeds || 0) > 0).length;
    const handReed = p.hand.filter(s => (s.cost.reeds || 0) > 0).length;
    return Math.min(6, builtReed + 1 + Math.min(handReed, 2)) + 2;
  }
  if (struct.name === 'Clay Vault') {
    const builtClay = p.built.filter(b => (b.cost.clay || 0) > 0).length;
    const handClay = p.hand.filter(s => (s.cost.clay || 0) > 0).length;
    return Math.min(6, builtClay + 1 + Math.min(handClay, 2)) + 1;
  }
  if (struct.name === 'Burrow Network') {
    const builtMud = p.built.filter(b => (b.cost.mud || 0) > 0).length;
    const handMud = p.hand.filter(s => (s.cost.mud || 0) > 0).length;
    return Math.min(6, builtMud + 1 + Math.min(handMud, 2)) + 1;
  }
  if (struct.name === 'Hidden Cache') {
    const mats = new Set();
    for (const b of p.built) for (const m in b.cost) mats.add(m);
    const handMats = new Set();
    for (const s of p.hand) for (const m in s.cost) handMats.add(m);
    let projected = mats.size;
    for (const m of handMats) {
      if (!mats.has(m) && projected < 6) projected += 1;
      if (projected - mats.size >= 2) break;
    }
    return Math.min(9, Math.floor(projected / 2) * 3);
  }
  if (struct.name === 'Heron Watch') {
    const remaining = state.matDeck.length + state.riverCards.length;
    return Math.min(6, state.shorelineCards.length + Math.floor(remaining * 0.5));
  }
  return EFFECT_VP_FIXED[struct.name] || 0;
}

// =============================================================================
// AI: TURN DECISIONS
// =============================================================================
function aiChooseAction(playerIdx) {
  const p = state.players[playerIdx];
  const wbm = playerWorkersByMaterial(state, playerIdx);

  // 1) Buildable structure: pick highest VP per time, including effect value.
  const buildables = p.hand
    .map((s, i) => {
      const totalVp = s.vp + aiEffectValue(s, p, state);
      return { s, i, score: totalVp / Math.max(1, s.time), vp: totalVp };
    })
    .filter(o => canBuild(o.s, wbm, p))
    .sort((a, b) => b.vp - a.vp);
  if (buildables.length > 0) {
    return { type: 'build', handIdx: buildables[0].i };
  }

  // Compute material needs across hand
  const needs = {};
  for (const m of MAT_KEYS) needs[m] = 0;
  for (const s of p.hand) {
    for (const m in s.cost) {
      const deficit = Math.max(0, s.cost[m] - (wbm[m] || 0));
      needs[m] = Math.max(needs[m], deficit);
    }
  }
  const totalNeed = MAT_KEYS.reduce((sum, m) => sum + needs[m], 0);

  // 2) Score river + pre-river auction candidates jointly. Pick whatever
  //    yields the best (need × clinch_potential) net of trigger + per-item time.
  // Effective worker pool for triggering an auction = supply + workers we could
  // recall before bidding (pre-auction recall makes them just as good as supply).
  const triggerPool = p.supply + aiTotalRecallable(playerIdx);
  let bestCard = null, bestScore = -Infinity, bestKind = null, bestPrerivIdx = -1;
  // River cards: action cost 0t, per-item cost = riverSlotCost(slot).
  for (const c of state.riverCards) {
    if (uncoveredIcons(c) === 0) continue;
    const need = needs[c.material];
    if (need === 0) continue;
    const got = Math.min(uncoveredIcons(c), triggerPool, need);
    // playerCardCost picks up Reed Bed's per-item discount.
    const score = need * got - playerCardCost(c, playerIdx) * got * 0.4;
    if (score > bestScore) { bestScore = score; bestCard = c; bestKind = 'river'; }
  }
  // Pre-river cards: trigger cost varies by slot; once moved to river slot 0, per-item cost = 1t.
  for (let i = 0; i < state.prerivCards.length; i++) {
    const c = state.prerivCards[i];
    if (!c) continue;
    const need = needs[c.material];
    if (need === 0) continue;
    const got = Math.min(uncoveredIcons(c), triggerPool, need);
    if (got === 0) continue;
    const trigger = prerivTriggerCost(i);
    const score = need * got - 1 * got * 0.4 - trigger * 0.6;
    if (score > bestScore) { bestScore = score; bestCard = c; bestKind = 'preriv'; bestPrerivIdx = i; }
  }
  if (bestCard && triggerPool > 0) {
    if (bestKind === 'river') return { type: 'auction', cardId: bestCard.id };
    return { type: 'preriv', slotIdx: bestPrerivIdx };
  }

  // 2.5) Beaver Tow: if no good auction was found, but we have Beaver Tow built
  // and there's a useful river card at slot ≥ 1 with ≥4 uncovered icons, slide it
  // down so a future auction will be cheaper.
  if (hasEffect(p, 'Beaver Tow') && p.timePos + 2 < ENDGAME_TRACK_END) {
    const towTarget = findBeaverTowTarget(playerIdx, needs);
    if (towTarget) return { type: 'beaverTow', cardId: towTarget.id };
  }
  // 2.6) Salmon Run: place workers from supply onto a single river card without an auction,
  // paying the Fibonacci-ish escalating cost. Best used when one card has lots of useful icons.
  if (hasEffect(p, 'Salmon Run') && p.supply > 0 && p.timePos + 2 < ENDGAME_TRACK_END) {
    const target = findSalmonRunTarget(playerIdx, needs);
    if (target && p.timePos + salmonRunCumulativeCost(target.n) < ENDGAME_TRACK_END) {
      return { type: 'salmonRun', cardId: target.card.id, workerCount: target.n };
    }
  }

  // Endgame pair-VP cash-out: if we're in endgame and our leftover workers
  // already pair up to ≥1 VP, prefer passing over Invent / no-op continuation.
  // The cash-out is guaranteed; Inventing in endgame is usually a sunk-cost
  // trap (long Invent streaks burn fish toward forced retirement without
  // adding net VP). Build/auction branches above already ran — if either was
  // productive we'd have returned. Flush still fires before this since it
  // also runs an auction.
  const cashOut = state.endgame && endgamePairVP(state, playerIdx) >= 1;

  // 3) If hand has no needs at all (can't make progress) → browse
  if (totalNeed === 0 || p.hand.length === 0) {
    if (cashOut) return { type: 'pass' };
    if (structAvailable(state) > 0) {
      const N = Math.min(2, structAvailable(state));
      return { type: 'browse', n: N };
    }
  }

  // 4) Flush upstream when nothing in it matches our needs.
  // Flush triggers an auction on a fresh upstream card, so it requires at least one worker
  // (supply or recallable, since pre-auction recall covers triggers too).
  // Illegal once the material deck is empty — no fresh cards to draw.
  const upstreamHasNeeded = state.prerivCards.some(c => c && needs[c.material] > 0);
  const upstreamHasAny = state.prerivCards.some(c => c !== null);
  if (upstreamHasAny && !upstreamHasNeeded && triggerPool > 0 && state.matDeck.length > 0) {
    return { type: 'flush' };
  }

  // 5) Last resort: browse if possible (unless pair-VP cash-out beats it)
  if (cashOut) return { type: 'pass' };
  if (structAvailable(state) > 0) {
    const N = Math.min(1, structAvailable(state));
    return { type: 'browse', n: N };
  }

  // 6) Pass
  return { type: 'pass' };
}

// Tribute Stone: once-per-game force-recall of an opponent's worker.
// Drops a blank like a normal recall; the victim slides back 3🐟 in compensation.
// Returns true if it fired.
function doTributeStone(playerIdx, victimIdx, card) {
  const p = state.players[playerIdx];
  const victim = state.players[victimIdx];
  if (p.tributeStoneUsed) return false;
  if (workersOnCard(card, victimIdx) <= 0) return false;
  card.workers[victimIdx] -= 1;
  if (card.workers[victimIdx] === 0) delete card.workers[victimIdx];
  if (typeof card.slot === 'number') card.blanks += 1;
  victim.supply += 1;
  const before = victim.timePos;
  victim.timePos = Math.max(0, victim.timePos - 3);
  p.tributeStoneUsed = true;
  log(`🪨 Tribute Stone: ${speciesLabel(p)} forces ${speciesLabel(victim)} to recall a worker from ${MATERIALS[card.material].name}; ${speciesLabel(victim)} slides back ${before - victim.timePos}🐟.`);
  return true;
}

// Otter Trail: swap a worker of yours on river card A with a worker (any player's)
// on a different river card B. You pay A's per-item cost in fish. No blanks drop.
function doOtterTrail(playerIdx, cardAId, cardBId, otherPlayerIdx) {
  const p = state.players[playerIdx];
  const cardA = state.riverCards.find(c => c.id === cardAId);
  const cardB = state.riverCards.find(c => c.id === cardBId);
  if (!cardA || !cardB || cardA.id === cardB.id) return false;
  if (typeof cardA.slot !== 'number' || typeof cardB.slot !== 'number') return false;
  if (workersOnCard(cardA, playerIdx) <= 0) return false;
  if (workersOnCard(cardB, otherPlayerIdx) <= 0) return false;
  cardA.workers[playerIdx] -= 1;
  if (cardA.workers[playerIdx] === 0) delete cardA.workers[playerIdx];
  cardB.workers[otherPlayerIdx] -= 1;
  if (cardB.workers[otherPlayerIdx] === 0) delete cardB.workers[otherPlayerIdx];
  cardA.workers[otherPlayerIdx] = (cardA.workers[otherPlayerIdx] || 0) + 1;
  cardB.workers[playerIdx] = (cardB.workers[playerIdx] || 0) + 1;
  advancePlayer(playerIdx, cardCost(cardA));
  const other = state.players[otherPlayerIdx];
  log(`🦦 Otter Trail: ${speciesLabel(p)} pays ${cardCost(cardA)}🐟 and swaps a worker on ${MATERIALS[cardA.material].name} with ${speciesLabel(other)}'s worker on ${MATERIALS[cardB.material].name}.`);
  return true;
}

// AI heuristic: find a useful material on the river where an opponent has a worker.
// Plant your worker there (pry their worker off). Pick your own worker from the
// cheapest-cost river card where its material is least useful to you.
// Returns {cardA, cardB, otherIdx} or null.
function findOtterTrailTarget(playerIdx) {
  const p = state.players[playerIdx];
  const wbm = playerWorkersByMaterial(state, playerIdx);
  const needs = {};
  for (const m of MAT_KEYS) needs[m] = 0;
  for (const s of p.hand) {
    for (const m in s.cost) {
      needs[m] = Math.max(needs[m], Math.max(0, s.cost[m] - (wbm[m] || 0)));
    }
  }
  let bestB = null, bestBOther = -1, bestBNeed = 0;
  for (const c of state.riverCards) {
    if (typeof c.slot !== 'number') continue;
    if ((needs[c.material] || 0) === 0) continue;
    for (const k in c.workers) {
      const opIdx = parseInt(k);
      if (opIdx === playerIdx) continue;
      if (c.workers[k] <= 0) continue;
      if (needs[c.material] > bestBNeed) {
        bestBNeed = needs[c.material];
        bestB = c;
        bestBOther = opIdx;
      }
    }
  }
  if (!bestB) return null;
  // Pick our cheapest A: lowest cardCost where our material is irrelevant.
  let bestA = null, bestACost = Infinity;
  for (const c of state.riverCards) {
    if (c.id === bestB.id) continue;
    if (typeof c.slot !== 'number') continue;
    if (workersOnCard(c, playerIdx) <= 0) continue;
    const cost = cardCost(c);
    const uselessBonus = (needs[c.material] || 0) === 0 ? -1 : 0; // prefer useless-material cards
    if (cost + uselessBonus < bestACost) { bestACost = cost + uselessBonus; bestA = c; }
  }
  if (!bestA) return null;
  // Only fire if cost is justified by the need we're addressing.
  if (cardCost(bestA) > bestBNeed * 2) return null;
  return { cardA: bestA, cardB: bestB, otherIdx: bestBOther };
}

// Salmon Run: marginal fish cost for the 1st/2nd/3rd/4th/5th worker placed.
const SALMON_RUN_COSTS = [1, 2, 3, 5, 8];
function salmonRunCumulativeCost(n) {
  let total = 0;
  for (let i = 0; i < n && i < SALMON_RUN_COSTS.length; i++) total += SALMON_RUN_COSTS[i];
  return total;
}

// Salmon Run: as your main action, place N workers from supply on a single river card.
// Pays cumulative cost from SALMON_RUN_COSTS. No auction, no blanks.
function doSalmonRun(playerIdx, cardId, workerCount) {
  const p = state.players[playerIdx];
  const card = state.riverCards.find(c => c.id === cardId);
  if (!card || typeof card.slot !== 'number') return false;
  const maxPlaceable = Math.min(workerCount, p.supply, uncoveredIcons(card), SALMON_RUN_COSTS.length);
  if (maxPlaceable <= 0) return false;
  const cost = salmonRunCumulativeCost(maxPlaceable);
  card.workers[playerIdx] = (card.workers[playerIdx] || 0) + maxPlaceable;
  p.supply -= maxPlaceable;
  advancePlayer(playerIdx, cost);
  log(`🐟 Salmon Run: ${speciesLabel(p)} places ${maxPlaceable} worker${maxPlaceable === 1 ? '' : 's'} on ${MATERIALS[card.material].name} for ${cost}🐟.`);
  return true;
}

// AI heuristic: pick the highest-need river card; place the optimal worker count.
// Each placed worker yields 1 material, worth roughly cardCost(c) in fish-equivalent.
// Net value for N workers = sum of (per-worker yield - per-worker cost).
function findSalmonRunTarget(playerIdx, needs) {
  const p = state.players[playerIdx];
  let best = null;
  for (const c of state.riverCards) {
    if (typeof c.slot !== 'number') continue;
    const need = needs[c.material] || 0;
    if (need === 0) continue;
    const yieldPerWorker = playerCardCost(c, playerIdx); // material's "real" value ~= what we'd pay at auction
    let bestN = 0, bestGain = 0;
    const maxN = Math.min(p.supply, uncoveredIcons(c), need, SALMON_RUN_COSTS.length);
    for (let n = 1; n <= maxN; n++) {
      const gain = n * yieldPerWorker - salmonRunCumulativeCost(n);
      if (gain > bestGain) { bestGain = gain; bestN = n; }
    }
    if (bestN > 0 && (best === null || bestGain > best.gain)) {
      best = { card: c, n: bestN, gain: bestGain };
    }
  }
  // Opportunity-cost floor: a main action is worth ~3🐟 of board progress
  // (could otherwise auction, build, etc.). Don't burn it on marginal Salmon
  // Run gains — e.g. 1 worker on R1 saves only 1🐟 vs. a regular bid.
  if (best && best.gain < 3) return null;
  return best;
}

// Beaver Tow: pay 2🐟, slide a river card 1 slot upstream (toward Headwaters).
// Returns true on success.
function doBeaverTow(playerIdx, cardId) {
  const p = state.players[playerIdx];
  const card = state.riverCards.find(c => c.id === cardId);
  if (!card || typeof card.slot !== 'number' || card.slot === 0) return false;
  card.slot -= 1;
  advancePlayer(playerIdx, 2);
  log(`🦫 Beaver Tow: ${speciesLabel(p)} pays 2🐟 to slide ${MATERIALS[card.material].name} to River ${card.slot + 1} (${riverSlotCost(card.slot)}🐟/item).`);
  return true;
}

// Pick the best river card for Beaver Tow to slide: highest-slot useful-material card
// with ≥4 uncovered icons. Returns the card or null.
function findBeaverTowTarget(playerIdx, needs) {
  const p = state.players[playerIdx];
  // Beaver Tow's slide makes the card cheaper for *everyone* who auctions
  // it next, so only tow when the builder is the dominant beneficiary:
  //   (1) No opponent has any hand structure that needs this material.
  //   (2) Builder has trigger pool to auction the slid card themselves.
  // Without these the tow is a public-good action that helps opponents.
  const triggerPool = p.supply + aiTotalRecallable(playerIdx);
  if (triggerPool === 0) return null;
  const opponentNeedsMaterial = (mat) => {
    for (const op of state.players) {
      if (op.idx === playerIdx || op.exhausted || op.out) continue;
      for (const s of op.hand) {
        if ((s.cost[mat] || 0) > 0) return true;
      }
    }
    return false;
  };
  let best = null;
  for (const c of state.riverCards) {
    if (typeof c.slot !== 'number' || c.slot === 0) continue;
    const own = needs[c.material] || 0;
    if (own < 2) continue;
    if (uncoveredIcons(c) < 4) continue;
    if (opponentNeedsMaterial(c.material)) continue;
    if (!best || c.slot > best.slot || (c.slot === best.slot && uncoveredIcons(c) > uncoveredIcons(best))) best = c;
  }
  return best;
}

// Heuristic: find the highest-per-item-cost river card with an opponent worker on it.
// Returns {victimIdx, card} or null.
function findTributeStoneTarget(playerIdx) {
  let best = null;
  for (const c of state.riverCards) {
    for (const k in c.workers) {
      const opIdx = parseInt(k);
      if (opIdx === playerIdx) continue;
      if (c.workers[k] <= 0) continue;
      const value = cardCost(c);
      if (!best || value > best.value) best = { victimIdx: opIdx, card: c, value };
    }
  }
  return best;
}

// Heron Roost / Driftwood Snag / Tribute Stone: optional start-of-turn abilities.
// Auto-fire for AI; each Heron Roost / Driftwood Snag costs 1🐟 (Tribute Stone is free).
//
// TODO(human-ui): a human owner of Heron Roost or Driftwood Snag currently has NO way to
// trigger these — this helper only runs in the AI branch. Add start-of-turn prompt buttons
// (e.g., "Use Heron Roost to replace Upstream X for 1🐟?") so the human can choose target
// + whether to fire.
function aiStartOfTurnAbilities(playerIdx) {
  const p = state.players[playerIdx];
  if (hasEffect(p, 'Heron Roost') && state.matDeck.length > 0 && p.timePos < ENDGAME_TRACK_END - 1) {
    const myMats = new Set();
    for (const s of p.hand) for (const m in s.cost) myMats.add(m);
    const target = state.prerivCards.findIndex(c => c && !myMats.has(c.material));
    if (target !== -1) {
      const newCard = state.matDeck.pop();
      newCard.slot = 'pre';
      state.prerivCards[target] = newCard;
      p.timePos += 1;
      log(`🦩 Heron Roost: ${speciesLabel(p)} replaces a Headwaters card (+1🐟).`);
    }
  }
  if (hasEffect(p, 'Driftwood Snag') && p.timePos < ENDGAME_TRACK_END - 1) {
    const myMats = new Set();
    for (const s of p.hand) for (const m in s.cost) myMats.add(m);
    const cands = [...state.riverCards, ...state.prerivCards.filter(c => c)]
      .filter(c => uncoveredIcons(c) >= 4 && !myMats.has(c.material));
    if (cands.length > 0) {
      const target = cands.reduce((a, b) => uncoveredIcons(a) >= uncoveredIcons(b) ? a : b);
      target.blanks += 1;
      p.timePos += 1;
      log(`🪵 Driftwood Snag: ${speciesLabel(p)} drops a blank on ${MATERIALS[target.material].name} (+1🐟).`);
    }
  }
  // Tribute Stone: fire when there's a high-value opponent worker (per-item cost ≥ 3)
  // and we're not too deep into endgame (slide-back is useless if the victim is already past us).
  if (hasEffect(p, 'Tribute Stone') && !p.tributeStoneUsed && p.timePos < ENDGAME_TRACK_END - 10) {
    const target = findTributeStoneTarget(playerIdx);
    if (target && target.value >= 3) {
      doTributeStone(playerIdx, target.victimIdx, target.card);
    }
  }
  // Otter Trail: swap to pry an opponent off a useful material card.
  if (hasEffect(p, 'Otter Trail') && p.timePos < ENDGAME_TRACK_END - 5) {
    const target = findOtterTrailTarget(playerIdx);
    if (target && p.timePos + cardCost(target.cardA) < ENDGAME_TRACK_END) {
      doOtterTrail(playerIdx, target.cardA.id, target.cardB.id, target.otherIdx);
    }
  }
  // Snare Set (mink species starter): Tribute Stone variant w/ its own flag.
  if (hasEffect(p, 'Snare Set') && !p.snareSetUsed && p.timePos < ENDGAME_TRACK_END - 10) {
    const target = findTributeStoneTarget(playerIdx);
    if (target && target.value >= 3) {
      // Mirror Tribute Stone logic but mark the snareSetUsed flag.
      const victim = state.players[target.victimIdx];
      target.card.workers[target.victimIdx] -= 1;
      if (target.card.workers[target.victimIdx] === 0) delete target.card.workers[target.victimIdx];
      if (typeof target.card.slot === 'number') target.card.blanks += 1;
      victim.supply += 1;
      victim.timePos = Math.max(0, victim.timePos - 3);
      p.snareSetUsed = true;
      log(`🪤 Snare Set: ${speciesLabel(p)} forces ${speciesLabel(victim)} to recall 1 worker; ${speciesLabel(victim)} slides back 3🐟.`);
    }
  }
  // Tail Slap (beaver species starter): pay 1🐟 to drop a blank on a R1 card
  // whose material we don't need (denies opponents).
  if (hasEffect(p, 'Tail Slap') && p.timePos < ENDGAME_TRACK_END - 1) {
    const myMats = new Set();
    for (const s of p.hand) for (const m in s.cost) myMats.add(m);
    const cands = state.riverCards
      .filter(c => c.slot === 0 && uncoveredIcons(c) >= 3 && !myMats.has(c.material));
    if (cands.length > 0) {
      const target = cands.reduce((a, b) => uncoveredIcons(a) >= uncoveredIcons(b) ? a : b);
      target.blanks += 1;
      p.timePos += 1;
      log(`🦫 Tail Slap: ${speciesLabel(p)} drops a blank on R1 ${MATERIALS[target.material].name} (+1🐟).`);
    }
  }
  // Channel Clearer (muskrat species starter): discard 1 opponent Reed worker
  // from any river card. No fish cost, no blank.
  if (hasEffect(p, 'Channel Clearer')) {
    let pick = null;
    for (const c of state.riverCards) {
      if (c.material !== 'reeds') continue;
      for (const k in c.workers) {
        const opIdx = parseInt(k);
        if (opIdx === playerIdx || c.workers[k] <= 0) continue;
        pick = { card: c, victimIdx: opIdx };
        break;
      }
      if (pick) break;
    }
    if (pick) {
      pick.card.workers[pick.victimIdx] -= 1;
      if (pick.card.workers[pick.victimIdx] === 0) delete pick.card.workers[pick.victimIdx];
      state.players[pick.victimIdx].supply += 1;
      log(`🐭 Channel Clearer: ${speciesLabel(p)} clears 1 Reed worker from ${speciesLabel(state.players[pick.victimIdx])}.`);
    }
  }
  // Rolling Float (otter species starter): once-per-game free same-slot swap.
  if (hasEffect(p, 'Rolling Float') && !p.rollingFloatUsed) {
    const wbm = playerWorkersByMaterial(state, playerIdx);
    const needs = {};
    for (const m of MAT_KEYS) needs[m] = 0;
    for (const s of p.hand) for (const m in s.cost) {
      needs[m] = Math.max(needs[m], Math.max(0, s.cost[m] - (wbm[m] || 0)));
    }
    let best = null, bestScore = 0;
    for (const cardA of state.riverCards) {
      if (typeof cardA.slot !== 'number') continue;
      if (workersOnCard(cardA, playerIdx) <= 0) continue;
      for (const cardB of state.riverCards) {
        if (cardB.id === cardA.id || cardB.slot !== cardA.slot) continue;
        for (const k in cardB.workers) {
          const opIdx = parseInt(k);
          if (opIdx === playerIdx || cardB.workers[k] <= 0) continue;
          const score = (needs[cardB.material] || 0) - (needs[cardA.material] || 0);
          if (score > bestScore) { best = { cardA, cardB, opIdx }; bestScore = score; }
        }
      }
    }
    if (best) {
      best.cardA.workers[playerIdx] -= 1;
      if (best.cardA.workers[playerIdx] === 0) delete best.cardA.workers[playerIdx];
      best.cardB.workers[best.opIdx] -= 1;
      if (best.cardB.workers[best.opIdx] === 0) delete best.cardB.workers[best.opIdx];
      best.cardA.workers[best.opIdx] = (best.cardA.workers[best.opIdx] || 0) + 1;
      best.cardB.workers[playerIdx] = (best.cardB.workers[playerIdx] || 0) + 1;
      p.rollingFloatUsed = true;
      log(`🦦 Rolling Float: ${speciesLabel(p)} swaps a worker on ${MATERIALS[best.cardA.material].name} for ${MATERIALS[best.cardB.material].name} (same slot).`);
    }
  }
}

// Returns {safe, fallback}: ordered lists of {cardId, count} for pre-auction recall.
//   safe     — no-regret recalls: shoreline (no blank), then irrelevant-material
//              river workers, then surplus useful workers (placed > hand-build cap).
//   fallback — at-cap useful workers, river-side, highest per-item cost first.
//              Dipped into only when supply is 0 / a min-bid forces it.
function aiRecallBudget(playerIdx) {
  const p = state.players[playerIdx];
  const useful = new Set();
  for (const s of p.hand) for (const m in s.cost) useful.add(m);
  const cap = {};
  for (const m of MAT_KEYS) cap[m] = 0;
  for (const s of p.hand) for (const m in s.cost) cap[m] = Math.max(cap[m], s.cost[m]);
  const placed = playerWorkersByMaterial(state, playerIdx);
  const safe = [], fallback = [];
  const cards = [
    ...state.shorelineCards.map(c => ({ c, river: false })),
    ...state.riverCards.slice().sort((a, b) => cardCost(b) - cardCost(a)).map(c => ({ c, river: true })),
  ];
  for (const { c, river } of cards) {
    const w = workersOnCard(c, playerIdx);
    if (w === 0) continue;
    let safeRecall;
    if (!useful.has(c.material)) safeRecall = w;
    else safeRecall = Math.min(w, Math.max(0, placed[c.material] - cap[c.material]));
    if (safeRecall > 0) {
      safe.push({ cardId: c.id, count: safeRecall });
      placed[c.material] -= safeRecall;
    }
    const remaining = w - safeRecall;
    if (remaining > 0 && river) fallback.push({ cardId: c.id, count: remaining });
  }
  return { safe, fallback };
}

function aiTotalRecallable(playerIdx) {
  const { safe, fallback } = aiRecallBudget(playerIdx);
  return safe.reduce((s, x) => s + x.count, 0) + fallback.reduce((s, x) => s + x.count, 0);
}

// Recall up to `count` workers from the given ordered list. Returns # actually recalled.
function aiRecallFromList(playerIdx, list, count) {
  if (count <= 0) return 0;
  const spec = [];
  let need = count;
  for (const item of list) {
    if (need <= 0) break;
    const take = Math.min(item.count, need);
    spec.push({ cardId: item.cardId, count: take });
    need -= take;
  }
  if (spec.length === 0) return 0;
  callWorkersHome(playerIdx, spec);
  return count - need;
}

function aiBrowseDiscardChoice(playerIdx, drawn) {
  const p = state.players[playerIdx];
  const wbm = playerWorkersByMaterial(state, playerIdx);
  const all = [
    ...p.hand.map((s, i) => ({ s, key: 'h' + i })),
    ...drawn.map((s, i) => ({ s, key: 'd' + i })),
  ];
  // Score each by buildability + VP
  function score(s) {
    let deficit = 0;
    for (const m in s.cost) deficit += Math.max(0, s.cost[m] - (wbm[m] || 0));
    return s.vp - deficit * 1.5;
  }
  all.sort((a, b) => score(a.s) - score(b.s));   // ascending so worst first
  // Discard the worst N
  const N = drawn.length;
  return new Set(all.slice(0, N).map(o => o.key));
}

let humanResolver = null;

function awaitHuman() {
  return new Promise(r => { humanResolver = r; });
}

async function humanUseHeronRoost() {
  const human = state.players.find(p => p.isHuman);
  if (!human || !hasEffect(human, 'Heron Roost') || state.matDeck.length === 0) return;
  if (human.timePos >= ENDGAME_TRACK_END - 1) return;
  const cands = state.prerivCards
    .map((c, i) => c ? { card: c, idx: i } : null)
    .filter(x => x);
  if (cands.length === 0) return;
  const pick = await pickFromList(
    '🦩 Heron Roost — replace Headwaters card',
    'Pick which Headwaters card to discard. The top of the material deck replaces it. Costs 1🐟.',
    cands,
    x => `Headwaters ${PRERIV_SLOTS - x.idx}: ${MATERIALS[x.card.material].emoji} ${MATERIALS[x.card.material].name} (${x.card.totalIcons} icons)`
  );
  if (!pick) return;
  const newCard = state.matDeck.pop();
  newCard.slot = 'pre';
  state.prerivCards[pick.idx] = newCard;
  human.timePos += 1;
  log(`🦩 Heron Roost: ${speciesLabel(human)} replaces Headwaters ${PRERIV_SLOTS - pick.idx} with ${MATERIALS[newCard.material].name} (+1🐟).`);
  render();
}

async function humanUseDriftwoodSnag() {
  const human = state.players.find(p => p.isHuman);
  if (!human || !hasEffect(human, 'Driftwood Snag')) return;
  if (human.timePos >= ENDGAME_TRACK_END - 1) return;
  const cands = [
    ...state.riverCards.map(c => ({ card: c, where: `River ${c.slot + 1}` })),
    ...state.prerivCards.map((c, i) => c ? { card: c, where: `Headwaters ${PRERIV_SLOTS - i}` } : null).filter(x => x),
  ].filter(x => uncoveredIcons(x.card) > 0);
  if (cands.length === 0) return;
  const pick = await pickFromList(
    '🪵 Driftwood Snag — drop a blank',
    'Pick any river or Headwaters card with an uncovered icon. One icon becomes blocked. Costs 1🐟.',
    cands,
    x => `${x.where}: ${MATERIALS[x.card.material].emoji} ${MATERIALS[x.card.material].name} (${uncoveredIcons(x.card)} open)`
  );
  if (!pick) return;
  pick.card.blanks += 1;
  human.timePos += 1;
  log(`🪵 Driftwood Snag: ${speciesLabel(human)} drops a blank on ${MATERIALS[pick.card.material].name} (+1🐟).`);
  render();
}

async function humanUseOtterTrail() {
  const human = state.players.find(p => p.isHuman);
  if (!human || !hasEffect(human, 'Otter Trail')) return;
  // Step 1: pick source card (one with your worker).
  const sourceCands = state.riverCards
    .filter(c => typeof c.slot === 'number' && workersOnCard(c, human.idx) > 0)
    .map(c => ({ card: c }));
  if (sourceCands.length === 0) return;
  const sourcePick = await pickFromList(
    '🦦 Otter Trail — pick YOUR worker to swap out',
    'Pick the river card whose worker you want to move. You will pay this card\'s per-item cost in fish.',
    sourceCands,
    x => `River ${x.card.slot + 1} (${cardCost(x.card)}🐟/item): ${MATERIALS[x.card.material].emoji} ${MATERIALS[x.card.material].name}`
  );
  if (!sourcePick) return;
  // Step 2: pick target worker (any worker on a different river card).
  const targetCands = [];
  for (const c of state.riverCards) {
    if (c.id === sourcePick.card.id) continue;
    if (typeof c.slot !== 'number') continue;
    for (const k in c.workers) {
      if (c.workers[k] <= 0) continue;

  );

async function humanUseRollingFloat() {

  if (!human || !hasEffect(human, 'Rolling Float') || human.rollingFloatUsed) return;
  // Build candidate pairs: my worker on cardA, opponent's worker on cardB, same slot.
  const pairs = [];
  for (const a of state.riverCards) {
    if (typeof a.slot !== 'number' || workersOnCard(a, human.idx) <= 0) continue;
    for (const b of state.riverCards) {

  );

  pick.a.workers[human.idx] -= 1;

async function humanFlushUpstream() {
  state.lastHumanActionType = 'flush';
  const human = state.players.find(p => p.isHuman);
  advancePlayer(human.idx, 5);
  log(`🌀 ${speciesLabel(human)} spends 5🐟 to flush the Headwaters.`);
  // 1) Discard upstream cards (we'll return these to the deck below).
  const flushed = [];
  for (let i = 0; i < state.prerivCards.length; i++) {
    if (state.prerivCards[i]) flushed.push(state.prerivCards[i]);
    state.prerivCards[i] = null;
  }
  // 2) Refill upstream from deck.
  for (let i = 0; i < PRERIV_SLOTS; i++) {
    if (state.matDeck.length === 0) break;
    const c = state.matDeck.pop();
    c.slot = 'pre';
    state.prerivCards[i] = c;
  }
  // 3) Return the flushed cards to the material deck and reshuffle.
  if (flushed.length > 0) {
    for (const c of flushed) {
      c.slot = null;
      c.workers = {};
      c.blanks = 0;
      state.matDeck.push(c);
    }
    state.matDeck = shuffle(state.matDeck);
    log(`🔀 ${flushed.length} flushed card${flushed.length === 1 ? '' : 's'} returned to the material deck (reshuffled).`);
  }
  // 4) Prompt human to pick one upstream card to auction (free trigger; bid normally).
  if (state.prerivCards.every(c => c === null)) {
    state.phase = 'idle';
    render();
    return;
  }
  state.phase = 'flush-pick-card';
  render();
  await new Promise(resolve => { state._flushPickResolver = resolve; });
}

  human.hand = newHand;

async function performBuild(playerIdx, handIdx) {
  const p = state.players[playerIdx];
  const struct = p.hand[handIdx];
  // Snapshot for potential undo from an interactive on-build modal (e.g. Sap
  // Drip's Cancel button). JSON clone is safe because state is plain data
  // (no functions, no DOM refs).
  const buildSnapshot = JSON.parse(JSON.stringify(state));
  const wbm = playerWorkersByMaterial(state, playerIdx);
  // Granary prompt: if a human owner could choose to save it for a later build, ask.
  // (When Granary is required to make this build buildable at all, auto-fire silently.)
  let suppressGranary = false;
  if (p.isHuman && hasEffect(p, 'Granary') && !p.granaryUsed) {
    const wouldFire = effectiveBuildCost(struct, p, wbm).granaryUsed;
    if (wouldFire) {
      const savedFlag = p.granaryUsed;
      p.granaryUsed = true;
      const buildableWithout = canBuild(struct, wbm, p);
      p.granaryUsed = savedFlag;
      if (buildableWithout) {
        const useNow = await confirmModal(
          '🌾 Use Granary?',
          'Save 1 worker on this build, or save Granary for a future build? (Once per game.)',
          'Use now', 'Save for later'
        );
        if (!useNow) suppressGranary = true;
      }
    }
  }
  if (suppressGranary) p.granaryUsed = true;
  const { eff: effCost, granaryUsed, stoneToolUsed } = effectiveBuildCost(struct, p, wbm);
  if (suppressGranary) p.granaryUsed = false;
  if (granaryUsed) {
    p.granaryUsed = true;
    log(`🌾 ${speciesLabel(p)} uses Granary to save 1 worker on this build.`);
  }
  if (stoneToolUsed) {
    p.stoneToolUsed = true;
    log(`🦪 ${speciesLabel(p)} uses Stone Tool — 1 Stones worker substitutes for any other material.`);
  }
  // Two-pass consumption: vanilla cards first (preserves wild capacity for
  // materials with no vanilla source), wild cards second to cover deficits.
  let workersReturned = 0;
  let vineCurtainHit = false; // fires Vine Curtain peek-rearrange once per build
  const remainingNeed = { ...effCost };

  const consume = (c, need, mLabel) => {
    const have = workersOnCard(c, playerIdx);
    if (have === 0 || need === 0) return { take: 0, yielded: 0 };
    const mult = cardYieldMultiplier(c);
    const wantWorkers = Math.ceil(need / mult);
    const take = Math.min(have, wantWorkers);
    c.workers[playerIdx] = have - take;
    if (c.workers[playerIdx] === 0) delete c.workers[playerIdx];
    if (typeof c.slot === 'number') c.blanks += take;
    if (mult > 1 && take > 0) {
      log(`🌳 Old Growth doubled yield: ${take} worker${take === 1 ? '' : 's'} → ${take * mult} ${mLabel}.`);
    }
    if (take > 0 && c.effect === 'peek-rearrange') vineCurtainHit = true;
    return { take, yielded: take * mult };
  };

  // Pass A: vanilla cards only.
  for (const m of Object.keys(remainingNeed)) {
    if (remainingNeed[m] === 0) continue;
    for (const c of state.shorelineCards) {
      if (remainingNeed[m] === 0) break;
      if (c.material !== m || c.wildAlt) continue;
      const { take, yielded } = consume(c, remainingNeed[m], m);
      remainingNeed[m] = Math.max(0, remainingNeed[m] - yielded);
      workersReturned += take;
    }
    const riverVanilla = state.riverCards
      .filter(c => c.material === m && !c.wildAlt && workersOnCard(c, playerIdx) > 0)
      .sort((a, b) => cardCost(a) - cardCost(b));
    for (const c of riverVanilla) {
      if (remainingNeed[m] === 0) break;
      const { take, yielded } = consume(c, remainingNeed[m], m);
      remainingNeed[m] = Math.max(0, remainingNeed[m] - yielded);
      workersReturned += take;
    }
  }

  // Pass B: wild cards fill any remaining deficits.
  const wildCards = []
    .concat(state.shorelineCards.filter(c => c.wildAlt && workersOnCard(c, playerIdx) > 0))
    .concat(state.riverCards.filter(c => c.wildAlt && workersOnCard(c, playerIdx) > 0)
      .sort((a, b) => cardCost(a) - cardCost(b)));
  for (const c of wildCards) {
    const options = [c.material, c.wildAlt].sort(
      (a, b) => (remainingNeed[b] || 0) - (remainingNeed[a] || 0)
    );
    for (const m of options) {
      if ((remainingNeed[m] || 0) === 0) continue;
      if (workersOnCard(c, playerIdx) === 0) break;
      const { take, yielded } = consume(c, remainingNeed[m], m);
      remainingNeed[m] = Math.max(0, (remainingNeed[m] || 0) - yielded);
      workersReturned += take;
      if (take > 0 && m !== c.material) {
        log(`✦ ${MATERIALS[c.material].name}/${MATERIALS[c.wildAlt].name} wildcard spent as ${MATERIALS[m].name}.`);
      }
    }
  }

  p.supply += workersReturned;
  // Vine Curtain (Vines-4 effect card): when a worker is retrieved from it
  // during this build, the building player gets to peek + rearrange the top 2
  // of the material deck. Human gets a modal; AI rearranges greedily.
  if (vineCurtainHit) {
    if (p.isHuman) await humanVineCurtainRearrange(playerIdx);
    else aiVineCurtainRearrange(playerIdx);
  }
  // Build cost in time — Otter Slide reduces by 3 (min 1) when active. Cards with printed time 0 stay 0.
  // Lodge Foundation (beaver species starter): -1 fish on Logs-using builds.
  const slideDiscount = hasEffect(p, 'Otter Slide') ? 3 : 0;
  const lodgeDiscount = (hasEffect(p, 'Lodge Foundation') && (struct.cost.logs || 0) > 0) ? 1 : 0;
  const timeCost = struct.time === 0 ? 0 : Math.max(1, struct.time - slideDiscount - lodgeDiscount);
  advancePlayer(playerIdx, timeCost);
  // Move card from hand to built
  p.hand.splice(handIdx, 1);
  p.built.push(struct);
  log(`🏗 ${speciesLabel(p)} builds <b>${struct.name}</b> (${timeCost}🐟, ${struct.vp}★).`);
  // Fire on-build effect (one-time triggers).
  await fireOnBuildEffect(playerIdx, struct);
  // If an on-build modal flagged the build for cancellation, restore the
  // pre-build state in-place (so any outside references to `state` itself stay
  // valid) and bail before drawing replacements.
  if (state._buildCancelled) {
    delete state._buildCancelled;
    for (const k of Object.keys(state)) delete state[k];
    Object.assign(state, buildSnapshot);
    log(`🚫 ${speciesLabel(state.players[playerIdx])} cancelled the ${struct.name} build — workers, materials, and time refunded.`);
    render();
    return;
  }
  // Draw replacements up to (post-build) hand size — Cache Burrow may now be active.
  while (p.hand.length < maxHandSize(p) && structAvailable(state) > 0) {
    p.hand.push(popStructDeck(state));
  }
  // Passive build-triggered effects keyed off the builder's tableau (fire when
  // ANY structure with the matching material is built). Runs after the refill so
  // Stone Causeway's extra draw goes over the hand limit before re-filtering.
  await firePassiveBuildEffects(playerIdx, struct);
  cleanupShoreline();
}

async function firePassiveBuildEffects(playerIdx, struct) {
  const p = state.players[playerIdx];
  if (hasEffect(p, 'Vine Trellis') && (struct.cost.vines || 0) > 0) {
    const before = p.timePos;
    p.timePos = Math.max(0, p.timePos - 1);
    if (p.timePos < before) {
      log(`🪜 ${speciesLabel(p)} slides back ${before - p.timePos} on the fish track (Vine Trellis).`);
    }
  }
  if (hasEffect(p, 'Stone Causeway') && (struct.cost.stones || 0) > 0) {
    if (p.isHuman) await humanStoneCausewayDraw(playerIdx);
    else aiStoneCausewayDraw(playerIdx);
  }
  if (hasEffect(p, 'Reed Walkway') && (struct.cost.reeds || 0) > 0) {
    if (p.isHuman) await humanReedWalkwayPlace(playerIdx);
    else aiReedWalkwayPlace(playerIdx);
  }
  if (hasEffect(p, 'Clay Vault') && (struct.cost.clay || 0) > 0) {
    if (p.isHuman) await humanClayVaultSwap(playerIdx);
    else aiClayVaultSwap(playerIdx);
  }
  if (hasEffect(p, 'Burrow Network') && (struct.cost.mud || 0) > 0) {
    if (p.isHuman) await humanBurrowNetworkMove(playerIdx);
    else aiBurrowNetworkMove(playerIdx);
  }
}

// Human modal — pick which card to discard after Stone Causeway's draw.
async function humanStoneCausewayDraw(playerIdx) {
  const p = state.players[playerIdx];
  if (structAvailable(state) === 0) return;
  const drawn = popStructDeck(state);
  if (!drawn) return;
  p.hand.push(drawn);
  log(`🪨 Stone Causeway draws ${drawn.name}. Pick a card to discard.`);
  render();
  if (p.hand.length <= maxHandSize(p)) return;
  const items = p.hand.map((s, i) => ({ s, i }));
  const pick = await pickFromList(
    '🪨 Stone Causeway — discard a card',
    `You drew <b>${drawn.name}</b> on top of your normal refill. Pick one card from your hand to discard.`,
    items,
    x => `${x.s.name} — ${x.s.vp}★ · ${x.s.time}🐟 · ${Object.entries(x.s.cost).map(([m, n]) => MATERIALS[m].emoji + n).join(' ')}`,
    { cancelable: false }
  );
  const idx = pick ? pick.i : (p.hand.length - 1); // fallback: discard the drawn card
  const dropped = p.hand.splice(idx, 1)[0];
  state.structDiscard.push(dropped);
  log(`🪨 Stone Causeway: discarded ${dropped.name}.`);
  render();
}
