// Board-based combined-auction selection. Look up a card (river or Headwaters).
function findBoardCard(cardId) {
  return state.riverCards.find(c => c.id === cardId) || state.prerivCards.find(c => c && c.id === cardId) || null;
}
function humanCancelCombinedPick() {
  state.combinedPick = null;
  state.phase = 'choose-action';
  render();
}
function humanSelectCombinedCard(cardId) {
  const human = state.players.find(p => p.isHuman);
  if (!human || state.phase !== 'combined-pick') return;
  const card = findBoardCard(cardId);
  if (!card || uncoveredIcons(card) === 0) return;
  const cfg = combinedConfig();
  const first = state.combinedPick && state.combinedPick.first;
  // No first pick yet, or clicking the current first toggles it off.
  if (!first) { state.combinedPick = { first: cardId }; render(); return; }
  if (cardId === first) { state.combinedPick = { first: null }; render(); return; }
  const cardA = findBoardCard(first);
  // 'same' pairing: a different-material second click re-selects the first pick.
  if (cfg.pairing === 'same' && card.material !== cardA.material) {
    state.combinedPick = { first: cardId };
    render();
    return;
  }
  // Valid pair — run the pooled auction.
  const src = DOUBLE_VISION_ACTIVE ? 'Double Vision' : 'Confluence';
  const trig = combinedTriggerCost(cardA, card);
  state.lastHumanActionType = 'confluence';
  state.combinedPick = null;
  state.phase = 'idle';
  advancePlayer(human.idx, trig);
  log(`🎬 ${speciesLabel(human)} spends ${trig}🐟 (${src}) to pool-auction ${MATERIALS[cardA.material].name} + ${MATERIALS[card.material].name}.`);
  render();
  runCombinedAuction(cardA, card, human.idx, 1).then(() => humanResolver && humanResolver());
}

async function humanFlushUpstream() {
  state.lastHumanActionType = 'flush';
  const human = state.players.find(p => p.isHuman);
  advancePlayer(human.idx, 5);
  log(`🌀 ${speciesLabel(human)} spends 5🐟 to flush the Headwaters.`);
  // 1) Discard upstream cards (we'll return these to the deck below).
  const flushed = [];
  for (let i = 0; i < state.prerivCards.length; i++) {
    if (state.prerivCards[i]) flushed.push(state.prerivCards[i]);
    state.prerivCards[i] = null;
  }
  // 2) Refill upstream from deck.
  for (let i = 0; i < PRERIV_SLOTS; i++) {
    if (state.matDeck.length === 0) break;
    const c = state.matDeck.pop();
    c.slot = 'pre';
    state.prerivCards[i] = c;
  }
  // 3) Return the flushed cards to the material deck and reshuffle.
  if (flushed.length > 0) {
    for (const c of flushed) {
      c.slot = null;
      c.workers = {};
      c.blanks = 0;
      state.matDeck.push(c);
    }
    state.matDeck = shuffle(state.matDeck);
    log(`🔀 ${flushed.length} flushed card${flushed.length === 1 ? '' : 's'} returned to the material deck (reshuffled).`);
  }
  // 4) Prompt human to pick one upstream card to auction (free trigger; bid normally).
  if (state.prerivCards.every(c => c === null)) {
    state.phase = 'idle';
    render();
    return;
  }
  state.phase = 'flush-pick-card';
  render();
  await new Promise(resolve => { state._flushPickResolver = resolve; });
}

function humanSelectFlushTarget(slotIdx) {
  if (state.phase !== 'flush-pick-card') return;
  const card = state.prerivCards[slotIdx];
  if (!card) return;
  const human = state.players.find(p => p.isHuman);
  log(`🎬 ${speciesLabel(human)} picks Headwaters ${PRERIV_SLOTS - slotIdx} ${MATERIALS[card.material].name} (${UPSTREAM_AUCTION_COST}🐟/item) to auction.`);
  state.phase = 'idle';
  render();
  runAuction(card, human.idx, 1).then(() => {
    const r = state._flushPickResolver;
    state._flushPickResolver = null;
    if (r) r();
  });
}

function humanCancelAction() {
  state.phase = 'choose-action';
  state.browseDrawn = null;
  state.browseSelected = null;
  render();
}

function humanRetire() {
  state.lastHumanActionType = 'retire';
  state.phase = 'idle';
  render();
  if (humanResolver) humanResolver();
}

function humanSelectAuctionCard(cardId) {
  state.lastHumanActionType = 'auction';
  const card = state.riverCards.find(c => c.id === cardId);
  if (!card || uncoveredIcons(card) === 0) return;
  const human = state.players.find(p => p.isHuman);
  advancePlayer(human.idx, 1);
  log(`🎬 ${speciesLabel(human)} spends 1🐟 to auction ${MATERIALS[card.material].name} at River ${card.slot + 1}.`);
  state.phase = 'idle';
  render();
  runAuction(card, human.idx, 1).then(() => humanResolver && humanResolver());
}

function humanSelectPrerivCard(slotIdx) {
  state.lastHumanActionType = 'preriv';
  const card = state.prerivCards[slotIdx];
  if (!card) return;
  const human = state.players.find(p => p.isHuman);
  // Need at least one worker available anywhere (supply or recallable) to trigger.
  if (human.supply + totalPlacedWorkers(state, human.idx) === 0) return;
  const moveCost = prerivTriggerCost(slotIdx);
  advancePlayer(human.idx, moveCost);
  log(`🎬 ${speciesLabel(human)} spends ${moveCost}🐟 to auction Headwaters ${PRERIV_SLOTS - slotIdx} ${MATERIALS[card.material].name} (${UPSTREAM_AUCTION_COST}🐟/item).`);
  state.phase = 'idle';
  render();
  runAuction(card, human.idx, 1).then(() => humanResolver && humanResolver());
}

function humanConfirmBrowseN() {
  state.lastHumanActionType = 'browse';
  let N = parseInt(document.getElementById('browse-n').value) || 1;
  N = Math.max(1, Math.min(5, N));
  const human = state.players.find(p => p.isHuman);
  const drawCount = Math.min(N, structAvailable(state));
  const drawn = [];
  for (let i = 0; i < drawCount; i++) drawn.push(popStructDeck(state));
  advancePlayer(human.idx, drawCount);
  log(`📚 ${speciesLabel(human)} invents from ${drawCount} cards (${drawCount}🐟).`);
  state.browseDrawn = drawn;
  state.browseSelected = new Set();
  // Capture target keep count: ending hand size = the player's max (Cache Burrow → 4).
  state.browseKeepCount = maxHandSize(human);
  state.phase = 'browse-keep';
  render();
}

function toggleBrowseSelect(key) {
  if (!state.browseSelected) return;
  if (state.browseSelected.has(key)) state.browseSelected.delete(key);
  else state.browseSelected.add(key);
  render();
}

function humanConfirmBrowseKeep() {
  if (state.browseSelected.size !== state.browseKeepCount) return;
  const human = state.players.find(p => p.isHuman);
  // Selected = cards to KEEP. Unselected = discarded.
  const newHand = [];
  const discarded = [];
  human.hand.forEach((s, i) => {
    if (state.browseSelected.has('h' + i)) newHand.push(s);
    else discarded.push(s);
  });
  state.browseDrawn.forEach((s, i) => {
    if (state.browseSelected.has('d' + i)) newHand.push(s);
    else discarded.push(s);
  });
  for (const d of discarded) state.structDiscard.push(d);
  human.hand = newHand;
  state.browseDrawn = null;
  state.browseSelected = null;
  state.browseKeepCount = null;
  state.phase = 'idle';
  render();
  humanResolver && humanResolver();
}

async function humanSelectBuild(handIdx) {
  state.lastHumanActionType = 'build';
  const human = state.players.find(p => p.isHuman);
  const struct = human.hand[handIdx];
  const wbm = playerWorkersByMaterial(state, human.idx);
  if (!canBuild(struct, wbm, human)) return;
  // Auto-recall: prefer shoreline first, then river by lowest cost
  await performBuild(human.idx, handIdx);
  state.phase = 'idle';
  render();
  humanResolver && humanResolver();
}

async function performBuild(playerIdx, handIdx) {
  const p = state.players[playerIdx];
  const struct = p.hand[handIdx];
  // Snapshot for potential undo from an interactive on-build modal (e.g. Sap
  // Drip's Cancel button). JSON clone is safe because state is plain data
  // (no functions, no DOM refs).
  const buildSnapshot = JSON.parse(JSON.stringify(state));
  const wbm = playerWorkersByMaterial(state, playerIdx);
  // Granary prompt: if a human owner could choose to save it for a later build, ask.
  // (When Granary is required to make this build buildable at all, auto-fire silently.)
  let suppressGranary = false;
  if (p.isHuman && hasEffect(p, 'Granary') && !p.granaryUsed) {
    const wouldFire = effectiveBuildCost(struct, p, wbm).granaryUsed;
    if (wouldFire) {
      const savedFlag = p.granaryUsed;
      p.granaryUsed = true;
      const buildableWithout = canBuild(struct, wbm, p);
      p.granaryUsed = savedFlag;
      if (buildableWithout) {
        const useNow = await confirmModal(
          `${MATERIALS.reeds.icon} Use Granary?`,
          'Save 1 worker on this build, or save Granary for a future build? (Once per game.)',
          'Use now', 'Save for later'
        );
        if (!useNow) suppressGranary = true;
      }
    }
  }
  if (suppressGranary) p.granaryUsed = true;
  const { eff: effCost, granaryUsed, stoneToolUsed } = effectiveBuildCost(struct, p, wbm);
  if (suppressGranary) p.granaryUsed = false;
  if (granaryUsed) {
    p.granaryUsed = true;
    log(`${MATERIALS.reeds.icon} ${speciesLabel(p)} uses Granary to save 1 worker on this build.`);
  }
  if (stoneToolUsed) {
    p.stoneToolUsed = true;
    log(`🦪 ${speciesLabel(p)} uses Stone Tool — 1 Stones worker substitutes for any other material.`);
  }
  // Two-pass consumption: vanilla cards first (preserves wild capacity for
  // materials with no vanilla source), wild cards second to cover deficits.
  let workersReturned = 0;
  let vineCurtainHit = false; // fires Vine Curtain peek-rearrange once per build
  const remainingNeed = { ...effCost };

  const consume = (c, need, mLabel) => {
    const have = workersOnCard(c, playerIdx);
    if (have === 0 || need === 0) return { take: 0, yielded: 0 };
    const mult = cardYieldMultiplier(c);
    const wantWorkers = Math.ceil(need / mult);
    const take = Math.min(have, wantWorkers);
    c.workers[playerIdx] = have - take;
    if (c.workers[playerIdx] === 0) delete c.workers[playerIdx];
    if (typeof c.slot === 'number') c.blanks += take;
    if (mult > 1 && take > 0) {
      log(`🌳 Old Growth doubled yield: ${take} worker${take === 1 ? '' : 's'} → ${take * mult} ${mLabel}.`);
    }
    if (take > 0 && c.effect === 'peek-rearrange') vineCurtainHit = true;
    return { take, yielded: take * mult };
  };

  // Pass A: vanilla cards only.
  for (const m of Object.keys(remainingNeed)) {
    if (remainingNeed[m] === 0) continue;
    for (const c of state.shorelineCards) {
      if (remainingNeed[m] === 0) break;
      if (c.material !== m || c.wildAlt) continue;
      const { take, yielded } = consume(c, remainingNeed[m], m);
      remainingNeed[m] = Math.max(0, remainingNeed[m] - yielded);
      workersReturned += take;
    }
    const riverVanilla = state.riverCards
      .filter(c => c.material === m && !c.wildAlt && workersOnCard(c, playerIdx) > 0)
      .sort((a, b) => cardCost(a) - cardCost(b));
    for (const c of riverVanilla) {
      if (remainingNeed[m] === 0) break;
      const { take, yielded } = consume(c, remainingNeed[m], m);
      remainingNeed[m] = Math.max(0, remainingNeed[m] - yielded);
      workersReturned += take;
    }
  }

  // Pass B: wild cards fill any remaining deficits.
  const wildCards = []
    .concat(state.shorelineCards.filter(c => c.wildAlt && workersOnCard(c, playerIdx) > 0))
    .concat(state.riverCards.filter(c => c.wildAlt && workersOnCard(c, playerIdx) > 0)
      .sort((a, b) => cardCost(a) - cardCost(b)));
  for (const c of wildCards) {
    const options = [c.material, c.wildAlt].sort(
      (a, b) => (remainingNeed[b] || 0) - (remainingNeed[a] || 0)
    );
    for (const m of options) {
      if ((remainingNeed[m] || 0) === 0) continue;
      if (workersOnCard(c, playerIdx) === 0) break;
      const { take, yielded } = consume(c, remainingNeed[m], m);
      remainingNeed[m] = Math.max(0, (remainingNeed[m] || 0) - yielded);
      workersReturned += take;
      if (take > 0 && m !== c.material) {
        log(`✦ ${MATERIALS[c.material].name}/${MATERIALS[c.wildAlt].name} wildcard spent as ${MATERIALS[m].name}.`);
      }
    }
  }

  p.supply += workersReturned;
  // Vine Curtain (Vines-4 effect card): when a worker is retrieved from it
  // during this build, the building player gets to peek + rearrange the top 2
  // of the material deck. Human gets a modal; AI rearranges greedily.
  if (vineCurtainHit) {
    if (p.isHuman) await humanVineCurtainRearrange(playerIdx);
    else aiVineCurtainRearrange(playerIdx);
  }
  // Build cost in time — Otter Slide reduces by 3 (min 1) when active. Cards with printed time 0 stay 0.
  // Lodge Foundation (beaver species starter): -1 fish on Logs-using builds.
  const slideDiscount = hasEffect(p, 'Otter Slide') ? 3 : 0;
  const lodgeDiscount = (hasEffect(p, 'Lodge Foundation') && (struct.cost.logs || 0) > 0) ? 1 : 0;
  const timeCost = struct.time === 0 ? 0 : Math.max(1, struct.time - slideDiscount - lodgeDiscount);
  advancePlayer(playerIdx, timeCost);
  // Move card from hand to built
  p.hand.splice(handIdx, 1);
  p.built.push(struct);
  log(`🏗 ${speciesLabel(p)} builds <b>${struct.name}</b> (${timeCost}🐟, ${struct.vp}★).`);
  // Fire on-build effect (one-time triggers).
  await fireOnBuildEffect(playerIdx, struct);
  // If an on-build modal flagged the build for cancellation, restore the
  // pre-build state in-place (so any outside references to `state` itself stay
  // valid) and bail before drawing replacements.
  if (state._abortMove) {
    delete state._abortMove;
    for (const k of Object.keys(state)) delete state[k];
    Object.assign(state, buildSnapshot);
    log(`🚫 ${speciesLabel(state.players[playerIdx])} cancelled the ${struct.name} build — workers, materials, and time refunded.`);
    render();
    return;
  }
  // Draw replacements up to (post-build) hand size — Cache Burrow may now be active.
  while (p.hand.length < maxHandSize(p) && structAvailable(state) > 0) {
    p.hand.push(popStructDeck(state));
  }
  // Passive build-triggered effects keyed off the builder's tableau (fire when
  // ANY structure with the matching material is built). Runs after the refill so
  // Stone Causeway's extra draw goes over the hand limit before re-filtering.
  await firePassiveBuildEffects(playerIdx, struct);
  cleanupShoreline();
}

async function firePassiveBuildEffects(playerIdx, struct) {
  const p = state.players[playerIdx];
  if (hasEffect(p, 'Vine Trellis') && (struct.cost.vines || 0) > 0) {
    const before = p.timePos;
    p.timePos = Math.max(0, p.timePos - 1);
    if (p.timePos < before) {
      log(`🪜 ${speciesLabel(p)} slides back ${before - p.timePos} on the fish track (Vine Trellis).`);
    }
  }
  if (hasEffect(p, 'Stone Causeway') && (struct.cost.stones || 0) > 0) {
    if (p.isHuman) await humanStoneCausewayDraw(playerIdx);
    else aiStoneCausewayDraw(playerIdx);
  }
  if (hasEffect(p, 'Reed Walkway') && (struct.cost.reeds || 0) > 0) {
    if (p.isHuman) await humanReedWalkwayPlace(playerIdx);
    else aiReedWalkwayPlace(playerIdx);
  }
  if (hasEffect(p, 'Clay Vault') && (struct.cost.clay || 0) > 0) {
    if (p.isHuman) await humanClayVaultSwap(playerIdx);
    else aiClayVaultSwap(playerIdx);
  }
  if (hasEffect(p, 'Burrow Network') && (struct.cost.mud || 0) > 0) {
    if (p.isHuman) await humanBurrowNetworkMove(playerIdx);
    else aiBurrowNetworkMove(playerIdx);
  }
}

// Human modal — pick which card to discard after Stone Causeway's draw.
async function humanStoneCausewayDraw(playerIdx) {
  const p = state.players[playerIdx];
  if (structAvailable(state) === 0) return;
  const drawn = popStructDeck(state);
  if (!drawn) return;
  p.hand.push(drawn);
  log(`${MATERIALS.stones.icon} Stone Causeway draws ${drawn.name}. Pick a card to discard.`);
  render();
  if (p.hand.length <= maxHandSize(p)) return;
  const items = p.hand.map((s, i) => ({ s, i }));
  const pick = await pickFromList(
    `${MATERIALS.stones.icon} Stone Causeway — discard a card`,
    `You drew <b>${drawn.name}</b> on top of your normal refill. Pick one card from your hand to discard.`,
    items,
    x => `${x.s.name} — ${vpDisplay(x.s)}★ · ${x.s.time}🐟 · ${Object.entries(x.s.cost).map(([m, n]) => MATERIALS[m].icon + n).join(' ')}`,
    { cancelable: false }
  );
  const idx = pick ? pick.i : (p.hand.length - 1); // fallback: discard the drawn card
  const dropped = p.hand.splice(idx, 1)[0];
  state.structDiscard.push(dropped);
  log(`${MATERIALS.stones.icon} Stone Causeway: discarded ${dropped.name}.`);
  render();
}

// Human modal — pick which R1 card to place the free Reed Walkway worker on.
async function humanReedWalkwayPlace(playerIdx) {
  const p = state.players[playerIdx];
  if (p.supply === 0) return;
  const cands = state.riverCards.filter(c => c.slot === 0 && uncoveredIcons(c) > 0);
  if (cands.length === 0) return;
  const items = cands.map(c => ({ card: c }));
  const pick = await pickFromList(
    `${MATERIALS.reeds.icon} Reed Walkway — place a free worker on River 1`,
    'Place 1 worker from your supply onto an uncovered icon on a River 1 card. (Free; you may skip.)',
    items,
    x => `River 1 (${cardCost(x.card)}🐟/item): ${MATERIALS[x.card.material].icon} ${MATERIALS[x.card.material].name} — ${uncoveredIcons(x.card)} uncovered`,
    { declineLabel: 'Skip', cancelable: false }
  );
  if (!pick || pick === PICKER_DECLINE) {
    log(`${MATERIALS.reeds.icon} Reed Walkway: skipped.`);
    return;
  }
  p.supply -= 1;
  pick.card.workers[playerIdx] = (pick.card.workers[playerIdx] || 0) + 1;
  log(`${MATERIALS.reeds.icon} Reed Walkway: places 1 free worker on ${MATERIALS[pick.card.material].name} (R1).`);
  render();
}

// Human modal — peek deck top; offer swap with a hand card or keep.
async function humanClayVaultSwap(playerIdx) {
  const p = state.players[playerIdx];
  if (structAvailable(state) === 0) return;
  if (state.structDeck.length === 0) {
    if (state.structDiscard.length === 0) return;
    state.structDeck = shuffle(state.structDiscard);
    state.structDiscard = [];
    log(`📚 Structure deck empty — discard pile reshuffled (Clay Vault peek).`);
  }
  if (state.structDeck.length === 0) return;
  const top = state.structDeck[state.structDeck.length - 1];
  const yes = await confirmModal(
    '🏺 Clay Vault — peek deck top',
    `Top of the structure deck is <b>${top.name}</b> (${vpDisplay(top)}★ · ${top.time}🐟 · ${Object.entries(top.cost).map(([m, n]) => MATERIALS[m].icon + n).join(' ')}). Swap it for one card from your hand?`,
    'Swap', 'Keep hand'
  );
  if (!yes) {
    log(`🏺 Clay Vault: peeks ${top.name}; keeps hand.`);
    return;
  }
  const items = p.hand.map((s, i) => ({ s, i }));
  const pick = await pickFromList(
    '🏺 Clay Vault — discard one card from hand',
    `Discard which card? You'll take <b>${top.name}</b> in exchange.`,
    items,
    x => `${x.s.name} — ${vpDisplay(x.s)}★ · ${x.s.time}🐟 · ${Object.entries(x.s.cost).map(([m, n]) => MATERIALS[m].icon + n).join(' ')}`,
    { cancelable: false }
  );
  if (!pick) return;
  state.structDeck.pop();
  const dropped = p.hand.splice(pick.i, 1)[0];
  state.structDiscard.push(dropped);
  p.hand.push(top);
  log(`🏺 Clay Vault: swaps ${dropped.name} ↔ ${top.name}.`);
  render();
}

// Human modal — pick source then destination for Burrow Network's worker move.
async function humanBurrowNetworkMove(playerIdx) {
  const p = state.players[playerIdx];
  const mine = state.riverCards.filter(c => workersOnCard(c, playerIdx) > 0);
  if (mine.length < 2) return;
  // Valid destinations need ≥1 your worker AND (uncovered icon OR a blank).
  const validDest = mine.filter(c => uncoveredIcons(c) > 0 || c.blanks > 0);
  if (validDest.length === 0) return;
  const sourceItems = mine.map(c => ({ card: c }));
  const sourcePick = await pickFromList(
    '🕳 Burrow Network — pick source worker',
    'Move 1 of your workers from this card to another card where you already have at least 1 worker. (You may replace a blank.)',
    sourceItems,
    x => `River ${x.card.slot + 1} (${cardCost(x.card)}🐟/item): ${MATERIALS[x.card.material].icon} ${MATERIALS[x.card.material].name} — you have ${workersOnCard(x.card, playerIdx)}`,
    { declineLabel: 'Skip', cancelable: false }
  );
  if (!sourcePick || sourcePick === PICKER_DECLINE) {
    log(`🕳 Burrow Network: skipped.`);
    return;
  }
  const destItems = validDest
    .filter(c => c.id !== sourcePick.card.id)
    .map(c => ({ card: c }));
  if (destItems.length === 0) {
    log(`🕳 Burrow Network: no valid destination.`);
    return;
  }
  const destPick = await pickFromList(
    '🕳 Burrow Network — pick destination',
    `Worker moves from ${MATERIALS[sourcePick.card.material].name} (R${sourcePick.card.slot + 1}).`,
    destItems,
    x => {
      const open = uncoveredIcons(x.card);
      const bl = x.card.blanks;
      const tag = (open > 0 && bl > 0) ? `${open} uncovered, ${bl} blank` : (open > 0 ? `${open} uncovered` : `${bl} blank`);
      return `River ${x.card.slot + 1} (${cardCost(x.card)}🐟/item): ${MATERIALS[x.card.material].icon} ${MATERIALS[x.card.material].name} — ${tag}`;
    },
    { cancelable: false }
  );
  if (!destPick) return;
  // If destination has both an uncovered icon and a blank, ask which to take.
  let useBlank;
  if (uncoveredIcons(destPick.card) > 0 && destPick.card.blanks > 0) {
    useBlank = await confirmModal(
      '🕳 Burrow Network — replace a blank?',
      `${MATERIALS[destPick.card.material].name} has both uncovered icons and ${destPick.card.blanks} blank${destPick.card.blanks === 1 ? '' : 's'}. Replace a blank instead of taking an uncovered icon?`,
      'Replace blank', 'Take uncovered'
    );
  } else {
    useBlank = destPick.card.blanks > 0; // forced
  }
  sourcePick.card.workers[playerIdx] -= 1;
  if (sourcePick.card.workers[playerIdx] === 0) delete sourcePick.card.workers[playerIdx];
  if (useBlank) destPick.card.blanks -= 1;
  destPick.card.workers[playerIdx] = (destPick.card.workers[playerIdx] || 0) + 1;
  const what = useBlank ? 'replacing a blank' : 'onto an uncovered icon';
  log(`🕳 Burrow Network: moves 1 worker from ${MATERIALS[sourcePick.card.material].name} (R${sourcePick.card.slot + 1}) to ${MATERIALS[destPick.card.material].name} (R${destPick.card.slot + 1}) — ${what}.`);
  render();
}

function aiStoneCausewayDraw(playerIdx) {
  const p = state.players[playerIdx];
  if (structAvailable(state) === 0) return;
  const drawn = popStructDeck(state);
  if (!drawn) return;
  p.hand.push(drawn);
  if (p.hand.length <= maxHandSize(p)) {
    log(`${MATERIALS.stones.icon} Stone Causeway: ${speciesLabel(p)} draws ${drawn.name}.`);
    return;
  }
  const wbm = playerWorkersByMaterial(state, playerIdx);
  const score = (s) => {
    let deficit = 0;
    for (const m in s.cost) deficit += Math.max(0, s.cost[m] - (wbm[m] || 0));
    return s.vp + aiEffectValue(s, p, state) - deficit * 1.5;
  };
  const scored = p.hand.map((s, i) => ({ s, i, sc: score(s) })).sort((a, b) => a.sc - b.sc);
  const dropped = p.hand.splice(scored[0].i, 1)[0];
  state.structDiscard.push(dropped);
  log(`${MATERIALS.stones.icon} Stone Causeway: ${speciesLabel(p)} draws ${drawn.name}, discards ${dropped.name}.`);
}

function aiReedWalkwayPlace(playerIdx) {
  const p = state.players[playerIdx];
  if (p.supply === 0) return;
  const cands = state.riverCards.filter(c => c.slot === 0 && uncoveredIcons(c) > 0);
  if (cands.length === 0) return;
  const wbm = playerWorkersByMaterial(state, playerIdx);
  const need = m => Math.max(0, ...p.hand.map(s => (s.cost[m] || 0) - (wbm[m] || 0)));
  cands.sort((a, b) => {
    const na = need(a.material), nb = need(b.material);
    if (na !== nb) return nb - na;
    return uncoveredIcons(b) - uncoveredIcons(a);
  });
  const target = cands[0];
  p.supply -= 1;
  target.workers[playerIdx] = (target.workers[playerIdx] || 0) + 1;
  log(`${MATERIALS.reeds.icon} Reed Walkway: ${speciesLabel(p)} places 1 free worker on ${target.name} (R1).`);
}

function aiClayVaultSwap(playerIdx) {
  const p = state.players[playerIdx];
  if (structAvailable(state) === 0) return;
  if (state.structDeck.length === 0) {
    if (state.structDiscard.length === 0) return;
    state.structDeck = shuffle(state.structDiscard);
    state.structDiscard = [];
  }
  if (state.structDeck.length === 0) return;
  const wbm = playerWorkersByMaterial(state, playerIdx);
  const score = (s) => {
    let deficit = 0;
    for (const m in s.cost) deficit += Math.max(0, s.cost[m] - (wbm[m] || 0));
    return s.vp + aiEffectValue(s, p, state) - deficit * 1.5;
  };
  const top = state.structDeck[state.structDeck.length - 1];
  const topScore = score(top);
  const scored = p.hand.map((s, i) => ({ s, i, sc: score(s) })).sort((a, b) => a.sc - b.sc);
  const worst = scored[0];
  if (topScore > worst.sc) {
    state.structDeck.pop();
    const dropped = p.hand.splice(worst.i, 1)[0];
    state.structDiscard.push(dropped);
    p.hand.push(top);
    log(`🏺 Clay Vault: ${speciesLabel(p)} swaps ${dropped.name} ↔ ${top.name} (deck top).`);
  } else {
    log(`🏺 Clay Vault: ${speciesLabel(p)} peeks deck top (${top.name}); keeps hand unchanged.`);
  }
}

function aiBurrowNetworkMove(playerIdx) {
  const p = state.players[playerIdx];
  const wbm = playerWorkersByMaterial(state, playerIdx);
  const need = m => Math.max(0, ...p.hand.map(s => (s.cost[m] || 0) - (wbm[m] || 0)));
  const mine = state.riverCards.filter(c => workersOnCard(c, playerIdx) > 0);
  if (mine.length < 2) return;
  let best = null, bestScore = 0;
  for (const src of mine) {
    for (const dst of mine) {
      if (dst.id === src.id) continue;
      const open = uncoveredIcons(dst) > 0;
      const blanked = dst.blanks > 0;
      if (!open && !blanked) continue;
      const useBlank = blanked;
      const blankBonus = useBlank ? 0.5 : 0;
      const score = need(dst.material) - need(src.material) + blankBonus;
      if (score > bestScore) {
        bestScore = score;
        best = { src, dst, useBlank };
      }
    }
  }
  if (!best) return;
  best.src.workers[playerIdx] -= 1;
  if (best.src.workers[playerIdx] === 0) delete best.src.workers[playerIdx];
  if (best.useBlank) {
    best.dst.blanks -= 1;
  }
  best.dst.workers[playerIdx] = (best.dst.workers[playerIdx] || 0) + 1;
  const what = best.useBlank ? 'replacing a blank' : 'onto an uncovered icon';
  log(`🕳 Burrow Network: ${speciesLabel(p)} moves 1 worker from ${best.src.name} to ${best.dst.name} (${what}).`);
}

// One-time on-build effects fire here (web). Each card's effect is triggered by name.
// async because Snag Pile / Flush Channel trigger auctions and several effects await
// human-pick modals (Mud Levee, Sap Drip, Snag Pile, Vine Lattice, Stone Pool, Flush Channel,
// Salt Lick).
async function fireOnBuildEffect(playerIdx, struct) {
  const p = state.players[playerIdx];
  if (!effectActive(struct.name)) return;
  const isHuman = !!p.isHuman;
  if (struct.name === 'Burrow Run') {
    const before = p.timePos;
    p.timePos = Math.max(0, p.timePos - 5);
    log(`🌀 ${speciesLabel(p)} burrows back ${before - p.timePos} on the fish track.`);
    return;
  }
  if (struct.name === 'Royal Lodge') {
    state.bonusTurnPlayer = playerIdx;
    log(`👑 ${speciesLabel(p)} takes an immediate extra turn (Royal Lodge).`);
    return;
  }
  if (struct.name === 'Spring Cascade') {
    // Fire one pass-0 trigger round (Wood Pile / Hollowed-out Log /
    // Pack Rat Burrow). Mill Wheel is a passive movement modifier and
    // has no trigger — it's unaffected.
    firePassZeroEffects(playerIdx, 1);
    log(`💦 Spring Cascade: ${speciesLabel(p)} fires their pass-0 triggers.`);
    return;
  }
  if (struct.name === 'Springwater Pool') {
    // Ready all of the builder's spent once-per-game cards (main deck +
    // species starters). Mirrors the player init in newGame.
    const flags = [
      'granaryUsed', 'floodgateUsed', 'spyMoundUsed', 'tributeStoneUsed',
      'slipstreamUsed', 'rollingFloatUsed', 'snareSetUsed', 'stoneToolUsed',
    ];
    const refreshed = flags.filter(f => p[f]);
    for (const f of flags) p[f] = false;
    if (refreshed.length === 0) {
      log(`💦 Springwater Pool: nothing to refresh.`);
    } else {
      log(`💦 Springwater Pool: ${speciesLabel(p)} readies ${refreshed.length} once-per-game card${refreshed.length === 1 ? '' : 's'}.`);
    }
    return;
  }
  if (struct.name === 'Beaver Dam') {
    const r1 = state.riverCards.filter(c => c.slot === 0);
    if (r1.length === 0) {
      log(`🦫 Beaver Dam: no River 1 cards to wash.`);
      return;
    }
    let target;
    if (isHuman) {
      target = await pickFromList(
        '🦫 Beaver Dam — wash a River 1 card',
        'Pick one River 1 card to wash to the shoreline (workers carry along).',
        r1,
        c => `${MATERIALS[c.material].icon} ${MATERIALS[c.material].name} · ${uncoveredIcons(c)} open · ${Object.values(c.workers).reduce((s, n) => s + n, 0)} worker${Object.values(c.workers).reduce((s, n) => s + n, 0) === 1 ? '' : 's'}`,
        { cancelable: false }
      );
    } else {
      // Builder-favored target: prefer R1 cards where we have many workers
      // (they carry to shoreline → no-blank recall, Pier/Heron Watch credit),
      // opponents have few (don't pad their pair-VP / Pier), and uncovered
      // icons are low (less wasted auction potential).
      const sorted = r1.slice().sort((a, b) => {
        const ownA = workersOnCard(a, playerIdx);
        const ownB = workersOnCard(b, playerIdx);
        const totA = Object.values(a.workers).reduce((s, n) => s + n, 0);
        const totB = Object.values(b.workers).reduce((s, n) => s + n, 0);
        const oppA = totA - ownA;
        const oppB = totB - ownB;
        const scoreA = ownA * 3 - oppA * 2 - uncoveredIcons(a);
        const scoreB = ownB * 3 - oppB * 2 - uncoveredIcons(b);
        return scoreB - scoreA;
      });
      target = sorted[0];
    }
    moveCardToShoreline(target);
    log(`🦫 Beaver Dam washes ${MATERIALS[target.material].name} (R1) to the shoreline.`);
    return;
  }
  if (struct.name === 'Mud Levee') {
    let dropped = 0;
    if (isHuman) {
      for (let drop = 0; drop < 2; drop++) {
        // Card text: "drop 2 blanks on uncovered icons in the river" — Headwaters
        // cards are upstream of the river and are not valid targets.
        const cands = state.riverCards
          .map(c => ({ card: c, where: `River ${c.slot + 1}` }))
          .filter(x => uncoveredIcons(x.card) > 0);
        if (cands.length === 0) break;
        const pick = await pickFromList(
          `${MATERIALS.mud.icon} Mud Levee — drop blank ${drop + 1}/2`,
          'Pick a river card to block one uncovered icon.',
          cands,
          x => `${x.where}: ${MATERIALS[x.card.material].icon} ${x.card.name} · ${uncoveredIcons(x.card)} open`
        );
        if (!pick) break;
        pick.card.blanks++;
        dropped++;
        render();
      }
    } else {
      const cands = state.riverCards
        .filter(c => uncoveredIcons(c) > 0)
        .sort((a, b) => uncoveredIcons(b) - uncoveredIcons(a));
      for (const c of cands) {
        while (dropped < 2 && uncoveredIcons(c) > 0) { c.blanks++; dropped++; }
        if (dropped >= 2) break;
      }
    }
    log(`${MATERIALS.mud.icon} Mud Levee drops ${dropped} blank${dropped === 1 ? '' : 's'}.`);
    return;
  }
  if (struct.name === 'Flush Channel') {
    const cands = state.prerivCards
      .map((c, i) => c ? { card: c, idx: i } : null)
      .filter(x => x);
    if (cands.length === 0) {
      log(`🌀 Flush Channel: Headwaters empty — nothing to discard.`);
      return;
    }
    let pick;
    if (isHuman) {
      pick = await pickFromList(
        '🌀 Flush Channel — discard 1 Headwaters card',
        'Pick a Headwaters card to discard out of game. Its slot refills from the top of the deck. No auction.',
        cands,
        x => `Headwaters ${PRERIV_SLOTS - x.idx}: ${MATERIALS[x.card.material].icon} ${MATERIALS[x.card.material].name} · ${uncoveredIcons(x.card)} icons`,
        { cancelable: false }
      );
    } else {
      // AI: discard the slot whose material we need least; tie → most icons (denial).
      const need = (mat) => {
        let n = 0;
        for (const s of p.hand) n += s.cost[mat] || 0;
        return n;
      };
      const sorted = cands.slice().sort((a, b) => {
        const na = need(a.card.material), nb = need(b.card.material);
        if (na !== nb) return na - nb;
        return b.card.totalIcons - a.card.totalIcons;
      });
      pick = sorted[0];
    }
    log(`🌀 Flush Channel: ${speciesLabel(p)} discards Headwaters ${PRERIV_SLOTS - pick.idx} ${MATERIALS[pick.card.material].name}.`);
    state.prerivCards[pick.idx] = null;
    refillPreriv(pick.idx);
    return;
  }
  if (struct.name === 'Sap Drip') {
    const cands = state.riverCards.filter(c => uncoveredIcons(c) > 0);
    if (cands.length === 0 || p.supply === 0) return;
    let target;
    if (isHuman) {
      const result = await pickFromList(
        '💧 Sap Drip — place 2 free workers',
        `Pick a river card. ${Math.min(2, p.supply)} of your workers will be placed for free (no auction, no fish).<br>` +
          `<b>Decline</b> to keep the structure built but skip placing workers. ` +
          `<b>Cancel</b> to undo the entire Sap Drip build.`,
        cands,
        c => `${MATERIALS[c.material].icon} ${MATERIALS[c.material].name} · River ${c.slot + 1} · ${uncoveredIcons(c)} open`,
        { declineLabel: 'Decline (skip placement)', cancelLabel: 'Cancel (undo build)' }
      );
      if (result === PICKER_DECLINE) return;
      if (!result) {
        state._abortMove = true;
        return;
      }
      target = result;
    } else {
      const wbm = playerWorkersByMaterial(state, playerIdx);
      const need = m => Math.max(0, ...p.hand.map(s => (s.cost[m] || 0) - (wbm[m] || 0)));
      cands.sort((a, b) => {
        const aScore = Math.min(2, need(a.material), uncoveredIcons(a));
        const bScore = Math.min(2, need(b.material), uncoveredIcons(b));
        if (aScore !== bScore) return bScore - aScore;
        return uncoveredIcons(b) - uncoveredIcons(a);
      });
      target = cands[0];
    }
    const place = Math.min(2, p.supply, uncoveredIcons(target));
    if (place > 0) {
      p.supply -= place;
      target.workers[playerIdx] = (target.workers[playerIdx] || 0) + place;
      log(`💧 Sap Drip: ${speciesLabel(p)} places ${place} free worker${place === 1 ? '' : 's'} on ${MATERIALS[target.material].name}.`);
    }
    return;
  }
  if (struct.name === 'Snag Pile') {
    // Pull a pre-river card to River 1, run auction at upstream rate (cardCost('pre')==1).
    // The card stays in pre-river state during the auction so its per-item cost is 1🐟; the
    // auction's normal slide rule moves it to River 1 (or shoreline if all icons claimed).
    const cands = state.prerivCards
      .map((c, i) => c ? { card: c, idx: i } : null)
      .filter(x => x);
    if (cands.length === 0) return;
    let pick;
    if (isHuman) {
      pick = await pickFromList(
        '🪤 Snag Pile — pull Headwaters card',
        'Pick which Headwaters card to pull. An auction immediately runs on it at 1🐟/item; you must bid at least 1 worker.',
        cands,
        x => `Headwaters ${PRERIV_SLOTS - x.idx}: ${MATERIALS[x.card.material].icon} ${MATERIALS[x.card.material].name} · ${uncoveredIcons(x.card)} icons`,
        { cancelable: false }
      );
    } else {
      const aiIdx = aiChooseFlushTarget(playerIdx);
      if (aiIdx === -1) return;
      pick = { card: state.prerivCards[aiIdx], idx: aiIdx };
    }
    log(`🪤 Snag Pile: ${speciesLabel(p)} pulls Headwaters ${PRERIV_SLOTS - pick.idx} ${MATERIALS[pick.card.material].name} (1🐟/item).`);
    await runAuction(pick.card, playerIdx, 1);
    return;
  }
  if (struct.name === 'Vine Lattice') {
    const drawCount = Math.min(3, structAvailable(state));
    if (drawCount === 0) return;
    const drawn = [];
    for (let i = 0; i < drawCount; i++) drawn.push(popStructDeck(state));
    const wbm = playerWorkersByMaterial(state, playerIdx);
    let keep;
    if (isHuman) {
      keep = await pickFromList(
        `${MATERIALS.vines.icon} Vine Lattice — keep 1 of ${drawn.length}`,
        `Pick the structure card to keep. The other ${drawn.length - 1} will be discarded.`,
        drawn,
        s => {
          const reqs = Object.entries(s.cost).map(([m, n]) => {
            const have = wbm[m] || 0;
            return `${MATERIALS[m].icon}${have}/${n}`;
          }).join(' ');
          const eff = s.effect ? `<br><i>${s.effect}</i>` : '';
          return `<b>${s.name}</b> · ${s.time}🐟 · ${vpDisplay(s)}★<br>${reqs}${eff}`;
        },
        { cancelable: false }
      );
    } else {
      function score(s) {
        let deficit = 0;
        for (const m in s.cost) deficit += Math.max(0, s.cost[m] - (wbm[m] || 0));
        return s.vp - deficit * 1.5;
      }
      drawn.sort((a, b) => score(b) - score(a));
      keep = drawn[0];
    }
    const discard = drawn.filter(s => s !== keep);
    p.hand.push(keep);
    for (const d of discard) state.structDiscard.push(d);
    log(`${MATERIALS.vines.icon} Vine Lattice: ${speciesLabel(p)} drew ${drawn.length}, kept <b>${keep.name}</b>, discarded ${discard.length}.`);
    return;
  }
  if (struct.name === 'Stone Pool') {
    const top = state.matDeck.slice(-5);
    if (top.length === 0) return;
    if (isHuman) {
      // matDeck is a stack — last element is the next pop. Show in draw order (next-drawn first).
      const drawOrder = top.slice().reverse();
      const reordered = await reorderListModal(
        `💧 Stone Pool — reorder next ${drawOrder.length} material cards`,
        'Top of the list will be drawn first. Use ▲/▼ to rearrange.',
        drawOrder,
        c => `${MATERIALS[c.material].icon} ${MATERIALS[c.material].name} (${c.totalIcons} icons)`
      );
      if (reordered) {
        const stackOrder = reordered.slice().reverse();
        state.matDeck.splice(state.matDeck.length - top.length, top.length, ...stackOrder);
      }
    } else {
      const wbm = playerWorkersByMaterial(state, playerIdx);
      const matNeed = {};
      for (const m of MAT_KEYS) matNeed[m] = 0;
      for (const s of p.hand) for (const m in s.cost) {
        matNeed[m] = Math.max(matNeed[m], (s.cost[m] || 0) - (wbm[m] || 0));
      }
      top.sort((a, b) => {
        const an = matNeed[a.material] || 0;
        const bn = matNeed[b.material] || 0;
        if (an !== bn) return an - bn;
        return a.totalIcons - b.totalIcons;
      });
      state.matDeck.splice(state.matDeck.length - top.length, top.length, ...top);
    }
    log(`💧 Stone Pool: ${speciesLabel(p)} reorders top ${top.length} material cards.`);
    return;
  }
  if (struct.name === 'Salt Lick') {
    const others = state.players.filter(o => o.idx !== playerIdx && !o.out);
    const peeks = others.map(o => `${o.species.name}: ${o.hand.map(s => s.name).join(', ') || '(empty)'}`);
    log(`🧂 Salt Lick: ${speciesLabel(p)} peeks at hands — ${peeks.join(' | ')}.`);
    if (isHuman && others.length > 0) {
      const html = others.map(o => `
        <div style="margin-bottom:8px;">
          <b>${o.species.emoji} ${o.species.name}</b>
          ${o.hand.length === 0
            ? ' <span class="small-note">(empty hand)</span>'
            : '<ul style="margin:4px 0 0 18px;padding:0;">' + o.hand.map(s =>
                `<li>${s.name} <span class="small-note">(${Object.entries(s.cost).map(([m, n]) => MATERIALS[m].icon + n).join(' ')} · ${s.time}🐟 · ${vpDisplay(s)}★)</span></li>`
              ).join('') + '</ul>'}
        </div>
      `).join('');
      await new Promise(resolve => {
        showModal({
          title: '🧂 Salt Lick — opponents\' hands',
          body: () => html,
          actions: [{ label: 'Close', primary: true, onClick: () => { closeModal(); resolve(); }}],
        });
      });
    }
    return;
  }
}

// =============================================================================
// MODAL
// =============================================================================
function showModal({ title, body, actions }) {
  const root = document.getElementById('modal-root');
  let actionsHtml = '';
  actions.forEach((a, i) => {
    const cls = a.primary ? 'primary' : (a.ghost ? 'ghost' : '');
    actionsHtml += `<button class="${cls}" id="modal-btn-${i}">${a.label}</button>`;
  });
  const bodyHtml = typeof body === 'function' ? body() : body;
  root.innerHTML = `<div class="modal-backdrop"><div class="modal">
    <h2>${title}</h2>
    <div>${bodyHtml}</div>
    <div class="action-buttons" style="margin-top:10px;">${actionsHtml}</div>
  </div></div>`;
  actions.forEach((a, i) => {
    document.getElementById('modal-btn-' + i).onclick = a.onClick;
  });
}

function closeModal() {
  document.getElementById('modal-root').innerHTML = '';
}

// Yes/No prompt — resolves true on yes, false on no.
function confirmModal(title, msg, yesLabel = 'Use it', noLabel = 'Skip') {
  return new Promise(resolve => {
    showModal({
      title,
      body: () => `<p>${msg}</p>`,
      actions: [
        { label: yesLabel, primary: true, onClick: () => { closeModal(); resolve(true); } },
        { label: noLabel, ghost: true, onClick: () => { closeModal(); resolve(false); } },
      ],
    });
  });
}

// Click-to-pick a single item from a list (each item rendered to its own button).
// Resolves with the chosen item, or null if the user cancels.
let _pickerSeq = 0;
// Sentinel returned when the user clicks the optional "Decline" button.
const PICKER_DECLINE = '__decline__';
function pickFromList(title, intro, items, renderItem, opts = {}) {
  return new Promise(resolve => {
    const fnName = '_picker_' + (++_pickerSeq);
    window[fnName] = (i) => {
      const it = items[i];
      delete window[fnName];
      closeModal();
      resolve(it);
    };
    const actions = [];
    if (opts.declineLabel) {
      actions.push({ label: opts.declineLabel, ghost: true, onClick: () => {
        delete window[fnName];
        closeModal();
        resolve(PICKER_DECLINE);
      }});
    }
    if (opts.cancelable !== false) {
      actions.push({ label: opts.cancelLabel || 'Cancel', ghost: true, onClick: () => {
        delete window[fnName];
        closeModal();
        resolve(null);
      }});
    }
    const listClass = opts.horizontal ? 'picker-list horizontal' : 'picker-list';
    showModal({
      title,
      body: () => `<p class="small-note">${intro}</p>
        <div class="${listClass}">
          ${items.map((it, i) => `<button class="picker-btn" onclick="window['${fnName}'](${i})">${renderItem(it, i)}</button>`).join('')}
        </div>`,
      actions,
    });
  });
}

// Reorder a list of cards (typically Stone Pool's top-5 in draw order).
// Items are passed in DRAW ORDER (first to be drawn at index 0).
// Returns the reordered array (also in draw order); null on cancel.
let _reorderSeq = 0;
function reorderListModal(title, intro, items, renderItem) {
  return new Promise(resolve => {
    const order = items.slice();
    const moveName = '_reorderMove_' + (++_reorderSeq);
    function bodyHtml() {
      return `<p class="small-note">${intro}</p>
        <div class="reorder-list">
          ${order.map((it, i) => `
            <div class="reorder-row">
              <span><b>${i + 1}.</b> ${renderItem(it, i)}</span>
              <span class="reorder-btns">
                <button onclick="window['${moveName}'](${i}, -1)" ${i === 0 ? 'disabled' : ''}>▲</button>
                <button onclick="window['${moveName}'](${i}, 1)" ${i === order.length - 1 ? 'disabled' : ''}>▼</button>
              </span>
            </div>
          `).join('')}
        </div>`;
    }
    window[moveName] = (idx, dir) => {
      const j = idx + dir;
      if (j < 0 || j >= order.length) return;
      [order[idx], order[j]] = [order[j], order[idx]];
      const root = document.getElementById('modal-root');
      const inner = root.querySelector('.modal > div:not(.action-buttons)');
      if (inner) inner.innerHTML = bodyHtml();
    };
    showModal({
      title,
      body: bodyHtml,
      actions: [
        { label: 'Confirm order', primary: true, onClick: () => {
          delete window[moveName];
          closeModal();
          resolve(order.slice());
        }},
        { label: 'Cancel', ghost: true, onClick: () => {
          delete window[moveName];
          closeModal();
          resolve(null);
        }},
      ],
    });
  });
}

// State for the in-flight bid modal: tracks the current per-card recall plan so
// onChange handlers can recompute the deficit between bid intent and supply.
// The slider's max stays fixed at the maximum-possible bid (supply + all
// recallable, capped at open icons); recalls become required only when the
// player drags above their supply.
let humanBidRecallState = null;

function humanBidRecallTotal() {
  if (!humanBidRecallState) return 0;
  return Object.values(humanBidRecallState.plan).reduce((s, v) => s + (v | 0), 0);
}

function updateBidPreview() {
  const st = humanBidRecallState;
  if (!st) return;
  const slider = document.getElementById('human-bid');
  if (!slider) return;
  const v = parseInt(slider.value) || 0;
  const recall = humanBidRecallTotal();
  const needRecall = Math.max(0, v - st.baseSupply);
  const deficit = Math.max(0, needRecall - recall);
  const effSupply = st.baseSupply + recall;

  const cur = document.getElementById('bid-current');
  if (cur) cur.textContent = v;
  const supplyAfterLbl = document.getElementById('bid-workers-after');
  if (supplyAfterLbl) supplyAfterLbl.textContent = effSupply - v;
  const wDelta = document.getElementById('bid-workers-delta');
  if (wDelta) {
    const parts = [];
    if (recall > 0) parts.push(`+${recall} recalled`);
    if (v > 0) parts.push(`−${v} placed`);
    wDelta.textContent = parts.length ? parts.join(', ') : 'no change';
  }
  const timeAfter = st.baseTime + v * st.cost;
  const tAfter = document.getElementById('bid-time-after');
  if (tAfter) tAfter.textContent = timeAfter;
  const tDelta = document.getElementById('bid-time-delta');
  if (tDelta) {
    const delta = timeAfter - st.baseTime;
    tDelta.textContent = v > 0 ? `+${delta}🐟 (you pay for every bid worker)` : 'no fish spent';
  }

  // Recall section: only relevant when bid exceeds supply.
  const recallSection = document.getElementById('bid-recall-section');
  if (recallSection) recallSection.style.display = needRecall > 0 ? '' : 'none';
  const recallHeader = document.getElementById('bid-recall-header');
  if (recallHeader) {
    if (deficit > 0) {
      recallHeader.innerHTML = `⚠️ Bid is ${needRecall} above your supply — recall <b>${deficit}</b> more worker${deficit === 1 ? '' : 's'} from the cards below, or lower your bid.`;
      recallHeader.style.color = 'var(--warning, #c87a2d)';
    } else if (needRecall > 0) {
      recallHeader.innerHTML = `✅ Recalling <b>${recall}</b> worker${recall === 1 ? '' : 's'} to fund this bid (drops ${recall} blank${recall === 1 ? '' : 's'} on river cards).`;
      recallHeader.style.color = '';
    }
  }

  // Submit disabled while there's a deficit. The button lives in the
  // action-panel (id="bid-submit-btn"); fall back to the legacy modal id
  // in case any path still uses showModal for the bid (e.g., tests).
  const submitBtn = document.getElementById('bid-submit-btn')
    || document.getElementById('modal-btn-0');
  if (submitBtn) submitBtn.disabled = deficit > 0;
}

function adjustBidRecall(cardId, delta) {
  if (!humanBidRecallState) return;
  const max = humanBidRecallState.maxByCard[cardId] || 0;
  const cur = humanBidRecallState.plan[cardId] || 0;
  const next = Math.max(0, Math.min(max, cur + delta));
  humanBidRecallState.plan[cardId] = next;
  const lbl = document.getElementById(`bid-recall-${cardId}`);
  if (lbl) lbl.textContent = next;
  updateBidPreview();
}

async function humanBidForAuction(card, human, minBid, opts = {}) {
  return new Promise(resolve => {
    const m = MATERIALS[card.material];
    const open = uncoveredIcons(card);
    const cost = playerCardCost(card, human.idx);
    const slotLbl = card.slot === 'pre' ? 'Headwaters' : `River ${card.slot + 1}`;
    const baseSupply = human.supply;
    const baseTime = human.timePos;

    // Cards the human has workers on, eligible for pre-auction recall.
    const recallCards = [
      ...state.shorelineCards.map(c => ({ c, river: false })),
      ...state.riverCards.slice().map(c => ({ c, river: true })),
    ].filter(({ c }) => workersOnCard(c, human.idx) > 0);
    const maxByCard = {};
    for (const { c } of recallCards) maxByCard[c.id] = workersOnCard(c, human.idx);
    const totalRecallable = Object.values(maxByCard).reduce((s, v) => s + v, 0);

    // Total workers we could marshal = supply + recallable. If 0, auto-pass.
    if (baseSupply + totalRecallable === 0) {
      log(`💤 ${speciesLabel(human)} has no workers anywhere — auto-passes (bid 0).`);
      resolve(0);
      return;
    }

    // Slider goes all the way up to the max-possible bid (supply + all
    // recallable, capped at open icons). Recalls only become *required* when
    // the player drags above supply.
    const sliderMax = Math.min(baseSupply + totalRecallable, open);

    // Default recall plan: pre-fill just enough to satisfy minBid (trigger case).
    const plan = {};
    let needPrefill = Math.max(0, minBid - baseSupply);
    if (needPrefill > 0) {
      // Prefer shoreline (no blank), then river by highest cost.
      const ordered = [
        ...recallCards.filter(x => !x.river),
        ...recallCards.filter(x => x.river).sort((a, b) => cardCost(b.c) - cardCost(a.c)),
      ];
      for (const { c } of ordered) {
        if (needPrefill <= 0) break;
        const take = Math.min(maxByCard[c.id], needPrefill);
        if (take > 0) {
          plan[c.id] = take;
          needPrefill -= take;
        }
      }
    }

    humanBidRecallState = { baseSupply, baseTime, cost, open, minBid, plan, maxByCard };
    const initRecall = humanBidRecallTotal();
    // Default bid: minBid (which equals 0 for non-trigger; trigger has prefilled recalls).
    const initBid = Math.min(Math.max(minBid, 0), sliderMax);
    const initNeedRecall = Math.max(0, initBid - baseSupply);

    // The bid UI used to live in a modal. It now renders inline in the
    // action panel (the same place that normally shows "Your turn — choose
    // an action"). We stash all the derived state on state.humanBidContext
    // so renderActionPanel() can rebuild the body, and resolve() the
    // promise when the user submits.
    state.humanBidContext = {
      card, human, opts,
      m, slotLbl,
      sliderMax, baseSupply, baseTime, cost, open, totalRecallable,
      minBid, initBid,
      recallCards,
      submit: () => {
        const slider = document.getElementById('human-bid');
        const v = parseInt(slider.value);
        const recall = humanBidRecallTotal();
        const needRecall = Math.max(0, v - baseSupply);
        if (isNaN(v) || v < minBid || v > sliderMax) {
          alert(`Bid must be between ${minBid} and ${sliderMax}.`);
          return;
        }
        if (recall < needRecall) {
          alert(`You need to recall ${needRecall - recall} more worker(s) to support this bid.`);
          return;
        }
        // Apply pre-auction recall first (drops blanks on river cards).
        const spec = [];
        for (const cardId of Object.keys(humanBidRecallState.plan)) {
          const n = humanBidRecallState.plan[cardId];
          if (n > 0) spec.push({ cardId, count: n });
        }
        if (spec.length > 0) callWorkersHome(human.idx, spec);
        humanBidRecallState = null;
        state.humanBidContext = null;
        // Restore auction-bidding so the action panel hides until the next
        // human turn. resolveAuction → showAuctionResolution (later in the
        // turn loop) re-renders again.
        state.phase = 'auction-bidding';
        resolve(v);
        render();
      },
    };
    state.phase = 'human-bidding';
    render();

    // Smooth-scroll the action panel into view + initialise the preview /
    // submit-button disabled state once the new DOM is in place.
    requestAnimationFrame(() => {
      const panel = document.getElementById('action-panel');
      if (panel) panel.scrollIntoView({ behavior: 'smooth', block: 'center' });
      updateBidPreview();
    });
  });
}

// =============================================================================
// TURN LOOP
// =============================================================================
let turnPending = false;
// Pending scheduleTurn() timeout — we keep the handle so humanUndoLastMove()
// can cancel the next turn cleanly before restoring the snapshot.
let pendingTurnTimeoutId = null;
function scheduleTurn() {
  if (turnPending) return;
  turnPending = true;
  pendingTurnTimeoutId = setTimeout(async () => {
    turnPending = false;
    pendingTurnTimeoutId = null;
    await runOneTurn();
  }, 300);
}

// =============================================================================
// UNDO LAST MOVE
// =============================================================================
// BGA-style "↶ Undo last move" affordance. A snapshot of the full state is
// taken at the start of each human turn; the player can roll back to it
// until the next AI commits an action (we sleep ~2.4s after the human's move
// to keep that window open). turnEpoch invalidates any in-flight runOneTurn
// whose state would clobber the restored snapshot.
let turnEpoch = 0;
function takeUndoSnapshot() {
  const snap = JSON.parse(JSON.stringify(state));
  delete snap._undoSnapshot;
  delete snap._abortMove;
  state._undoSnapshot = snap;
}
function clearUndoSnapshot() { delete state._undoSnapshot; }
function restoreUndoSnapshot() {
  const snap = state._undoSnapshot;
  if (!snap) return false;
  for (const k of Object.keys(state)) delete state[k];
  Object.assign(state, snap);
  return true;
}
function humanUndoLastMove() {
  if (!state._undoSnapshot) return;
  // Cancel the pending next-turn timer so it doesn't run after restore.
  if (pendingTurnTimeoutId) {
    clearTimeout(pendingTurnTimeoutId);
    pendingTurnTimeoutId = null;
    turnPending = false;
  }
  if (!restoreUndoSnapshot()) return;
  // Invalidate any runOneTurn currently mid-await (e.g. the AI's pre-commit
  // sleep, the human's awaitHuman, runAuction's bid await). Its post-await
  // epoch check will see the bump and bail.
  turnEpoch++;
  // Wake any suspended awaitHuman() so its runOneTurn can finish and hit
  // the epoch check. (Async work further down — e.g. an in-flight
  // runAuction waiting on a bid Promise from the now-cleared
  // humanBidContext — gets orphaned but stays detached from the restored
  // state, so it can't pollute what the player sees from here on.)
  if (humanResolver) {
    const r = humanResolver;
    humanResolver = null;
    r();
  }
  const human = state.players.find(p => p.isHuman);
  log(`↶ ${speciesLabel(human)} undoes their last move.`);
  render();
  scheduleTurn();
}

async function runOneTurn() {
  if (state.gameOver) return;
  const myEpoch = ++turnEpoch;
  // Endgame trigger: when the material deck empties, snap pawns to spaces 1..N.
  if (!state.endgame && state.matDeck.length === 0) {
    triggerEndgame();
    render();
  }
  // If everyone's out, end game.
  if (state.endgame && state.players.every(p => p.out)) { showGameOver(); return; }
  state.currentPlayer = pickNextPlayer();
  if (state.currentPlayer === -1) { showGameOver(); return; }
  const p = state.players[state.currentPlayer];
  const space = p.timePos;
  log(`— ${speciesLabel(p)} advances to ${space}🐟 on the fish track.`);
  render();
  scrollTimeTrackToLeftmost();

  let actionType = null;
  if (p.isHuman) {
    // Capture the pre-action snapshot for "↶ Undo last move". Persists
    // through this human's turn AND into the next AI's pre-commit sleep.
    takeUndoSnapshot();
    state.humanTurnCount++;
    state.phase = 'choose-action';
    state.lastHumanActionType = null;
    render();
    startHumanTimer();
    try {
      await awaitHuman();
    } finally {
      stopHumanTimer();
    }
    if (myEpoch !== turnEpoch) return; // undo fired while we were awaiting
    actionType = state.lastHumanActionType;
  } else {
    // Once the AI is acting we drop the undo snapshot — the player can't
    // rewind across an AI's move (race-prone, and the AI's choice would
    // depend on now-stale assumptions about the human's prior action).
    clearUndoSnapshot();
    aiStartOfTurnAbilities(p.idx);
    const action = aiChooseAction(p.idx);
    render();
    await sleep(500);
    if (myEpoch !== turnEpoch) return;
    await executeAIAction(p.idx, action);
    if (myEpoch !== turnEpoch) return;
    addAiTurnTime();
    actionType = action.type;
  }

  cleanupShoreline();

  // Pack Rat Burrow: if pass-0 queued any swap prompts for the human, resolve them now.
  if (state.pendingPackRatSwaps > 0) await resolvePendingPackRatSwaps();

  // Endgame removal: pass or reach/exceed track end.
  if (state.endgame && !p.out) {
    const reachedEnd = p.timePos >= ENDGAME_TRACK_END;
    const passed = actionType === 'pass' || actionType === 'retire';
    if (reachedEnd || passed) {
      p.out = true;
      log(`🏁 ${speciesLabel(p)} retires from the endgame${reachedEnd ? ' (reached space ' + ENDGAME_TRACK_END + ')' : ''}.`);
    }
  }
  state.phase = 'idle';
  render();

  if (state.endgame && state.players.every(pp => pp.out)) { showGameOver(); return; }
  if (checkGameEnd()) { showGameOver(); return; }

  // Slipstream: opponents with the card built+unused may take an out-of-order
  // bonus turn (overriding fish-track position once per game).
  await maybeFireSlipstream(p.idx);

  const next = pickNextPlayer();
  if (next === p.idx) {
    log(`↩ ${speciesLabel(p)} still on top of the lowest space — takes another turn.`);
  }
  scheduleTurn();
}

function aiChooseFlushTarget(playerIdx) {
  const p = state.players[playerIdx];
  const wbm = playerWorkersByMaterial(state, playerIdx);
  const needs = {};
  for (const m of MAT_KEYS) needs[m] = 0;
  for (const s of p.hand) {
    for (const m in s.cost) {
      const deficit = Math.max(0, s.cost[m] - (wbm[m] || 0));
      needs[m] = Math.max(needs[m], deficit);
    }
  }
  let best = -1, bestScore = -Infinity;
  for (let i = 0; i < state.prerivCards.length; i++) {
    const c = state.prerivCards[i];
    if (!c) continue;
    const need = needs[c.material];
    const got = Math.min(uncoveredIcons(c), p.supply, need);
    const score = need * got;
    if (score > bestScore) { bestScore = score; best = i; }
  }
  if (best === -1) {
    for (let i = 0; i < state.prerivCards.length; i++) if (state.prerivCards[i] !== null) return i;
  }
  return best;
}

async function executeAIAction(playerIdx, action) {
  const p = state.players[playerIdx];
  if (action.type === 'pass') {
    // In endgame, "pass" is retiring — no fish advancement; the endgame
    // removal block below sets p.out and logs the retirement.
    if (state.endgame) return;
    // Normal play: advance 1 to break the turn-order tie / fall to back of stack.
    log(`💤 ${speciesLabel(p)} can't act — passes (advances 1🐟).`);
    advancePlayer(playerIdx, 1);
    return;
  }
  if (action.type === 'beaverTow') {
    doBeaverTow(playerIdx, action.cardId);
    render();
    return;
  }
  if (action.type === 'salmonRun') {
    doSalmonRun(playerIdx, action.cardId, action.workerCount);
    render();
    return;
  }
  if (action.type === 'build') {
    await performBuild(playerIdx, action.handIdx);
    render();
    return;
  }
  if (action.type === 'auction') {
    const card = state.riverCards.find(c => c.id === action.cardId);
    advancePlayer(playerIdx, 1);
    log(`🎬 ${speciesLabel(p)} spends 1🐟 to auction ${MATERIALS[card.material].name} at River ${card.slot + 1}.`);
    render();
    await sleep(300);
    if (card) await runAuction(card, playerIdx, 1);
    return;
  }
  if (action.type === 'confluenceAuction') {
    const find = id => state.riverCards.find(c => c.id === id) || state.prerivCards.find(c => c && c.id === id);
    const A = find(action.aId), B = find(action.bId);
    if (A && B && A !== B) {
      const trig = combinedTriggerCost(A, B);
      advancePlayer(playerIdx, trig);
      log(`🎬 ${speciesLabel(p)} spends ${trig}🐟 (Confluence) to pool-auction two ${MATERIALS[A.material].name} cards.`);
      render();
      await sleep(300);
      await runCombinedAuction(A, B, playerIdx, 1);
    }
    return;
  }
  if (action.type === 'preriv') {
    const card = state.prerivCards[action.slotIdx];
    if (!card) return;
    const moveCost = prerivTriggerCost(action.slotIdx);
    advancePlayer(playerIdx, moveCost);
    log(`🎬 ${speciesLabel(p)} spends ${moveCost}🐟 to auction Headwaters ${PRERIV_SLOTS - action.slotIdx} ${MATERIALS[card.material].name} (${UPSTREAM_AUCTION_COST}🐟/item).`);
    render();
    await sleep(300);
    await runAuction(card, playerIdx, 1);
    return;
  }
  if (action.type === 'flush') {
    advancePlayer(playerIdx, 5);
    log(`🌀 ${speciesLabel(p)} spends 5🐟 to flush the Headwaters.`);
    // Discard upstream (held aside; returned to deck after refill)
    const flushed = [];
    for (let i = 0; i < state.prerivCards.length; i++) {
      if (state.prerivCards[i]) flushed.push(state.prerivCards[i]);
      state.prerivCards[i] = null;
    }
    // Refill from deck
    for (let i = 0; i < state.prerivCards.length; i++) {
      if (state.matDeck.length === 0) break;
      const c = state.matDeck.pop();
      c.slot = 'pre';
      state.prerivCards[i] = c;
    }
    // Return the flushed cards to the material deck and reshuffle.
    if (flushed.length > 0) {
      for (const c of flushed) {
        c.slot = null;
        c.workers = {};
        c.blanks = 0;
        state.matDeck.push(c);
      }
      state.matDeck = shuffle(state.matDeck);
      log(`🔀 ${flushed.length} flushed card${flushed.length === 1 ? '' : 's'} returned to the material deck (reshuffled).`);
    }
    render();
    await sleep(300);
    // Pick best of fresh upstream and auction it (no extra time cost).
    const targetIdx = aiChooseFlushTarget(playerIdx);
    if (targetIdx === -1) return;
    const card = state.prerivCards[targetIdx];
    log(`🎬 ${speciesLabel(p)} picks Headwaters ${PRERIV_SLOTS - targetIdx} ${MATERIALS[card.material].name} to auction (${UPSTREAM_AUCTION_COST}🐟/item).`);
    await runAuction(card, playerIdx, 1);
    return;
  }
  if (action.type === 'browse') {
    const N = action.n;
    const drawCount = Math.min(N, structAvailable(state));
    const drawn = [];
    for (let i = 0; i < drawCount; i++) drawn.push(popStructDeck(state));
    advancePlayer(playerIdx, drawCount);
    log(`📚 ${speciesLabel(p)} invents from ${drawCount} cards (${drawCount}🐟).`);
    const sel = aiBrowseDiscardChoice(playerIdx, drawn);
    const newHand = [];
    p.hand.forEach((s, i) => { if (!sel.has('h' + i)) newHand.push(s); });
    drawn.forEach((s, i) => { if (!sel.has('d' + i)) newHand.push(s); });
    const discarded = [];
    p.hand.forEach((s, i) => { if (sel.has('h' + i)) discarded.push(s); });
    drawn.forEach((s, i) => { if (sel.has('d' + i)) discarded.push(s); });
    for (const d of discarded) state.structDiscard.push(d);
    p.hand = newHand;
    render();
    await sleep(300);
    return;
  }
}

// =============================================================================
// GAME END
// =============================================================================
function checkGameEnd() {
  if (state.matDeck.length > 0) return false;
  if (state.prerivCards.some(c => c !== null)) return false;
  if (state.riverCards.some(c => uncoveredIcons(c) > 0)) return false;
  // No player has a buildable structure
  for (const p of state.players) {
    const wbm = playerWorkersByMaterial(state, p.idx);
    for (const s of p.hand) {
      if (canBuild(s, wbm, p)) return false;
    }
  }
  return true;
}

function showGameOver() {
  state.gameOver = true;
  const ranked = state.players.slice().sort((a, b) => {
    const va = totalVP(a, state);
    const vb = totalVP(b, state);
    if (va !== vb) return vb - va;
    return a.timePos - b.timePos;
  });
  const winner = ranked[0];
  log(`🏆 GAME OVER. Winner: ${speciesLabel(winner)} with ${totalVP(winner, state)}★.`);
  let rows = '';
  ranked.forEach((p, i) => {
    const bd = vpBreakdown(p, state);
    rows += `<div class="score-row ${i === 0 ? 'winner' : ''}">
      <span>${i + 1}. ${p.species.emoji} ${p.species.name}${p.isHuman ? ' (you)' : ''}</span>
      <span><b>${bd.total}★</b> · ${p.timePos}🐟 · ${p.built.length} structure${p.built.length === 1 ? '' : 's'}</span>
    </div>`;
    if (bd.bonuses.length > 0) {
      const bonusLines = bd.bonuses.map(b =>
        `<div style="display:flex; justify-content:space-between; padding:2px 14px; font-size:12px; color:var(--ink-soft);">
          <span>${b.name}: ${b.detail}</span>
          <span><b>${b.vp >= 0 ? '+' : ''}${b.vp}★</b></span>
        </div>`).join('');
      rows += `<div style="margin:-2px 0 6px 0;">
        <div style="display:flex; justify-content:space-between; padding:2px 14px; font-size:12px; color:var(--ink-soft);">
          <span><i>Printed structure VP</i></span>
          <span>${bd.base}★</span>
        </div>
        ${bonusLines}
      </div>`;
    }
  });
  let humanStat = '';
  if (state.humanTurnCount > 0) {
    const perTurnSec = (state.humanTimeMs / state.humanTurnCount) / 1000;
    humanStat = `<p class="small-note" style="margin-top:8px;">⏱ Your average decision time: <b>${perTurnSec.toFixed(1)}s/turn</b> over ${state.humanTurnCount} turn${state.humanTurnCount === 1 ? '' : 's'}.</p>`;
  }
  showModal({
    title: '🏞 Game Over',
    body: () => `<div class="scoreboard">${rows}</div>${humanStat}`,
    actions: [
      { label: 'Play again', primary: true, onClick: () => location.reload() },
    ],
  });
  render();
}

// =============================================================================
// INIT
// =============================================================================
// Populate the species-picker rows once on load. Each row is a small
// segmented control over the three roles: Off / You / AI. Default seed
// gives a 3-player game (you + 2 AI) so a single click on Start runs.
(function initSpeciesPickers() {
  const wrap = document.getElementById('species-pickers');
  if (!wrap) return;
  const DEFAULT_ROLES = { beaver: 'you', otter: 'ai', muskrat: 'ai', mink: 'off' };
  wrap.innerHTML = SPECIES.map(sp => {
    const def = DEFAULT_ROLES[sp.id] || 'off';
    const roleInput = (role, label) => {
      const id = `role-${sp.id}-${role}`;
      const checked = role === def ? 'checked' : '';
      return `<input type="radio" id="${id}" name="role-${sp.id}" value="${role}" ${checked}>` +
             `<label for="${id}">${label}</label>`;
    };
    return `<div class="species-picker" data-species="${sp.id}">
      <span class="species-emoji" style="background-color:${sp.color};color:#fff;border-radius:50%;width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;font-size:16px;">${speciesIcon(sp)}</span>
      <span class="species-name">${sp.name}</span>
      <span class="role-toggle">
        ${roleInput('off', 'Off')}
        ${roleInput('you', 'You')}
        ${roleInput('ai',  'AI')}
      </span>
    </div>`;
  }).join('');
  wrap.addEventListener('change', updateSetupHint);
  updateSetupHint();
})();
</script>

<!-- ====== Card hover popup ======================================
     A single floating element that shows a large version of any card
     with [data-card-img] when the cursor is over it. Event delegation
     keeps this independent of the various render paths. -->
<div id="card-popup" class="card-popup" aria-hidden="true"></div>
<script>
(function() {
  const popup = document.getElementById('card-popup');
  let activeCard = null;
  const PAD = 16;
  const OFFSET = 24;

  function positionCardPopup(x, y) {
    const w = popup.offsetWidth;
    const h = popup.offsetHeight;
    let left = x + OFFSET;
    let top = y + OFFSET;
    if (left + w + PAD > window.innerWidth) left = x - w - OFFSET;
    if (left < PAD) left = PAD;
    if (top + h + PAD > window.innerHeight) top = window.innerHeight - h - PAD;
    if (top < PAD) top = PAD;
    popup.style.left = left + 'px';
    popup.style.top = top + 'px';
  }

  function showCardPopup(url, x, y) {
    popup.style.backgroundImage = `url('${url}')`;
    popup.classList.toggle('landscape', url.includes('/material-deck/'));
    popup.classList.add('visible');
    positionCardPopup(x, y);
  }

  function hideCardPopup() {
    popup.classList.remove('visible');
  }

  document.addEventListener('mouseover', e => {
    const el = e.target.closest('[data-card-img]');
    if (el === activeCard) return;
    activeCard = el;
    if (el) showCardPopup(el.dataset.cardImg, e.clientX, e.clientY);
    else hideCardPopup();
  });

  document.addEventListener('mousemove', e => {
    if (!activeCard) return;
    positionCardPopup(e.clientX, e.clientY);
  });

  // Mouse left the window entirely — hide the popup.
  document.addEventListener('mouseout', e => {
    if (e.relatedTarget) return;
    activeCard = null;
    hideCardPopup();
  });
})();

// Viewport changes (rotation, resize across the 768px breakpoint) need to
// re-render the fish track so the mobile-trim window recomputes.
window.addEventListener('resize', () => {
  if (typeof state !== 'undefined' && state && state.players) renderTimeTrack();
});
</script>
